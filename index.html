<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Connection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Vazirmatn, Tahoma, sans-serif;
}
body{
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Dialog */
.dialog{
    width:92%;
    max-width:430px;
    background:rgba(17,25,40,0.85);
    border-radius:22px;
    padding:35px 30px;
    text-align:center;
    box-shadow:
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    animation:fadeIn .4s ease;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
    animation:pulse 1.5s infinite;
}

h2{
    color:#ffffff;
    font-size:20px;
    margin-bottom:12px;
    letter-spacing:0.5px;
}

p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.8;
}

.network{
    margin-top:18px;
    padding:12px;
    border-radius:12px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:#fff;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 0 20px rgba(0,114,255,0.6);
}

button{
    margin-top:28px;
    padding:13px 32px;
    border:none;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    color:#fff;
    transition:0.3s;
    box-shadow:0 8px 25px rgba(0,242,254,0.4);
}
button:hover{
    transform:scale(1.06);
}

/* Blue Empty Screen */
.blue-screen{
    position:fixed;
    inset:0;
    background:#0b5cff;
    display:none;
}

/* Animations */
@keyframes fadeIn{
    from{opacity:0;transform:scale(.9);}
    to{opacity:1;transform:scale(1);}
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="overlay" id="overlay">
    <div class="dialog">
        <div class="icon">📡</div>
        <h2>ارتباط با سرور برقرار نشد</h2>
        <p>
            کیفیت شبکه شما در حال حاضر پایدار نیست.
            لطفاً از اتصال 4G یا اینترنت پایدار استفاده نمایید
            و سپس مجدداً تلاش کنید.
        </p>

        <div class="network">
            وضعیت شبکه: 4G Preferred
        </div>

        <button onclick="goBlue()">تلاش مجدد</button>
    </div>
</div>

<div class="blue-screen" id="blueScreen"></div>

<script>
function goBlue(){
    document.getElementById("overlay").style.display="none";
    document.getElementById("blueScreen").style.display="block";
}
</script>

</body>
</html>
