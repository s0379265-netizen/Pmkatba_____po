<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Mode Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif;}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    color:white;
}

/* ===== Dialog ===== */
.overlay{
    position:fixed;
    inset:0;
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.card{
    background:rgba(15,23,42,0.85);
    padding:35px;
    border-radius:25px;
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    width:95%;
    max-width:450px;
    animation:fade .5s ease;
}

h2{margin-bottom:10px;font-size:22px;}
p{opacity:.85;font-size:14px;margin-bottom:20px;}

.status{
    margin-top:10px;
    font-size:13px;
    opacity:.7;
}

/* ===== Game ===== */
#game{
    display:none;
    margin-top:25px;
}

canvas{
    background:#111827;
    border-radius:15px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* Anim */
@keyframes fade{
    from{opacity:0;transform:scale(.9);}
    to{opacity:1;transform:scale(1);}
}
</style>
</head>
<body>

<div class="overlay" id="overlay">
    <div class="card">
        <h2>ارتباط با سرور قطع شد 🚫</h2>
        <p>تا زمان برقراری اتصال، می‌توانید بازی آفلاین انجام دهید.</p>
        <div class="status" id="status">در حال بررسی اتصال...</div>
        <div id="game">
            <canvas id="canvas" width="300" height="300"></canvas>
        </div>
    </div>
</div>

<script>
// ===== Ping Check =====
async function checkServer(){
    try{
        await fetch("https://example.com", {mode:"no-cors"});
        location.reload(); // reconnect
    }catch{}
}
setInterval(checkServer,5000);

// ===== Show Game =====
document.getElementById("game").style.display="block";

// ===== Simple Offline Game (Dodge Square) =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let player = {x:140,y:260,size:20};
let enemy = {x:Math.random()*280,y:0,size:20,speed:3};
let score = 0;

document.addEventListener("mousemove",e=>{
    const rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left - 10;
});

function update(){
    ctx.clearRect(0,0,300,300);

    // player
    ctx.fillStyle="#4facfe";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    // enemy
    ctx.fillStyle="#ef4444";
    ctx.fillRect(enemy.x,enemy.y,enemy.size,enemy.size);

    enemy.y += enemy.speed;

    if(enemy.y>300){
        enemy.y=0;
        enemy.x=Math.random()*280;
        score++;
    }

    // collision
    if(player.x < enemy.x + enemy.size &&
       player.x + player.size > enemy.x &&
       player.y < enemy.y + enemy.size &&
       player.y + player.size > enemy.y){
        alert("باختی 😅 امتیاز: "+score);
        score=0;
        enemy.y=0;
    }

    ctx.fillStyle="white";
    ctx.fillText("Score: "+score,10,15);

    requestAnimationFrame(update);
}
update();
</script>

</body>
</html>
