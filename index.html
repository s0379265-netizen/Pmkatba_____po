<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia Lobby 3D Ultimate</title>

<link rel="preload" as="image" href="https://uploadkon.ir/uploads/f78528_26IMG-20260228-063425-277.jpg">
<link rel="preconnect" href="https://uploadkon.ir">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:tahoma;
}

body{
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
    url('https://uploadkon.ir/uploads/f78528_26IMG-20260228-063425-277.jpg') no-repeat center center/cover;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  position:relative;
  overflow:hidden;
  image-rendering: auto; /* کیفیت بهبود یافته */
}

/* نور ملایم حرفه‌ای شبیه مافیامون */
body::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 70% 15%, rgba(0,120,255,0.2), transparent 65%); /* آبی پررنگ‌تر */
  pointer-events:none;
}

/* ===== RIGHT MENU ===== */
.right-menu{
  position:absolute;
  right:0;
  top:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
  border-bottom-left-radius:35px;
  background:linear-gradient(
    145deg,
    rgba(0,120,255,0.25),
    rgba(0,40,120,0.35)
  );
  backdrop-filter:blur(16px); /* کمی شارپ‌تر برای کیفیت بهتر */
  border-left:2px solid rgba(0,180,255,0.4);
  border-bottom:2px solid rgba(0,180,255,0.4);
  box-shadow:
    0 0 26px rgba(0,140,255,0.65),
    inset 0 0 22px rgba(0,200,255,0.35);
  z-index:5;
}

/* کارت‌ها / تصاویر سمت راست */
.side-img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:18px;
  cursor:pointer;
  transition: all 0.35s ease;
  background:linear-gradient(
    145deg,
    rgba(0,160,255,0.35),
    rgba(0,60,130,0.45)
  );
  padding:6px;
  border:2px solid rgba(0,210,255,0.5);
  box-shadow:
    0 0 16px rgba(0,150,255,0.65),
    inset 0 0 11px rgba(0,210,255,0.35);
}

.side-img:hover{
  transform:scale(1.1) rotateY(5deg);
  box-shadow:
    0 0 30px rgba(0,210,255,0.85),
    inset 0 0 16px rgba(0,210,255,0.55);
}

/* ===== PROFILE ===== */
.profile-box{
  position:absolute;
  top:10px;
  left:0px; /* چسبیده به سمت چپ */
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,0.5); /* کمی شفاف‌تر و با کیفیت */
  padding:6px 14px;
  border-radius:30px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 18px rgba(0,0,0,0.8);
}

.profile-img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid gold;
  box-shadow: 0 0 0 5px rgba(0,100,255,0.7); /* حلقه آبی مثل مافیامون */
  image-rendering: auto;
}

.profile-name{
  color:white;
  font-size:16px;
  font-weight:bold;
}

/* ===== MAIN BUTTONS ===== */
.main-buttons{
  display:flex;
  justify-content:center;
  gap:25px;
  padding-bottom:25px;
  z-index:2;
}

.mafia-btn{
  width:200px;
  padding:22px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  transition:0.25s;
}

.rank-btn{
  background: linear-gradient(145deg,#00e676,#009624);
  box-shadow:0 0 18px rgba(0,255,100,0.5);
}

.friend-btn{
  background: linear-gradient(145deg,#2196f3,#0d47a1);
  box-shadow:0 0 18px rgba(0,140,255,0.5);
}

.mafia-btn:hover{
  transform:scale(1.05);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal-content{
  background:linear-gradient(145deg,#001f3f,#003c8f);
  padding:40px;
  border-radius:25px;
  width:300px;
  text-align:center;
  color:white;
}

.modal-content input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
}

.modal-content button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:15px;
  background:#ff1744;
  color:white;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<div class="profile-box">
  <img src="https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg"
       class="profile-img"
       loading="eager"
       decoding="async">
  <div class="profile-name" id="playerName">بازیکن</div>
</div>

<div class="right-menu">
  <img src="https://uploadkon.ir/uploads/dcc628_26IMG-20260228-064312-222.jpg"
       class="side-img"
       loading="eager"
       decoding="async"
       onclick="openSettings()">
  <img src="https://uploadkon.ir/uploads/82c228_26IMG-20260228-064216-922.jpg"
       class="side-img"
       loading="eager"
       decoding="async"
       onclick="comingSoon()">
  <img src="https://uploadkon.ir/uploads/931328_26IMG-20260228-064052-671.jpg"
       class="side-img"
       loading="eager"
       decoding="async"
       onclick="comingSoon()">
</div>

<div class="main-buttons">
  <button class="mafia-btn rank-btn">🎖 بازی امتیازی</button>
  <button class="mafia-btn friend-btn">👥 بازی دوستانه</button>
</div>

<div class="modal" id="nameModal">
  <div class="modal-content">
    <h3>نام خود را وارد کنید</h3>
    <input type="text" id="nameInput" placeholder="نام شما">
    <button onclick="saveName()">ثبت</button>
  </div>
</div>

<div class="modal hidden" id="settingsModal">
  <div class="modal-content">
    <h3>تنظیمات صدا</h3>
    <input type="range" min="0" max="100" value="50">
    <button onclick="closeSettings()">بستن</button>
  </div>
</div>

<script>
let savedName = localStorage.getItem("mafiaPlayerName");

if(savedName){
  document.getElementById("playerName").innerText = savedName;
  document.getElementById("nameModal").style.display = "none";
}

function saveName(){
  let name = document.getElementById("nameInput").value.trim();
  if(name !== ""){
    localStorage.setItem("mafiaPlayerName", name);
    document.getElementById("playerName").innerText = name;
    document.getElementById("nameModal").style.display = "none";
  }
}

function comingSoon(){
  alert("🚧 این بخش به زودی فعال می‌شود");
}

function openSettings(){
  document.getElementById("settingsModal").classList.remove("hidden");
}

function closeSettings(){
  document.getElementById("settingsModal").classList.add("hidden");
}
</script>

</body>
</html>
