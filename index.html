<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mafia Loader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: bgZoomIn 3s ease-out forwards;
    }

    @keyframes bgZoomIn {
      0% { transform: scale(1.05); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .background-layer.fade-out {
      animation: bgFadeOut 0.5s ease-out forwards;
    }

    @keyframes bgFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    .loader-overlay {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: transparent;
      transition: opacity 0.2s ease;
    }

    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner-modern {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .spinner-modern::before,
    .spinner-modern::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: spin3D 0.8s ease-in-out infinite;
    }

    .spinner-modern::before {
      inset: 0;
      background: conic-gradient(from 0deg, #00a0ff, #00f2fe, #4facfe, #00a0ff);
      mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    }

    .spinner-modern::after {
      inset: 6px;
      background: rgba(0, 160, 255, 0.2);
      filter: blur(4px);
      animation: spin3D 0.8s ease-in-out infinite reverse;
    }

    @keyframes spin3D {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7));
      backdrop-filter: blur(12px);
      padding: 15px 20px 20px;
      border-top: 1px solid rgba(0, 160, 255, 0.4);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      padding: 0 5px;
    }

    .progress-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: monospace;
    }

    .progress-percent {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00a0ff, #00f2fe);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: monospace;
    }

    .progress-bar-wrapper {
      width: 100%;
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00a0ff, #00f2fe, #4facfe);
      border-radius: 10px;
      transition: width 0.05s linear;
      box-shadow: 0 0 8px rgba(0, 160, 255, 0.5);
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 5px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.6rem;
      font-family: monospace;
      color: rgba(0, 160, 255, 0.7);
    }

    .stat-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00a0ff;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .blocked-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20000;
      background: linear-gradient(135deg, #0a0a0a, #1a0a0a);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: monospace;
    }

    .blocked-content {
      text-align: center;
      padding: 35px;
      background: rgba(255, 50, 50, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      border: 1px solid rgba(255, 50, 50, 0.5);
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .blocked-icon { font-size: 55px; margin-bottom: 15px; }
    .blocked-title { font-size: 24px; color: #ff4444; margin-bottom: 12px; font-weight: bold; }
    .blocked-text { color: rgba(255, 255, 255, 0.7); font-size: 13px; margin-bottom: 8px; }
    .blocked-ip { color: #ff6666; font-size: 11px; margin-top: 15px; font-family: monospace; }

    .game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 1;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .game-frame.visible { opacity: 1; }
  </style>
</head>
<body>

  <div class="background-layer" id="bgLayer">
    <img class="bg-image" src="https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg" alt="Background">
  </div>

  <div id="loaderOverlay" class="loader-overlay">
    <div class="spinner-modern"></div>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-header">
      <span class="progress-title">بارگذاری بازی</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="progress-stats">
      <div class="stat-item"><div class="stat-dot"></div><span>سرور داخلی</span></div>
      <div class="stat-item"><div class="stat-dot"></div><span id="speedStat">در حال اتصال...</span></div>
      <div class="stat-item"><div class="stat-dot"></div><span id="timeStat">--</span></div>
    </div>
  </div>

  <script>
    (function() {
      const GAME_URL = "";
      const BG_IMAGE_URL = "https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg";
      const VERSION_CHECK_URL = "https://raw.githubusercontent.com/m65394660-sudo/Mfg9/refs/heads/main/version.txt";
      
      // ============================================================
      // 🔴 لیست آی‌پی‌های مسدود شده دائمی 🔴
      // ============================================================
      const HARDCODED_BLOCKED_IPS = [
        "31.171.100.40"     // آی‌پی مسدود شده
        // آی‌پی‌های جدید را اینجا اضافه کنید
      ];
      // ============================================================
      
      const BLOCKED_IPS = [...HARDCODED_BLOCKED_IPS];
      
      let isGameLoaded = false;
      let startTime = Date.now();
      let blockedDetected = false;
      
      const loader = document.getElementById('loaderOverlay');
      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      const speedStat = document.getElementById('speedStat');
      const timeStat = document.getElementById('timeStat');
      const bgLayer = document.getElementById('bgLayer');
      const progressContainer = document.getElementById('progressContainer');

      let currentProgress = 0;
      let targetProgress = 0;
      let animationInterval = null;
      
      // ============================================================
      // 🧹 مدیریت کش و حافظه - پاک کردن کش قدیمی
      // ============================================================
      function clearOldCache() {
        try {
          // پاک کردن کش قدیمی مرورگر برای فایل‌های خاص
          if ('caches' in window) {
            caches.keys().then(keys => {
              keys.forEach(key => {
                if (key.includes('github') || key.includes('raw')) {
                  caches.delete(key);
                  console.log('🗑️ کش قدیمی حذف شد:', key);
                }
              });
            });
          }
          
          // پاک کردن localStorage قدیمی (به جز تنظیمات مهم)
          const keepItems = ['mafia_blocked_ips', 'cached_bg_image'];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && !keepItems.includes(key) && (key.includes('cache') || key.includes('old'))) {
              localStorage.removeItem(key);
              console.log('🗑️ آیتم قدیمی حذف شد:', key);
            }
          }
          
          console.log('✅ مدیریت کش انجام شد');
        } catch(e) {
          console.log('خطا در مدیریت کش:', e);
        }
      }
      
      // ============================================================
      // 🔄 بررسی بروزرسانی از گیت‌هاب
      // ============================================================
      let currentVersion = localStorage.getItem('app_version') || '1.0.0';
      
      async function checkForUpdates() {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000);
          const response = await fetch(VERSION_CHECK_URL + '?t=' + Date.now(), { 
            signal: controller.signal,
            cache: 'no-store'
          });
          clearTimeout(timeoutId);
          
          if (response.ok) {
            const newVersion = (await response.text()).trim();
            if (newVersion && newVersion !== currentVersion) {
              console.log(`🔄 بروزرسانی جدید یافت شد: ${currentVersion} -> ${newVersion}`);
              currentVersion = newVersion;
              localStorage.setItem('app_version', currentVersion);
              
              // پاک کردن کش برای دریافت نسخه جدید
              if ('caches' in window) {
                const cacheNames = await caches.keys();
                for (const name of cacheNames) {
                  await caches.delete(name);
                }
              }
              
              return true;
            }
          }
          return false;
        } catch(e) {
          console.log('خطا در بررسی بروزرسانی:', e);
          return false;
        }
      }
      
      // اجرای مدیریت کش در شروع
      clearOldCache();
      
      console.log('🚫 لیست آی‌پی‌های مسدود شده:');
      BLOCKED_IPS.forEach(ip => console.log(`   🔴 ${ip}`));
      console.log(`📌 نسخه فعلی برنامه: ${currentVersion}`);

      function updateProgressDisplay(percent) {
        const displayPercent = Math.min(300, Math.max(0, Math.floor(percent)));
        const fillPercent = (displayPercent / 300) * 100;
        if (progressFill) progressFill.style.width = fillPercent + '%';
        if (progressPercent) progressPercent.innerText = displayPercent + '%';
      }

      function animateProgress() {
        if (animationInterval) clearInterval(animationInterval);
        animationInterval = setInterval(() => {
          if (currentProgress < targetProgress && !blockedDetected) {
            const diff = targetProgress - currentProgress;
            let step = diff > 50 ? Math.max(3, Math.floor(diff / 10)) : Math.max(1, Math.floor(diff / 5));
            currentProgress = Math.min(currentProgress + step, targetProgress);
            updateProgressDisplay(currentProgress);
          } else if (currentProgress > targetProgress) {
            currentProgress = Math.max(currentProgress - 2, targetProgress);
            updateProgressDisplay(currentProgress);
          } else if (animationInterval) {
            clearInterval(animationInterval);
            animationInterval = null;
          }
        }, 20);
      }

      function setProgress(percent) {
        if (blockedDetected) return;
        targetProgress = Math.min(300, Math.max(0, percent));
        animateProgress();
        
        const elapsed = (Date.now() - startTime) / 1000;
        if (timeStat && !blockedDetected) timeStat.innerText = `${elapsed.toFixed(0)}s`;
        
        if (percent < 30) speedStat.innerText = 'در حال اتصال...';
        else if (percent < 80) speedStat.innerText = 'دریافت داده...';
        else if (percent < 150) speedStat.innerText = 'بارگذاری...';
        else if (percent < 250) speedStat.innerText = 'آماده‌سازی...';
        else speedStat.innerText = 'نهایی‌سازی...';
      }

      async function getUserIP() {
        const apis = [
          'https://api.ipify.org?format=json',
          'https://api.my-ip.io/ip.json',
          'https://ipapi.co/json/'
        ];
        
        for (const api of apis) {
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch(api, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
              const data = await response.json();
              const ip = data.ip || data.query;
              if (ip && ip !== 'unknown') return ip;
            }
          } catch(e) {}
        }
        return 'unknown';
      }

      function showBlockedScreen(ip) {
        blockedDetected = true;
        
        const bgLayerEl = document.getElementById('bgLayer');
        const loaderEl = document.getElementById('loaderOverlay');
        const progressContainerEl = document.getElementById('progressContainer');
        
        if (bgLayerEl) bgLayerEl.style.display = 'none';
        if (loaderEl) loaderEl.style.display = 'none';
        if (progressContainerEl) progressContainerEl.style.display = 'none';
        
        const blockedDiv = document.createElement('div');
        blockedDiv.className = 'blocked-screen';
        blockedDiv.innerHTML = `
          <div class="blocked-content">
            <div class="blocked-icon">🚫</div>
            <div class="blocked-title">دسترسی غیرمجاز</div>
            <div class="blocked-text">شما به دلیل نقض قوانین مسدود شده‌اید</div>
            <div class="blocked-ip">IP: ${ip}</div>
          </div>
        `;
        document.body.appendChild(blockedDiv);
      }

      // پیش‌بارگذاری و کش کردن تصویر پس زمینه
      function preloadAndCacheBackground() {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            try {
              localStorage.setItem('cached_bg_image', BG_IMAGE_URL);
            } catch(e) {}
            resolve();
          };
          img.onerror = () => resolve();
          img.src = BG_IMAGE_URL;
        });
      }

      async function loadGame() {
        try {
          setProgress(5);
          
          // بررسی بروزرسانی (اجرا در پس‌زمینه)
          const updatePromise = checkForUpdates();
          
          setProgress(10);
          
          // دریافت آی‌پی با تایم‌اوت کوتاه
          const ipPromise = getUserIP();
          const timeoutPromise = new Promise(resolve => setTimeout(() => resolve('timeout'), 2000));
          let userIP = await Promise.race([ipPromise, timeoutPromise]);
          
          if (userIP !== 'timeout' && BLOCKED_IPS.includes(userIP)) {
            console.log(`🚫 آی‌پی ${userIP} مسدود است!`);
            showBlockedScreen(userIP);
            return;
          }
          
          setProgress(20);
          
          // بارگذاری همزمان پس زمینه و بازی
          const bgPromise = preloadAndCacheBackground();
          
          setProgress(30);
          
          // دریافت فایل بازی بدون کش برای اطمینان از آخرین نسخه
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);
          const response = await fetch(GAME_URL + '?v=' + currentVersion, { 
            mode: 'cors', 
            cache: 'reload'  // گرفتن آخرین نسخه از سرور
          }).catch(() => null);
          clearTimeout(timeoutId);
          
          let htmlCode;
          if (response && response.ok) {
            htmlCode = await response.text();
            setProgress(120);
          } else {
            setProgress(80);
            htmlCode = `<html><body style="background:#000;"><h2>در حال بارگذاری...</h2><script>setTimeout(()=>location.reload(),2000);<\/script></body></html>`;
          }
          
          await bgPromise;
          setProgress(180);
          
          const oldFrame = document.querySelector('.game-frame');
          if (oldFrame) oldFrame.remove();
          
          const iframe = document.createElement('iframe');
          iframe.className = 'game-frame';
          iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-top-navigation');
          iframe.setAttribute('allow', 'autoplay; fullscreen');
          iframe.srcdoc = htmlCode;
          
          iframe.onload = () => {
            setProgress(300);
            
            // نمایش بازی با کمترین تأخیر
            iframe.classList.add('visible');
            if (bgLayer) bgLayer.classList.add('fade-out');
            if (progressContainer) {
              progressContainer.style.transition = 'opacity 0.3s';
              progressContainer.style.opacity = '0';
              setTimeout(() => { if (progressContainer) progressContainer.style.display = 'none'; }, 300);
            }
            if (loader) loader.classList.add('hidden');
            isGameLoaded = true;
            
            // نمایش پیغام بروزرسانی در صورت نیاز
            updatePromise.then(hasUpdate => {
              if (hasUpdate) {
                console.log('✅ برنامه بروزرسانی شد!');
              }
            });
          };
          
          document.body.appendChild(iframe);
          
          // Fallback سریع
          setTimeout(() => {
            if (loader && !loader.classList.contains('hidden') && !blockedDetected) {
              setProgress(300);
              iframe.classList.add('visible');
              if (bgLayer) bgLayer.classList.add('fade-out');
              if (progressContainer) {
                progressContainer.style.opacity = '0';
                setTimeout(() => { if (progressContainer) progressContainer.style.display = 'none'; }, 300);
              }
              loader.classList.add('hidden');
            }
          }, 1500);
          
        } catch (error) {
          console.error("Error:", error);
          if (!blockedDetected) {
            setProgress(300);
            const iframe = document.createElement('iframe');
            iframe.className = 'game-frame';
            iframe.src = GAME_URL;
            iframe.onload = () => {
              iframe.classList.add('visible');
              if (bgLayer) bgLayer.classList.add('fade-out');
              if (progressContainer) progressContainer.style.display = 'none';
              if (loader) loader.classList.add('hidden');
            };
            document.body.appendChild(iframe);
          }
        }
      }

      console.log('🔧 مدیریت آی‌پی:');
      console.log('📌 برای مسدود کردن آی‌پی، آن را به آرایه HARDCODED_BLOCKED_IPS اضافه کنید');
      console.log('💾 تصویر پس زمینه در کش مرورگر ذخیره شد');
      console.log('🧹 سیستم مدیریت کش فعال است');
      console.log('🔄 بررسی بروزرسانی از گیت‌هاب فعال است');

      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => { loadGame(); });
      });
    })();
  </script>
</body>
</html>
