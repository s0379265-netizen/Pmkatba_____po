<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia Lobby 3D Ultimate</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:tahoma;
}

body{
  height:100vh;
  background:url('https://uploadkon.ir/uploads/3dba27_26IMG-20260227-194042-969.jpg') no-repeat center center/cover;
  background-size:cover;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  position:relative;
  overflow:hidden;
  filter: brightness(1.25) contrast(1.25) saturate(1.35);
  perspective:1500px;
}

/* لایه نور پویا روی تصویر */
body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0; left:0;
  pointer-events:none;
  background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.15), rgba(0,0,0,0.55));
  mix-blend-mode:overlay;
  z-index:1;
  transition: background 0.2s;
}

/* پروفایل سه‌بعدی بالا سمت چپ */
.profile-box{
  position:absolute;
  top:20px;
  left:20px;
  display:flex;
  align-items:center;
  gap:12px;
  z-index:2;
  transform-style: preserve-3d;
}

.profile-img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid gold;
  box-shadow:0 12px 35px rgba(255,215,0,0.85), inset 0 0 22px rgba(255,215,0,0.7);
  transition:0.3s, transform 0.2s;
}

.profile-name{
  color:white;
  font-size:22px;
  font-weight:bold;
  text-shadow: 0 0 15px black, 0 0 30px rgba(0,0,0,0.7);
}

/* دکمه‌های سه‌بعدی پایین */
.main-buttons{
  display:flex;
  justify-content:center;
  gap:25px;
  padding-bottom:2px;
  z-index:2;
  perspective:1500px;
}

.mafia-btn{
  width:200px;
  padding:22px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  transition:0.3s;
  transform-style: preserve-3d;
  box-shadow: 0 14px 32px rgba(0,0,0,0.7), inset 0 -3px 12px rgba(255,255,255,0.25);
}

/* گرادینت‌ها و سایه‌های سه‌بعدی پویا */
.rank-btn{
  background: linear-gradient(145deg,#00e676,#009624);
  box-shadow: 0 14px 38px #00ff66, inset 0 0 30px #00ff66;
}

.friend-btn{
  background: linear-gradient(145deg,#42a5f5,#0d47a1);
  box-shadow: 0 14px 38px #64b5f6, inset 0 0 30px #64b5f6;
}

/* افکت هاور سه‌بعدی با نور پویا */
.mafia-btn:hover{
  transform: rotateX(var(--rx,8deg)) rotateY(var(--ry,8deg)) scale(1.12);
  box-shadow:0 20px 50px #ffeb3b, inset 0 0 40px #ffeb3b;
}

/* فشار واقعی هنگام کلیک */
.mafia-btn:active{
  transform: rotateX(0deg) rotateY(0deg) scale(0.95);
  box-shadow:0 8px 22px #ffeb3b, inset 0 0 22px #ffeb3b;
}

/* دیالوگ وارد کردن اسم شیشه‌ای */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:5;
}

.modal-content{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(45px);
  padding:50px;
  border-radius:40px;
  width:320px;
  text-align:center;
  color:white;
  box-shadow:0 0 85px rgba(0,0,0,0.95);
}

.modal-content input{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:15px;
  outline:none;
  font-size:17px;
}

.modal-content button{
  margin-top:25px;
  padding:16px 35px;
  border:none;
  border-radius:22px;
  background:linear-gradient(145deg,#d50000,#ff1744);
  color:white;
  font-weight:bold;
  font-size:17px;
  cursor:pointer;
  transition:0.3s;
}

.modal-content button:hover{
  transform:scale(1.1);
  box-shadow:0 0 55px #ff0000;
}
</style>
</head>
<body>

<!-- پروفایل -->
<div class="profile-box">
  <img src="https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg" class="profile-img">
  <div class="profile-name" id="playerName">بازیکن</div>
</div>

<!-- دکمه‌های پایین -->
<div class="main-buttons">
  <button class="mafia-btn rank-btn">🎖 بازی امتیازی</button>
  <button class="mafia-btn friend-btn">👥 بازی دوستانه</button>
</div>

<!-- دیالوگ وارد کردن اسم -->
<div class="modal" id="nameModal">
  <div class="modal-content">
    <h3>نام خود را وارد کنید</h3>
    <input type="text" id="nameInput" placeholder="نام شما">
    <button onclick="saveName()">ثبت</button>
  </div>
</div>

<script>
// ذخیره اسم کاربر
let savedName = localStorage.getItem("mafiaPlayerName");
if(savedName){
  document.getElementById("playerName").innerText = savedName;
  document.getElementById("nameModal").style.display = "none";
}

// عملکرد ذخیره اسم
function saveName(){
  let name = document.getElementById("nameInput").value.trim();
  if(name !== ""){
    localStorage.setItem("mafiaPlayerName", name);
    document.getElementById("playerName").innerText = name;
    document.getElementById("nameModal").style.display = "none";
  }
}

// نور پویا روی لایه جدا
document.addEventListener('mousemove', e=>{
  const x = e.clientX / window.innerWidth - 0.5;
  const y = e.clientY / window.innerHeight - 0.5;

  document.querySelectorAll('.mafia-btn').forEach(btn=>{
    btn.style.setProperty('--rx', y*20+'deg');
    btn.style.setProperty('--ry', x*20+'deg');
  });

  document.body.style.setProperty('--mouseX', x);
  document.body.style.setProperty('--mouseY', y);
  document.querySelector('body::after'); // برای مرورگرهای مدرن فقط CSS تغییر می‌کنه
  document.body.style.setProperty('--bgX', 50 + x*20);
  document.body.style.setProperty('--bgY', 35 + y*20);
  document.body.style.setProperty('background', null); // جلوگیری از ریست شدن تصویر
});
</script>

</body>
</html>
