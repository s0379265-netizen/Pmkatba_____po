<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - صفحه پیدا نشد</title>
    <style>
        /* ====== ریست کامل ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ====== کانتینر اصلی (دقیقاً مثل گوگل) ====== */
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        /* ====== لوگوی گوگل (دقیقاً مثل اصلی) ====== */
        .google-logo {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .google-logo .g { color: #4285f4; }
        .google-logo .o1 { color: #ea4335; }
        .google-logo .o2 { color: #fbbc05; }
        .google-logo .l { color: #34a853; }
        .google-logo .e { color: #ea4335; }

        /* ====== عدد ۴۰۴ (دقیقاً مثل گوگل) ====== */
        .error-number {
            font-size: 140px;
            font-weight: 700;
            line-height: 1;
            margin: 5px 0;
            color: #202124;
            letter-spacing: -5px;
        }

        /* ====== عنوان (دقیقاً مثل گوگل) ====== */
        .error-title {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin: 10px 0 5px;
        }

        /* ====== متن خطا (دقیقاً مثل گوگل) ====== */
        .error-message {
            font-size: 15px;
            color: #5f6368;
            line-height: 1.8;
            margin-top: 5px;
        }

        .error-message .farsi {
            display: block;
            font-size: 15px;
            color: #d93025;
            margin-top: 12px;
            padding: 8px 0;
        }

        .error-message .farsi small {
            display: block;
            font-size: 13px;
            color: #5f6368;
            font-weight: 400;
            margin-top: 2px;
        }

        /* ====== خط جداکننده نازک (مثل گوگل) ====== */
        .divider {
            width: 40px;
            height: 1px;
            background: #dadce0;
            margin: 18px auto 12px;
        }

        /* ====== لینک بازگشت (دقیقاً مثل گوگل) ====== */
        .back-link {
            display: inline-block;
            color: #1a73e8;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 0;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* ====== فوتر مینیمال (مثل گوگل) ====== */
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #9aa0a6;
            letter-spacing: 0.3px;
        }

        /* ====== حالت موبایل ====== */
        @media (max-width: 500px) {
            .error-number {
                font-size: 100px;
                letter-spacing: -3px;
            }
            .error-title {
                font-size: 20px;
            }
            .error-message {
                font-size: 14px;
            }
            .container {
                padding: 15px;
            }
            .google-logo {
                font-size: 24px;
            }
        }

        /* ====== اسکرول مخفی ====== */
        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- لوگوی گوگل -->
        <div class="google-logo">
            <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="l">g</span><span class="e">l</span><span class="o1">e</span>
        </div>

        <!-- عدد ۴۰۴ -->
        <div class="error-number">404</div>

        <!-- عنوان -->
        <div class="error-title">صفحه پیدا نشد</div>

        <!-- متن -->
        <div class="error-message">
            متأسفیم، صفحه مورد نظر شما در دسترس نیست.
            <span class="farsi">
                برنامه موجود نمی‌باشد
                <small>سرویس از دسترس خارج شده است</small>
            </span>
        </div>

    
        <!-- فوتر -->
        <div class="footer">© 2026 Google</div>
    </div>

    <script>
        // ======  فقط برای نمایش در کنسول ======
        console.log('🚫 404 - صفحه پیدا نشد');
        console.log('⛔ این سرویس در دسترس نیست');

        // ======  کلیک روی عدد ۴۰۴ (خفن! مثل گوگل) ======
        document.querySelector('.error-number').addEventListener('dblclick', function() {
            this.style.transition = 'all 0.3s ease';
            this.style.transform = 'scale(0.9)';
            this.style.color = '#ea4335';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
                this.style.color = '#202124';
            }, 300);
        });
    </script>
</body>
</html>
