<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بازی من - فروشگاه ویژه</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ===== همه استایل‌های اصلی شما ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.imgurl.ir/uploads/f27572_IMG_20260513_141855_181.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'IRANSans', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* مدال انتخاب نام کاربری */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e1e2f;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            color: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .modal-content button {
            background: #ff9800;
            color: #1e1e2f;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        /* نوار بالایی شفاف */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            z-index: 200;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            direction: ltr;
        }

        .currency-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 18px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .currency-emoji {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .currency-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 1px 2px black;
            letter-spacing: 1px;
        }

        /* پنل پروفایل کاربر */
        .user-panel {
            position: fixed;
            top: 85px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 200;
            direction: ltr;
            cursor: pointer;
        }

        .instagram-story-ring-wrapper {
            position: relative;
            width: 92px;
            height: 92px;
            flex-shrink: 0;
        }

        .instagram-story-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffdc80, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #cc2366, #dc2743, #e6683c, #f09433, #ffdc80);
            padding: 3px;
            animation: rotateRing 3s linear infinite;
            z-index: 1;
            filter: brightness(1.2) saturate(1.4);
        }

        .instagram-story-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.4), rgba(255, 200, 100, 0.6), rgba(255, 100, 100, 0.4), rgba(255, 255, 255, 0.3), transparent);
            animation: rotateRing 2s linear infinite;
            z-index: -1;
            filter: blur(6px);
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .avatar-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            padding: 3px;
        }

        .avatar {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #2c2c3a;
            display: block;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .username-bar {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            padding: 0.9rem 1.8rem 0.9rem 2.2rem;
            border-radius: 0 50px 50px 0;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-left: none;
            margin-left: -14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            max-width: 250px;
            overflow-x: auto;
            scrollbar-width: thin;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* ===== گالری عمودی سمت راست ===== */
        .right-vertical-gallery {
            position: fixed;
            top: 54px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            z-index: 180;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            direction: ltr;
            background: transparent;
            backdrop-filter: none;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        .right-vertical-gallery::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
        
        .right-vertical-gallery {
            scrollbar-width: none;
        }

        .gallery-img-btn {
            cursor: pointer;
            transition: transform 0.2s ease;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
            display: block;
            line-height: 0;
            box-shadow: none;
            border-radius: 0;
        }

        .gallery-img-btn img {
            width: 130px;
            height: auto;
            max-height: 145px;
            object-fit: cover;
            display: block;
            pointer-events: none;
            border: none;
            outline: none;
            box-shadow: none;
            background: transparent;
            border-radius: 0;
        }

        .gallery-img-btn:active {
            transform: scale(0.94);
        }

        .top-row {
            position: fixed;
            bottom: 170px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            z-index: 200;
            direction: rtl;
        }

        .top-btn {
            cursor: pointer;
            transition: transform 0.2s ease;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
        }

        .top-btn img {
            max-width: 320px;
            max-height: 320px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
            pointer-events: none;
        }

        .top-btn:active {
            transform: scale(0.94);
        }

        .bottom-group {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 200;
            direction: rtl;
        }

        .bottom-images {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .bottom-btn {
            cursor: pointer;
            transition: transform 0.2s ease;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
            display: inline-block;
        }

        .bottom-btn img {
            max-width: 170px;
            max-height: 170px;
            object-fit: contain;
            display: block;
            pointer-events: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .bottom-btn:active {
            transform: scale(0.95);
        }

        /* ===== صفحه فروشگاه با پس زمینه آجری ===== */
        .shop-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://parsstock.ir/600/10068/1134063-%D9%BE%D8%B3-%D8%B2%D9%85%DB%8C%D9%86%D9%87-%D8%AF%DB%8C%D9%88%D8%A7%D8%B1-%D8%A2%D8%AC%D8%B1%DB%8C.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInShop 0.4s ease;
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7);
        }

        @keyframes fadeInShop {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .shop-main-content {
            text-align: center;
            background: transparent;
            padding: 0;
            color: #fff;
            width: 100%;
            max-width: 520px;
        }

        .shop-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd89b, #ffaa66, #ff8c42);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .shop-header p {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.55);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            margin-top: 8px;
        }

        .packs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
            padding: 0 20px;
            margin: 25px 0;
        }

        .mafia-pack-card {
            background: linear-gradient(145deg, rgba(25, 20, 15, 0.85), rgba(15, 12, 10, 0.9));
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 170, 80, 0.7);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,200,0.15), 0 0 0 2px rgba(255,140,0,0.2);
            transform: translateY(-2px);
        }

        .mafia-pack-card:active {
            transform: scale(0.96) translateY(2px);
        }

        .mafia-pack-card.disabled-pack {
            opacity: 0.5;
            filter: grayscale(0.3);
            cursor: not-allowed;
            pointer-events: none;
            border-color: #6a6a6a;
            transform: none;
        }

        .pack-icon {
            font-size: 3.6rem;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)) drop-shadow(0 0 5px rgba(255,180,0,0.4));
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .mafia-pack-card:hover .pack-icon {
            transform: scale(1.05);
        }

        .pack-coins {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffdd99, #ffaa44, #ff8800);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,100,0,0.5);
        }

        .pack-coins span {
            font-size: 1rem;
            background: none;
            -webkit-text-fill-color: #ffaa55;
        }

        .pack-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffddbb;
            background: rgba(0, 0, 0, 0.55);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 50px;
            margin-top: 6px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .pack-status {
            margin-top: 12px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 3px 14px;
            border-radius: 30px;
            color: #ffcc88;
            font-weight: 500;
        }

        .shop-gift-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto 10px auto;
            width: 80%;
            max-width: 250px;
            display: block;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .shop-gift-btn:active {
            transform: scale(0.96);
        }

        .close-shop-btn {
            background: linear-gradient(145deg, #2a241e, #1a1612);
            color: #ffdd99;
            border: 1px solid rgba(255, 170, 80, 0.7);
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            width: 80%;
            max-width: 220px;
            backdrop-filter: blur(4px);
        }

        .close-shop-btn:active {
            transform: scale(0.96);
            background: #3a3228;
        }

        .hidden {
            display: none;
        }

        /* ===== استایل‌های اضافه شده برای هدیه (بدون تغییر در ظاهر اصلی) ===== */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .profile-content {
            background: linear-gradient(145deg, #1e2a3a, #0f172a);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 380px;
            border: 2px solid #ffaa44;
            box-shadow: 0 0 40px rgba(255,170,0,0.3);
        }

        .profile-content h2 {
            margin-bottom: 1rem;
            color: #ffaa66;
        }

        .profile-code {
            background: #00000088;
            padding: 12px;
            border-radius: 50px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #ffaa66;
            direction: ltr;
        }

        .profile-copy-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-profile-btn {
            background: #2d3e5a;
            border: none;
            color: #ccc;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
        }

        .gift-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1002;
        }

        .gift-content {
            background: linear-gradient(145deg, #1e2a3a, #0f172a);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 400px;
            border: 2px solid #ffaa44;
            box-shadow: 0 0 40px rgba(255,170,0,0.3);
        }

        .gift-content h2 {
            margin-bottom: 1.5rem;
            color: #ffaa66;
        }

        .gift-content input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 1rem;
            direction: ltr;
        }

        .gift-content select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 1rem;
            margin-bottom: 1rem;
            background: #2d3e5a;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .gift-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .send-gift-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            border: none;
            color: white;
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-gift-btn {
            background: #2d3e5a;
            border: none;
            color: #ccc;
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
        }

        .toast-msg {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a120ccc;
            backdrop-filter: blur(20px);
            color: #ffdd99;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 9999;
            border: 2px solid #ffaa44;
            white-space: nowrap;
            font-family: inherit;
        }

        @media (max-width: 600px) {
            .packs-grid { gap: 16px; padding: 0 15px; }
            .pack-icon { font-size: 2.8rem; }
            .pack-coins { font-size: 1.4rem; }
            .pack-name { font-size: 0.8rem; }
            .shop-header h1 { font-size: 1.9rem; }
            .close-shop-btn { font-size: 1rem; padding: 10px 24px; }
            .profile-content { padding: 1.5rem; }
            .profile-code { font-size: 0.7rem; }
            .toast-msg { font-size: 0.8rem; white-space: normal; text-align: center; width: 80%; }
        }

        @media (max-width: 450px) {
            .packs-grid { gap: 12px; }
            .mafia-pack-card { padding: 15px 8px; }
            .pack-icon { font-size: 2.4rem; }
            .pack-coins { font-size: 1.2rem; }
        }

        @media (max-width: 900px) {
            .top-btn img { max-width: 240px; max-height: 240px; }
            .top-row { gap: 40px; bottom: 150px; }
            .currency-value { font-size: 1rem; }
            .instagram-story-ring-wrapper { width: 84px; height: 84px; }
            .avatar-container { width: 74px; height: 74px; }
            .avatar { width: 68px; height: 68px; }
            .gallery-img-btn img { width: 110px; max-height: 125px; }
        }

        @media (max-width: 700px) {
            .instagram-story-ring-wrapper { width: 78px; height: 78px; }
            .avatar-container { width: 68px; height: 68px; }
            .avatar { width: 62px; height: 62px; }
            .username-bar { font-size: 1rem; padding: 0.6rem 1.4rem 0.6rem 1.8rem; max-width: 180px; }
            .top-btn img { max-width: 190px; max-height: 190px; }
            .bottom-btn img { max-width: 130px; max-height: 130px; }
            .top-row { gap: 30px; bottom: 130px; }
            .gallery-img-btn img { width: 95px; max-height: 105px; }
        }

        @media (max-width: 550px) {
            .top-btn img { max-width: 150px; max-height: 150px; }
            .bottom-btn img { max-width: 105px; max-height: 105px; }
            .top-row { gap: 20px; bottom: 110px; }
            .gallery-img-btn img { width: 80px; max-height: 90px; }
        }
    </style>
</head>
<body>

    <div id="usernameModal" class="modal">
        <div class="modal-content">
            <h2>🎮 انتخاب نام کاربری 🎮</h2>
            <input type="text" id="usernameInput" placeholder="نام خود را وارد کنید..." maxlength="20" autocomplete="off">
            <button id="saveNameBtn">ورود به بازی</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="currency-item">
            <span class="currency-emoji">💎</span>
            <span class="currency-value" id="gemsValue">0</span>
        </div>
        <div class="currency-item">
            <span class="currency-emoji">🪙</span>
            <span class="currency-value" id="coinsValue">0</span>
        </div>
    </div>

    <div class="user-panel" id="profileBtn">
        <div class="instagram-story-ring-wrapper">
            <div class="instagram-story-ring"></div>
            <div class="avatar-container">
                <img class="avatar" id="userAvatar" src="https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg" alt="Avatar">
            </div>
        </div>
        <div class="username-bar" id="usernameDisplay">---</div>
    </div>

    <div class="right-vertical-gallery" id="rightGallery">
        <div class="gallery-img-btn" data-img="1">
            <img src="https://cdn.imgurl.ir/uploads/y004260_InShot__.png" alt="تصویر 1">
        </div>
        <div class="gallery-img-btn" data-img="2">
            <img src="https://cdn.imgurl.ir/uploads/b855600_InShot__.png" alt="تصویر 2">
        </div>
        <div class="gallery-img-btn" data-img="3">
            <img src="https://cdn.imgurl.ir/uploads/58616_InShot__.png" alt="تصویر 3">
        </div>
        <div class="gallery-img-btn" data-img="4">
            <img src="https://cdn.imgurl.ir/uploads/m347400_InShot__.png" alt="تصویر 4">
        </div>
        <div class="gallery-img-btn" data-img="5">
            <img src="https://cdn.imgurl.ir/uploads/l33891_InShot__.png" alt="تصویر 5">
        </div>
    </div>

    <div class="top-row">
        <div class="top-btn" id="topRightBtn">
            <img src="https://cdn.imgurl.ir/uploads/t03630_InShot__.png" alt="عکس بالایی راست">
        </div>
        <div class="top-btn" id="topLeftBtn">
            <img src="https://cdn.imgurl.ir/uploads/u338374_InShot__.png" alt="عکس بالایی چپ">
        </div>
    </div>

    <div class="bottom-group">
        <div class="bottom-images">
            <div class="bottom-btn" id="bottomRightImg">
                <img src="https://cdn.imgurl.ir/uploads/o580196_IMG_20260511_184033_171.jpg" alt="پایین راست">
            </div>
            <div class="bottom-btn" id="bottomCenterImg">
                <img src="https://cdn.imgurl.ir/uploads/b267514_IMG_20260511_184145_633.jpg" alt="پایین وسط">
            </div>
            <div class="bottom-btn" id="bottomLeftImg">
                <img src="https://cdn.imgurl.ir/uploads/d8154_IMG_20260511_184138_470.jpg" alt="پایین چپ">
            </div>
        </div>
    </div>

    <script>
        // ========== تبدیل اعداد به فارسی (فقط برای نمایش) ==========
        function toPersianNumber(number) {
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return number.toString().replace(/\d/g, function(x) {
                return persianDigits[parseInt(x)];
            });
        }

        // ========== کد اصلی شما با اضافه شدن قابلیت هدیه ==========
        
        // ---------- داده‌ها و ذخیره‌سازی ----------
        const modal = document.getElementById('usernameModal');
        const usernameInput = document.getElementById('usernameInput');
        const saveBtn = document.getElementById('saveNameBtn');
        const usernameDisplaySpan = document.getElementById('usernameDisplay');
        const avatarImg = document.getElementById('userAvatar');
        const gemsSpan = document.getElementById('gemsValue');
        const coinsSpan = document.getElementById('coinsValue');

        const topRight = document.getElementById('topRightBtn');
        const topLeft = document.getElementById('topLeftBtn');
        const bottomRight = document.getElementById('bottomRightImg');
        const bottomCenter = document.getElementById('bottomCenterImg');
        const shopButton = document.getElementById('bottomLeftImg');
        const galleryBtns = document.querySelectorAll('.gallery-img-btn');
        const profileBtn = document.getElementById('profileBtn');

        // ===== بخش اضافه شده برای Ably و هدیه =====
        const ABLY_KEY = 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo';
        const CHANNEL_NAME = 'gift-system-channel';
        
        let ably = null;
        let channel = null;
        let currentUserId = '';
        let currentCoins = 0;
        let currentUsername = '';
        // ========================================

        // پکیج‌های سکه روزانه رایگان (4 عدد)
        const DAILY_PACKS = [
            { id: 0, coins: 250, name: "بسته نقره‌ای", emoji: "🥈" },
            { id: 1, coins: 500, name: "بسته طلایی", emoji: "🌟" },
            { id: 2, coins: 100, name: "بسته الماسی", emoji: "💎" },
            { id: 3, coins: 150, name: "بسته رویایی", emoji: "✨" }
        ];

        function updateDisplayCoins() {
            coinsSpan.innerText = toPersianNumber(currentCoins);
        }

        function loadCurrencies() {
            let gems = localStorage.getItem('userGems');
            let coins = localStorage.getItem('userCoins');
            if (gems === null) gems = 1250;
            if (coins === null) coins = 8300;
            localStorage.setItem('userGems', gems);
            localStorage.setItem('userCoins', coins);
            gemsSpan.innerText = toPersianNumber(Number(gems));
            currentCoins = Number(coins);
            updateDisplayCoins();
        }

        function addCoins(amount) {
            let currentCoinsVal = parseInt(localStorage.getItem('userCoins')) || 0;
            currentCoinsVal += amount;
            localStorage.setItem('userCoins', currentCoinsVal);
            currentCoins = currentCoinsVal;
            updateDisplayCoins();
            return currentCoinsVal;
        }

        function removeCoins(amount) {
            let currentCoinsVal = parseInt(localStorage.getItem('userCoins')) || 0;
            if (currentCoinsVal >= amount) {
                currentCoinsVal -= amount;
                localStorage.setItem('userCoins', currentCoinsVal);
                currentCoins = currentCoinsVal;
                updateDisplayCoins();
                return true;
            }
            return false;
        }

        function getPackStatus() {
            let lastClaim = localStorage.getItem('dailyPackClaims');
            if (!lastClaim) return {};
            try { return JSON.parse(lastClaim); } catch(e) { return {}; }
        }

        function updatePackStatus(packId) {
            let status = getPackStatus();
            const today = new Date().toLocaleDateString('en-CA');
            status[packId] = today;
            localStorage.setItem('dailyPackClaims', JSON.stringify(status));
        }

        function canClaimPack(packId) {
            let status = getPackStatus();
            const today = new Date().toLocaleDateString('en-CA');
            const lastDate = status[packId];
            return !lastDate || lastDate !== today;
        }

        function showToast(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        // ===== مدال پروفایل (کپی کد کاربری) =====
        function showProfileModal() {
            if (!currentUserId) {
                showToast('❌ ابتدا نام کاربری خود را انتخاب کنید');
                return;
            }
            
            const modalDiv = document.createElement('div');
            modalDiv.className = 'profile-modal';
            modalDiv.innerHTML = `
                <div class="profile-content">
                    <h2>👤 پروفایل کاربری</h2>
                    <p style="margin-bottom:5px;">نام کاربری:</p>
                    <h3 style="color:#ffaa66;">${currentUsername}</h3>
                    <p style="margin-top:15px;">🆔 کد کاربری شما:</p>
                    <div class="profile-code" id="profileCodeText">${currentUserId}</div>
                    <button class="profile-copy-btn" id="copyCodeFromProfile">📋 کپی کد کاربری</button>
                    <div><button class="close-profile-btn" id="closeProfileBtn">🔙 بستن</button></div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            
            document.getElementById('copyCodeFromProfile').addEventListener('click', () => {
                navigator.clipboard.writeText(currentUserId);
                showToast('📋 کد کاربری کپی شد!', 1500);
            });
            
            document.getElementById('closeProfileBtn').addEventListener('click', () => modalDiv.remove());
            modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.remove(); });
        }

        // ===== اتصال به سرور Ably =====
        function connectToAbly() {
            if (typeof Ably === 'undefined') { return; }
            if (!currentUserId || currentUserId === '') return;
            
            try {
                ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUserId });
                ably.connection.on('connected', () => {
                    channel = ably.channels.get(CHANNEL_NAME);
                    channel.subscribe('send-gift', (message) => {
                        if (message.data && message.data.toUserId === currentUserId) {
                            addCoins(message.data.amount);
                            showToast(`🎁 ${message.data.fromName} به شما ${toPersianNumber(message.data.amount)} سکه هدیه داد! 🎉`);
                        }
                    });
                });
                ably.connection.on('failed', (err) => { console.error('خطا در اتصال:', err); });
            } catch(e) { console.error('خطا:', e); }
        }

        // ===== تابع هدیه دادن =====
        function showGiftModal() {
            const MIN_GIFT_AMOUNT = 50;
            
            if (!currentUserId || currentUserId === '') {
                showToast('❌ ابتدا نام کاربری خود را انتخاب کنید');
                return;
            }
            
            if (currentCoins < MIN_GIFT_AMOUNT) {
                showToast(`❌ حداقل سکه برای هدیه ${toPersianNumber(MIN_GIFT_AMOUNT)} عدد است! موجودی: ${toPersianNumber(currentCoins)}`);
                return;
            }
            
            const modalDiv = document.createElement('div');
            modalDiv.className = 'gift-modal';
            modalDiv.innerHTML = `
                <div class="gift-content">
                    <h2>🎁 هدیه سکه به دوست 🎁</h2>
                    <input type="text" id="targetUserCode" placeholder="کد کاربری دوست خود را وارد کنید..." autocomplete="off">
                    <select id="giftAmountSelect">
                        <option value="50">۵۰ سکه</option>
                        <option value="100">۱۰۰ سکه</option>
                        <option value="200">۲۰۰ سکه</option>
                        <option value="500">۵۰۰ سکه</option>
                        <option value="1000">۱۰۰۰ سکه</option>
                    </select>
                    <div class="gift-buttons">
                        <button class="send-gift-btn" id="confirmGiftBtn">🎁 ارسال هدیه</button>
                        <button class="cancel-gift-btn" id="cancelGiftBtn">❌ انصراف</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            
            const closeModal = () => modalDiv.remove();
            document.getElementById('cancelGiftBtn').addEventListener('click', closeModal);
            document.getElementById('confirmGiftBtn').addEventListener('click', () => {
                const targetCode = document.getElementById('targetUserCode').value.trim();
                const amount = parseInt(document.getElementById('giftAmountSelect').value);
                
                if (!targetCode) { showToast('لطفاً کد کاربری دوست خود را وارد کنید'); return; }
                if (targetCode === currentUserId) { showToast('❌ نمی‌توانید به خودتان سکه هدیه دهید!'); return; }
                if (currentCoins < amount) { showToast(`❌ سکه کافی ندارید! موجودی: ${toPersianNumber(currentCoins)}`); return; }
                
                if (channel) {
                    removeCoins(amount);
                    channel.publish('send-gift', {
                        toUserId: targetCode, fromUserId: currentUserId,
                        fromName: currentUsername, amount: amount, timestamp: Date.now()
                    });
                    showToast(`✅ ${toPersianNumber(amount)} سکه با موفقیت ارسال شد!`);
                    closeModal();
                } else { 
                    showToast('❌ اتصال به سرور برقرار نیست');
                    closeModal();
                }
            });
        }

        // ===== صفحه فروشگاه =====
        function showShopPage() {
            const existingShop = document.querySelector('.shop-page');
            if (existingShop) existingShop.remove();

            const shopPage = document.createElement('div');
            shopPage.className = 'shop-page';
            shopPage.innerHTML = `
                <div class="shop-main-content">
                    <div class="shop-header">
                        <h1>🏪 بازار سیاه</h1>
                        <p>✨ هر روز یک بسته رایگان ویژه ✨</p>
                    </div>
                    <div class="packs-grid" id="packsGrid"></div>
                    <button class="shop-gift-btn" id="shopGiftBtn">🎁 هدیه سکه به دوست</button>
                    <button class="close-shop-btn">🔙 خروج</button>
                </div>
            `;
            document.body.appendChild(shopPage);
            
            function renderPacks() {
                const grid = document.getElementById('packsGrid');
                if (!grid) return;
                grid.innerHTML = '';
                DAILY_PACKS.forEach(pack => {
                    const available = canClaimPack(pack.id);
                    const card = document.createElement('div');
                    card.className = `mafia-pack-card ${!available ? 'disabled-pack' : ''}`;
                    card.innerHTML = `
                        <div class="pack-icon">${pack.emoji}</div>
                        <div class="pack-coins">+${toPersianNumber(pack.coins)} <span>سکه</span></div>
                        <div class="pack-name">${pack.name}</div>
                        <div class="pack-status">${available ? '🔥 دریافت کن' : '✅ انجام شد'}</div>
                    `;
                    if (available) {
                        card.addEventListener('click', (e) => {
                            e.stopPropagation();
                            addCoins(pack.coins);
                            updatePackStatus(pack.id);
                            showToast(`🎁 +${toPersianNumber(pack.coins)} سکه به خزانه اضافه شد! 🎁`);
                            renderPacks();
                        });
                    }
                    grid.appendChild(card);
                });
            }
            
            renderPacks();
            
            const giftBtnInShop = document.getElementById('shopGiftBtn');
            if (giftBtnInShop) {
                giftBtnInShop.addEventListener('click', () => {
                    showGiftModal();
                });
            }
            
            const closeBtn = shopPage.querySelector('.close-shop-btn');
            if (closeBtn) closeBtn.addEventListener('click', () => shopPage.remove());
            shopPage.addEventListener('click', (e) => { if (e.target === shopPage) shopPage.remove(); });
        }

        // ===== مدیریت کاربر =====
        function loadUser() {
            const savedName = localStorage.getItem('gameUsername');
            const savedId = localStorage.getItem('userId');
            
            if (savedName && savedName.trim() !== "") {
                currentUsername = savedName;
                usernameDisplaySpan.innerText = currentUsername;
                modal.classList.add('hidden');
                
                if (savedId) { currentUserId = savedId; }
                else {
                    currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    localStorage.setItem('userId', currentUserId);
                }
                connectToAbly();
            } else {
                modal.classList.remove('hidden');
                usernameInput.value = '';
                usernameInput.focus();
            }
        }

        function saveUsername() {
            let newName = usernameInput.value.trim();
            if (newName === "") { alert("لطفاً یک نام برای خود انتخاب کنید!"); return; }
            if (newName.length > 20) newName = newName.slice(0, 20);
            
            currentUsername = newName;
            currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('gameUsername', currentUsername);
            localStorage.setItem('userId', currentUserId);
            usernameDisplaySpan.innerText = currentUsername;
            modal.classList.add('hidden');
            connectToAbly();
        }

        // ===== رویدادها =====
        saveBtn.addEventListener('click', saveUsername);
        usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveUsername(); });
        
        if (shopButton) shopButton.addEventListener('click', (e) => { e.stopPropagation(); showShopPage(); });
        if (profileBtn) profileBtn.addEventListener('click', () => { showProfileModal(); });
        
        const silentHandler = () => {};
        if (topRight) topRight.addEventListener('click', silentHandler);
        if (topLeft) topLeft.addEventListener('click', silentHandler);
        if (bottomRight) bottomRight.addEventListener('click', silentHandler);
        if (bottomCenter) bottomCenter.addEventListener('click', silentHandler);
        if (galleryBtns.length) galleryBtns.forEach(btn => btn.addEventListener('click', silentHandler));

        usernameDisplaySpan.addEventListener('dblclick', () => {
            modal.classList.remove('hidden');
            usernameInput.value = localStorage.getItem('gameUsername') || '';
            usernameInput.focus();
        });

        avatarImg.onerror = () => { avatarImg.src = "https://via.placeholder.com/80?text=Avatar"; };
        const allImages = document.querySelectorAll('img');
        allImages.forEach(img => {
            img.onerror = () => {};
        });

        loadUser();
        loadCurrencies();

        window.addEventListener('load', () => {
            if (localStorage.getItem('gameUsername')) modal.classList.add('hidden');
            const gallery = document.getElementById('rightGallery');
            if (gallery) {
                gallery.style.background = 'transparent';
                gallery.style.backdropFilter = 'none';
                gallery.style.border = 'none';
            }
        });
    </script>
</body>
</html>
