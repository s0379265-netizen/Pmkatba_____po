<!DOCTYPE html>  
<html lang="fa">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">    
<title>مافیا لابی | گالری بی‌نهایت آواتار</title>  
<link rel="preload" as="image" href="https://cdn.imgurl.ir/uploads/d084228_IMG_20260424_093435_085.jpg">    
<link rel="preconnect" href="https://cdn.imgur.com">  

<style>    
*{ margin:0; padding:0; box-sizing:border-box; font-family:tahoma; }    

body{  
  height:100vh;  
  background:    
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),    
    url('https://cdn.imgurl.ir/uploads/d084228_IMG_20260424_093435_085.jpg') no-repeat center center/cover;    
  background-size: cover;
  display:flex;    
  flex-direction:column;    
  justify-content:flex-end;    
  position:relative;    
  overflow:hidden;    
}    

body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(0,150,255,0.08), transparent 80%);
  pointer-events: none;
  z-index: 0;
}

body::after{    
  content:'';    
  position:absolute;    
  inset:0;    
  background:radial-gradient(circle at 70% 15%, rgba(0,120,255,0.2), transparent 65%);    
  pointer-events:none;    
  z-index: 0;
}
    
/* ===== RIGHT MENU ===== */    
.right-menu{    
  position:absolute;    
  right:0;    
  top:0;    
  display:flex;    
  flex-direction:column;    
  gap:10px;    
  padding:10px;    
  border-bottom-left-radius:35px;    
  background:linear-gradient(145deg, rgba(0,120,255,0.3), rgba(0,40,120,0.4));    
  backdrop-filter:blur(16px);    
  border-left:2px solid rgba(0,210,255,0.5);    
  border-bottom:2px solid rgba(0,210,255,0.5);    
  box-shadow:0 0 26px rgba(0,140,255,0.7), inset 0 0 22px rgba(0,200,255,0.35);    
  z-index:5;    
}    
    
.side-img{    
  width:60px;    
  height:60px;    
  object-fit:cover;    
  border-radius:18px;    
  cursor:pointer;    
  transition: all 0.35s ease;    
  background:linear-gradient(145deg, rgba(0,160,255,0.35), rgba(0,60,130,0.45));    
  padding:5px;    
  border:2px solid rgba(0,210,255,0.5);    
  box-shadow:0 0 16px rgba(0,150,255,0.65), inset 0 0 11px rgba(0,210,255,0.35);    
}    

.side-img:hover{    
  transform:scale(1.1) rotateY(5deg);    
  box-shadow:0 0 30px rgba(0,210,255,0.85), inset 0 0 16px rgba(0,210,255,0.55);    
}  

/* ===== پنل کاربری با رینگ اینستاگرامی ===== */
.profile-box {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(12px);
    padding: 6px 20px 6px 14px;
    border-radius: 60px;
    border: 1px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(255,215,0,0.3);
    cursor: pointer;
    transition: 0.2s;
    z-index: 20;
}
.profile-box:hover { 
    transform: scale(1.02); 
    background: rgba(0,0,0,0.8); 
    border-color: gold;
    box-shadow: 0 0 25px rgba(255,215,0,0.4);
}

.profile-img-wrapper {
    position: relative;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ring-instagram {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #f9ce34, #ee2a7b, #6228d7, #f9ce34);
    z-index: 0;
}
.ring-instagram::before {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: #0a0a0a;
}
@keyframes instagramSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.ring-spin {
    animation: instagramSpin 1.8s linear infinite;
}

.profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    z-index: 1;
}

.user-details { display: flex; flex-direction: column; }
.profile-name { 
    color: white; 
    font-size: 1rem; 
    font-weight: bold; 
    text-shadow: 0 1px 3px black;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
    padding: 2px 10px;
    border-radius: 20px;
    transition: 0.2s;
    display: inline-block;
    width: fit-content;
}
.profile-name:hover { background: rgba(255,215,0,0.3); transform: translateY(-2px); }
.user-level { color: #ffcc88; font-size: 0.75rem; background: #00000066; padding: 3px 12px; border-radius: 20px; margin-top: 5px; width: fit-content; }
.xp-bar { width: 100px; height: 6px; background: #2a3a50; border-radius: 10px; margin-top: 6px; overflow: hidden; }
.xp-fill { height: 100%; width: 0%; background: linear-gradient(145deg, #ffcc00, #ffaa00); border-radius: 10px; }

/* دکمه‌های پایین */    
.main-buttons{    
  display:flex;    
  justify-content:center;    
  align-items:center;
  gap: 55px;
  padding: 0 25px 35px 25px;    
  z-index:2;    
  width: 100%;
}    
.game-btn-img {    
  width: 155px;    
  max-width: 42vw;    
  height: auto;    
  cursor: pointer;    
  background: transparent;    
  transition: all 0.25s ease;    
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}    
.game-btn-img:hover { transform: scale(1.05) translateY(-5px); }

/* لودینگ */
.instagram-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    z-index: 500;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
}
.instagram-loader.show { display: flex; }
.loader-spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid #f9ce34;
    border-right: 4px solid #ee2a7b;
    border-bottom: 4px solid #6228d7;
    border-radius: 50%;
    animation: loaderSpin 0.8s linear infinite;
}
@keyframes loaderSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.loader-text { color: white; font-size: 14px; letter-spacing: 1px; }
.loader-dots { display: flex; gap: 6px; }
.loader-dots span {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    animation: dotPulse 1.4s infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.2s; }
@keyframes dotPulse {
    0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
    30% { transform: scale(1.2); opacity: 1; }
}

/* ========== گالری بی‌نهایت آواتار ========== */
.avatar-fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #001c3d, #000b1a);
    z-index: 200;
    display: none;
    backdrop-filter: blur(8px);
}
.avatar-fullscreen.show { display: block; }

.gallery-circle-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    position: relative;
    overflow-y: auto;
    padding: 80px 20px;
}
.gallery-circle-header {
    color: gold;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 40px;
    text-shadow: 0 0 15px rgba(0,0,0,0.5);
    font-weight: bold;
}
.avatars-circle {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 45px;
    max-width: 1200px;
    margin: 0 auto;
}
.circle-avatar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s ease;
}
.circle-avatar-item:hover {
    transform: scale(1.1);
}
.circle-avatar-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid gold;
    object-fit: cover;
    background: #0a0a0a;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}
.circle-avatar-name {
    color: white;
    font-size: 0.85rem;
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 20px;
}
.load-more-avatars-btn {
    display: block;
    width: 250px;
    margin: 40px auto 20px;
    padding: 14px 30px;
    background: linear-gradient(135deg, gold, #ffaa00);
    border: none;
    border-radius: 50px;
    color: #1a1a1a;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
}
.load-more-avatars-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.back-from-gallery {
    position: fixed;
    bottom: 35px;
    right: 35px;
    background: linear-gradient(145deg, #e67e22, #d35400);
    border: none;
    padding: 12px 35px;
    border-radius: 50px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    z-index: 210;
}
.back-from-gallery:hover {
    transform: scale(1.02);
    background: #f39c12;
}

/* مودال ثبت نام با طراحی روبیکا */
.register-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a0a2a, #000000);
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
}
.register-modal.show { display: flex; }

.register-card {
    max-width: 500px;
    width: 90%;
    background: linear-gradient(145deg, #0f0f2a, #080818);
    border-radius: 50px;
    padding: 40px 35px;
    border: 1px solid rgba(255,215,0,0.4);
    box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.1);
    position: relative;
}
.register-card::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(135deg, rgba(255,215,0,0.2), transparent, rgba(255,215,0,0.2));
    border-radius: 52px;
    z-index: -1;
}

.input-group {
    margin-bottom: 20px;
    position: relative;
}
.input-group label {
    display: block;
    color: rgba(255,215,0,0.8);
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
}
.input-group input {
    width: 100%;
    padding: 16px 18px;
    background: rgba(10,15,25,0.9);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 30px;
    color: white;
    font-size: 15px;
    transition: all 0.3s;
}
.input-group input:focus {
    outline: none;
    border-color: gold;
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
}
.input-group input::placeholder {
    color: #555;
}

.verify-section {
    display: none;
    margin-top: 15px;
    animation: fadeIn 0.3s;
}
.verify-section.show {
    display: block;
}
.timer-text {
    color: rgba(255,215,0,0.7);
    font-size: 11px;
    text-align: center;
    margin-top: 8px;
}

.register-btn {
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
    border: 1px solid rgba(255,215,0,0.4);
    padding: 14px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 15px;
    font-size: 15px;
    transition: all 0.3s;
    color: #ffd700;
}
.register-btn:hover {
    background: rgba(255,215,0,0.3);
    transform: scale(1.01);
    border-color: gold;
}
.register-btn-primary {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a1a1a;
}
.register-btn-primary:hover {
    background: linear-gradient(135deg, #ffea00, #ffbb00);
}

/* مودال کد تایید */
.verify-code-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    z-index: 1100;
    display: none;
    justify-content: center;
    align-items: center;
}
.verify-code-modal.show { display: flex; }
.verify-card {
    max-width: 400px;
    width: 90%;
    background: linear-gradient(145deg, #0f0f2a, #080818);
    border-radius: 40px;
    padding: 40px 30px;
    border: 1px solid rgba(255,215,0,0.5);
    text-align: center;
}
.verify-card h3 {
    color: #ffd700;
    font-size: 24px;
    margin-bottom: 15px;
}
.verify-card p {
    color: white;
    margin-bottom: 20px;
    font-size: 14px;
}
.verify-code-input {
    width: 100%;
    padding: 16px;
    text-align: center;
    font-size: 24px;
    letter-spacing: 8px;
    background: rgba(10,15,25,0.9);
    border: 2px solid rgba(255,215,0,0.5);
    border-radius: 50px;
    color: #ffd700;
    margin-bottom: 20px;
}
.verify-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}
.verify-btn {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    border: none;
    padding: 12px 25px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    color: #1a1a1a;
}
.verify-btn-cancel {
    background: #333;
    color: white;
}
.resend-code-btn {
    background: none;
    border: none;
    color: #ffd700;
    margin-top: 15px;
    cursor: pointer;
    font-size: 12px;
}

.name-edit-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(15px);
    z-index: 400;
    display: none;
    justify-content: center;
    align-items: center;
}
.name-edit-modal.show { display: flex; }
.name-edit-card {
    background: linear-gradient(145deg, #001f3f, #000f2a);
    border-radius: 40px;
    padding: 35px;
    width: 350px;
    max-width: 90%;
    text-align: center;
    border: 2px solid rgba(255, 215, 0, 0.5);
}
.name-edit-card h3 { color: #ffdd99; font-size: 1.8rem; margin-bottom: 20px; }
.name-edit-card input {
    width: 100%;
    padding: 15px;
    background: rgba(10, 30, 50, 0.9);
    border: 2px solid #ffcc66;
    border-radius: 50px;
    color: white;
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 25px;
}
.name-edit-buttons { display: flex; gap: 20px; justify-content: center; }
.btn-save { background: linear-gradient(145deg, #00e676, #009624); color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
.btn-cancel { background: linear-gradient(145deg, #ff5252, #d32f2f); color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

.modal{ position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:20; }    
.modal-content{ background:linear-gradient(145deg,#001f3f,#001a3a); padding:40px; border-radius:25px; width:320px; text-align:center; color:white; }    
.modal-content input{ width:100%; padding:14px; margin-top:15px; border:none; border-radius:10px; background: #0a1a2a; color: white; }    
.modal-content button{ margin-top:20px; padding:12px 25px; border:none; border-radius:15px; background:#ff1744; color:white; cursor:pointer; }    
.hidden{ display:none; }    

#offlineOverlay{ position:fixed; inset:0; display:none; justify-content:center; align-items:center; flex-direction:column; z-index:50; backdrop-filter:blur(16px); background:rgba(0,0,0,0.5); }    
#offlineOverlay .overlay-box{ background:rgba(0,0,0,0.7); padding:35px 55px; border-radius:25px; text-align:center; }    
#offlineOverlay .spinner{ width:55px; height:55px; border:5px solid rgba(255,255,255,0.3); border-top:5px solid #00a0ff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto; }    
@keyframes spin{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }    

@media (max-width: 650px) {
    .circle-avatar-img { width: 65px; height: 65px; }
    .avatars-circle { gap: 25px; }
    .gallery-circle-header { font-size: 1.5rem; margin-bottom: 30px; }
    .register-card { padding: 30px 25px; }
}
</style>  
</head>    
<body>  

<!-- لودینگ -->
<div id="instagramLoader" class="instagram-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">در حال بارگذاری</div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- پنل کاربری -->
<div class="profile-box" id="profilePanel">
    <div class="profile-img-wrapper" id="profileRingWrapper">
        <div class="ring-instagram" id="profileRing"></div>
        <img src="https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg" class="profile-img" id="userAvatarImg">
    </div>
    <div class="user-details">
        <div class="profile-name" id="playerNameDisplay">بازیکن</div>
        <div class="user-level" id="levelText">سطح 1 ⭐</div>
        <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
    </div>
</div>

<!-- مودال تغییر اسم -->
<div id="nameEditModal" class="name-edit-modal">
    <div class="name-edit-card">
        <h3>✏️ تغییر نام</h3>
        <input type="text" id="newNameInput" placeholder="نام جدید" maxlength="20">
        <div class="name-edit-buttons">
            <button class="btn-save" id="saveNameBtn">ذخیره</button>
            <button class="btn-cancel" id="cancelNameBtn">انصراف</button>
        </div>
    </div>
</div>

<!-- گالری بی‌نهایت آواتار -->
<div id="avatarGalleryFull" class="avatar-fullscreen">
    <div class="gallery-circle-container">
        <div class="gallery-circle-header">🎭 انتخاب آواتار</div>
        <div class="avatars-circle" id="avatarsCircleContainer"></div>
        <button class="load-more-avatars-btn" id="loadMoreAvatarsBtn">✨ بارگذاری آواتارهای بیشتر ✨</button>
        <button class="back-from-gallery" id="closeFullGallery">← بازگشت به بازی</button>
    </div>
</div>

<!-- مودال ثبت نام -->
<div id="registerModal" class="register-modal">
    <div class="register-card">
        <div class="input-group">
            <label>📱 شماره موبایل</label>
            <input type="tel" id="regPhone" placeholder="09123456789">
        </div>
        
        <div class="input-group" id="usernameGroup">
            <label>👤 نام کاربری</label>
            <input type="text" id="regUsername" placeholder="نام خود را وارد کنید">
        </div>
        
        <div class="input-group">
            <label>🔒 رمز عبور</label>
            <input type="password" id="regPassword" placeholder="حداقل 6 کاراکتر">
        </div>
        
        <div class="input-group" id="confirmPassGroup">
            <label>🔒 تکرار رمز عبور</label>
            <input type="password" id="regConfirmPassword" placeholder="رمز را دوباره وارد کنید">
        </div>
        
        <button class="register-btn register-btn-primary" id="actionBtn">📱 ثبت نام</button>
        <button class="register-btn" id="toggleModeBtn">قبلاً ثبت نام کرده‌ام</button>
    </div>
</div>

<!-- مودال وارد کردن کد تایید واقعی -->
<div id="verifyCodeModal" class="verify-code-modal">
    <div class="verify-card">
        <h3>🔐 کد تایید</h3>
        <p>کد 6 رقمی به شماره <strong id="displayPhone"></strong> ارسال شد</p>
        <input type="text" id="verifyCodeInput" class="verify-code-input" placeholder="••••••" maxlength="6" inputmode="numeric">
        <div class="verify-buttons">
            <button class="verify-btn" id="submitVerifyBtn">✓ تایید</button>
            <button class="verify-btn verify-btn-cancel" id="cancelVerifyBtn">✗ انصراف</button>
        </div>
        <button class="resend-code-btn" id="resendCodeBtn">🔄 ارسال مجدد کد</button>
        <div id="resendTimer" style="color:#888; font-size:11px; margin-top:10px;"></div>
    </div>
</div>

<!-- مودال تنظیمات -->
<div id="settingsModal" class="modal hidden">
    <div class="modal-content">
        <h3>⚙️ تنظیمات</h3>
        <button id="logoutBtn" style="background:#ff1744; margin-top:20px;">🚪 خروج از حساب</button>
        <button onclick="closeSettings()">بستن</button>
    </div>
</div>

<div class="right-menu">    
  <img src="https://cdn.imgurl.ir/uploads/y752784_IMG_20260228_064312_222.jpg" class="side-img" onclick="openSettings()">

<script>    
// ==================== داده‌های پروفایل ====================
let currentUserName = localStorage.getItem("mafiaPlayerName") || "";
let currentAvatarUrl = localStorage.getItem("userAvatar") || "https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg";
let userLevel = parseInt(localStorage.getItem("userLevel")) || 1;
let userXP = parseInt(localStorage.getItem("userXP")) || 0;
let nextXP = userLevel * 100;
let isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
let currentUserPhone = localStorage.getItem("currentUserPhone") || "";
let currentUserPassword = localStorage.getItem("currentUserPassword") || "";

function updateProfileUI() {
    document.getElementById("playerNameDisplay").innerText = currentUserName || "بازیکن";
    document.getElementById("userAvatarImg").src = currentAvatarUrl;
    document.getElementById("levelText").innerHTML = `سطح ${userLevel} ⭐`;
    let percent = (userXP / nextXP) * 100;
    document.getElementById("xpFill").style.width = percent + "%";
}

function showLoader(message = "در حال بارگذاری") {
    const loader = document.getElementById("instagramLoader");
    loader.querySelector(".loader-text").textContent = message;
    loader.classList.add("show");
}
function hideLoader() { document.getElementById("instagramLoader").classList.remove("show"); }

function startRing() {
    const ring = document.getElementById("profileRing");
    ring.classList.add("ring-spin");
    setTimeout(() => ring.classList.remove("ring-spin"), 5000);
}

function testImage(url) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
        setTimeout(() => resolve(false), 5000);
    });
}

// ==================== سیستم آواتار ====================
async function fetchInfiniteAvatars(count) {
    const newAvatars = [];
    const startIndex = allAvatars.length;
    
    try {
        const since = Math.floor(Math.random() * 100000);
        const response = await fetch(`https://api.github.com/users?since=${since}&per_page=10`);
        if (response.ok) {
            const users = await response.json();
            for (let i = 0; i < users.length && newAvatars.length < count; i++) {
                const user = users[i];
                if (user.avatar_url && user.login) {
                    const isValid = await testImage(user.avatar_url);
                    if (isValid) {
                        newAvatars.push({ src: user.avatar_url, name: user.login });
                    }
                }
            }
        }
    } catch(e) { }
    
    try {
        const response = await fetch(`https://randomuser.me/api/?results=8&inc=picture,name`);
        if (response.ok) {
            const data = await response.json();
            for (const user of data.results) {
                if (user.picture?.large && newAvatars.length < count) {
                    const isValid = await testImage(user.picture.large);
                    if (isValid) {
                        newAvatars.push({ src: user.picture.large, name: `${user.name.first} ${user.name.last}` });
                    }
                }
            }
        }
    } catch(e) { }
    
    const diceStyles = ['adventurer', 'avataaars', 'fun-emoji', 'lorelei', 'micah', 'open-peeps', 'pixel-art', 'thumbs'];
    const bgColors = ['4285f4', 'ea4335', 'fbbc05', '34a853', '9b59b6', 'e74c3c', '3498db', '1abc9c'];
    for (let i = 0; i < count && newAvatars.length < count; i++) {
        const style = diceStyles[Math.floor(Math.random() * diceStyles.length)];
        const bg = bgColors[Math.floor(Math.random() * bgColors.length)];
        const seed = `user_${Date.now()}_${Math.random()}_${i}`;
        newAvatars.push({ src: `https://avatars.dicebear.com/api/${style}/${seed}.svg?background=%23${bg}`, name: `آواتار ${startIndex + i + 1}` });
    }
    return newAvatars.slice(0, count);
}

let allAvatars = [];
let isLoading = false;

function renderAvatars(avatars) {
    const container = document.getElementById("avatarsCircleContainer");
    const startIndex = allAvatars.length - avatars.length;
    avatars.forEach((av, idx) => {
        const item = document.createElement("div");
        item.className = "circle-avatar-item";
        item.innerHTML = `<img src="${av.src}" class="circle-avatar-img" onerror="this.src='https://avatars.dicebear.com/api/identicon/fallback_${Date.now()}.svg'"><div class="circle-avatar-name">${av.name.length > 20 ? av.name.substring(0, 18) + '...' : av.name}</div><div style="font-size:0.7rem; color:#aaa;">#${startIndex + idx + 1}</div>`;
        item.onclick = () => selectAvatar(av.src, av.name);
        container.appendChild(item);
    });
}

async function loadMoreAvatars() {
    if (isLoading) return;
    isLoading = true;
    const loadBtn = document.getElementById("loadMoreAvatarsBtn");
    loadBtn.disabled = true;
    loadBtn.textContent = "⏳ در حال بارگذاری...";
    try {
        const newAvatars = await fetchInfiniteAvatars(12);
        allAvatars.push(...newAvatars);
        renderAvatars(newAvatars);
    } catch(e) { }
    finally {
        isLoading = false;
        loadBtn.disabled = false;
        loadBtn.textContent = "✨ بارگذاری آواتارهای بیشتر ✨";
    }
}

async function selectAvatar(imgSrc, imgName) {
    if (!isLoggedIn) {
        alert('❌ لطفاً ابتدا ثبت نام کنید!');
        document.getElementById("registerModal").classList.add("show");
        return;
    }
    showLoader("در حال تغییر آواتار...");
    setTimeout(() => {
        currentAvatarUrl = imgSrc;
        localStorage.setItem("userAvatar", currentAvatarUrl);
        updateProfileUI();
        hideLoader();
        document.getElementById("avatarGalleryFull").classList.remove("show");
        alert(`✅ آواتار "${imgName}" انتخاب شد!`);
        startRing();
    }, 500);
}

// ==================== سیستم احراز هویت واقعی با API اسنپ ====================

function cleanPhone(phone) {
    let p = phone.replace(/\s/g, '');
    if (p.startsWith('+98')) p = p.substring(3);
    else if (p.startsWith('98')) p = p.substring(2);
    else if (p.startsWith('0')) p = p.substring(1);
    if (!/^9[0-9]{9}$/.test(p)) return null;
    return p;
}

let currentRequestId = null; // شناسه درخواست کد از سمت سرور

// ارسال کد به API واقعی اسنپ
async function sendRealVerificationCode(phone) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    try {
        const response = await fetch('https://app.snapp.taxi/api/api-passenger-oauth/v2/otp', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'User-Agent': 'Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36'
            },
            body: JSON.stringify({ cellphone: phone }),
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (response.ok) {
            const data = await response.json();
            // ذخیره request_id برای تأیید بعدی (در API واقعی نیاز است)
            if (data.data && data.data.request_id) {
                currentRequestId = data.data.request_id;
            }
            return true;
        }
        return false;
    } catch(e) {
        console.error("SMS send error:", e);
        return false;
    }
}

// تایید کد با API واقعی اسنپ
async function verifyCodeWithAPI(phone, code, requestId) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    try {
        const response = await fetch('https://app.snapp.taxi/api/api-passenger-oauth/v2/otp/verify', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'User-Agent': 'Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36'
            },
            body: JSON.stringify({ 
                cellphone: phone, 
                otp: code,
                request_id: requestId 
            }),
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        return response.ok;
    } catch(e) {
        console.error("Verify error:", e);
        return false;
    }
}

let pendingData = {
    phone: "",
    username: "",
    password: "",
    isRegisterMode: true
};
let countdownTimer = null;
let resendSeconds = 60;

function showVerifyModal(phone) {
    document.getElementById("displayPhone").innerText = phone;
    document.getElementById("verifyCodeInput").value = "";
    document.getElementById("verifyCodeModal").classList.add("show");
    startResendTimer();
}

function hideVerifyModal() {
    document.getElementById("verifyCodeModal").classList.remove("show");
    if (countdownTimer) clearInterval(countdownTimer);
}

function startResendTimer() {
    if (countdownTimer) clearInterval(countdownTimer);
    resendSeconds = 60;
    const timerDiv = document.getElementById("resendTimer");
    const resendBtn = document.getElementById("resendCodeBtn");
    resendBtn.disabled = true;
    resendBtn.style.opacity = "0.5";
    
    countdownTimer = setInterval(() => {
        resendSeconds--;
        if (resendSeconds <= 0) {
            clearInterval(countdownTimer);
            timerDiv.innerHTML = "";
            resendBtn.disabled = false;
            resendBtn.style.opacity = "1";
        } else {
            timerDiv.innerHTML = `⏳ ارسال مجدد کد تا ${resendSeconds} ثانیه دیگر`;
        }
    }, 1000);
}

// تکمیل ثبت نام واقعی
function completeRegistration() {
    const cleanPhoneNumber = cleanPhone(pendingData.phone);
    
    currentUserName = pendingData.username;
    currentUserPhone = cleanPhoneNumber;
    currentUserPassword = pendingData.password;
    userLevel = 1;
    userXP = 0;
    isLoggedIn = true;
    
    localStorage.setItem("mafiaPlayerName", currentUserName);
    localStorage.setItem("userAvatar", currentAvatarUrl);
    localStorage.setItem("userLevel", userLevel);
    localStorage.setItem("userXP", userXP);
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("currentUserPhone", cleanPhoneNumber);
    localStorage.setItem("currentUserPassword", pendingData.password);
    localStorage.setItem(`${cleanPhoneNumber}_phone`, cleanPhoneNumber);
    localStorage.setItem(`${cleanPhoneNumber}_pass`, pendingData.password);
    localStorage.setItem(`${cleanPhoneNumber}_name`, pendingData.username);
    
    updateProfileUI();
    document.getElementById('registerModal').classList.remove('show');
    startRing();
    alert(`✨ ثبت نام با موفقیت انجام شد! ✨\nبه مافیا لابی خوش آمدی ${currentUserName}!`);
}

// تکمیل ورود واقعی
function completeLogin() {
    const cleanPhoneNumber = cleanPhone(pendingData.phone);
    
    currentUserName = localStorage.getItem(`${cleanPhoneNumber}_name`) || "بازیکن";
    currentUserPhone = cleanPhoneNumber;
    currentUserPassword = localStorage.getItem(`${cleanPhoneNumber}_pass`);
    userLevel = parseInt(localStorage.getItem("userLevel")) || 1;
    userXP = parseInt(localStorage.getItem("userXP")) || 0;
    isLoggedIn = true;
    
    localStorage.setItem("mafiaPlayerName", currentUserName);
    localStorage.setItem("userLevel", userLevel);
    localStorage.setItem("userXP", userXP);
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("currentUserPhone", cleanPhoneNumber);
    
    updateProfileUI();
    document.getElementById('registerModal').classList.remove('show');
    startRing();
    alert(`✨ خوش آمدید ${currentUserName}! ✨`);
}

// تأیید کد وارد شده توسط کاربر از طریق API واقعی
async function verifyCode() {
    const enteredCode = document.getElementById("verifyCodeInput").value.trim();
    if (enteredCode.length !== 6) {
        alert("❌ لطفاً کد 6 رقمی را وارد کنید!");
        return;
    }
    
    const cleanPhoneNumber = cleanPhone(pendingData.phone);
    if (!cleanPhoneNumber) {
        alert("❌ شماره موبایل نامعتبر است!");
        return;
    }
    
    showLoader("در حال تایید کد...");
    
    // تایید کد با API واقعی اسنپ
    const isValid = await verifyCodeWithAPI(cleanPhoneNumber, enteredCode, currentRequestId);
    
    hideLoader();
    
    if (!isValid) {
        alert("❌ کد وارد شده اشتباه است! لطفاً مجدد تلاش کنید.");
        return;
    }
    
    hideVerifyModal();
    
    if (pendingData.isRegisterMode) {
        completeRegistration();
    } else {
        const savedPass = localStorage.getItem(`${cleanPhoneNumber}_pass`);
        if (savedPass === pendingData.password) {
            completeLogin();
        } else {
            alert("❌ اطلاعات ورود صحیح نیست!");
        }
    }
}

// ارسال کد و نمایش مودال
async function requestAndSendCode(phone, username, password, isRegister) {
    const cleanPhoneNumber = cleanPhone(phone);
    if (!cleanPhoneNumber) {
        alert("❌ شماره موبایل نامعتبر است!");
        return false;
    }
    
    pendingData = {
        phone: phone,
        username: username,
        password: password,
        isRegisterMode: isRegister
    };
    
    showLoader("در حال ارسال پیامک...");
    
    // ارسال کد به API واقعی اسنپ
    const sent = await sendRealVerificationCode(cleanPhoneNumber);
    
    hideLoader();
    
    if (sent) {
        showVerifyModal(phone);
        return true;
    } else {
        alert("❌ خطا در ارسال پیامک! لطفاً دوباره تلاش کنید.");
        return false;
    }
}

// ارسال مجدد کد
document.getElementById("resendCodeBtn").onclick = async function() {
    if (pendingData.phone) {
        const cleanPhoneNumber = cleanPhone(pendingData.phone);
        showLoader("در حال ارسال مجدد پیامک...");
        const sent = await sendRealVerificationCode(cleanPhoneNumber);
        hideLoader();
        if (sent) {
            startResendTimer();
            alert(`✅ کد جدید به شماره ${pendingData.phone} ارسال شد`);
        } else {
            alert("❌ خطا در ارسال مجدد!");
        }
    }
};

// ==================== دکمه اصلی ثبت نام/ورود ====================
let isRegisterMode = true;

document.getElementById("actionBtn").onclick = async function() {
    const phone = document.getElementById("regPhone").value.trim();
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    const confirmPass = document.getElementById("regConfirmPassword").value;
    
    if (!phone) {
        alert("❌ لطفاً شماره موبایل را وارد کنید!");
        return;
    }
    
    const cleanPhoneNumber = cleanPhone(phone);
    if (!cleanPhoneNumber) {
        alert("❌ شماره موبایل نامعتبر است! فرمت صحیح: 09123456789");
        return;
    }
    
    if (isRegisterMode) {
        // حالت ثبت نام
        if (!username) {
            alert("❌ لطفاً نام کاربری را وارد کنید!");
            return;
        }
        if (!password || password.length < 6) {
            alert("❌ رمز عبور باید حداقل 6 کاراکتر باشد!");
            return;
        }
        if (password !== confirmPass) {
            alert("❌ رمز عبور و تکرار آن مطابقت ندارند!");
            return;
        }
        
        // بررسی عدم تکراری بودن شماره
        const existingUser = localStorage.getItem(`${cleanPhoneNumber}_phone`);
        if (existingUser === cleanPhoneNumber) {
            alert("❌ این شماره قبلاً ثبت نام شده است! لطفاً وارد شوید.");
            return;
        }
        
        await requestAndSendCode(phone, username, password, true);
        
    } else {
        // حالت ورود
        if (!password) {
            alert("❌ لطفاً رمز عبور را وارد کنید!");
            return;
        }
        
        const savedPass = localStorage.getItem(`${cleanPhoneNumber}_pass`);
        if (savedPass !== password) {
            alert("❌ رمز عبور اشتباه است!");
            return;
        }
        
        await requestAndSendCode(phone, "", password, false);
    }
};

// دکمه‌های مودال کد
document.getElementById("submitVerifyBtn").onclick = verifyCode;
document.getElementById("cancelVerifyBtn").onclick = function() {
    hideVerifyModal();
    alert("❌ فرآیند ورود/ثبت نام لغو شد.");
};

// تغییر بین حالت ثبت نام و ورود
document.getElementById("toggleModeBtn").onclick = function() {
    isRegisterMode = !isRegisterMode;
    const actionBtn = document.getElementById("actionBtn");
    const usernameGroup = document.getElementById("usernameGroup");
    const confirmGroup = document.getElementById("confirmPassGroup");
    const usernameInput = document.getElementById("regUsername");
    const confirmInput = document.getElementById("regConfirmPassword");
    
    if (isRegisterMode) {
        actionBtn.innerText = "📱 ثبت نام";
        this.innerText = "قبلاً ثبت نام کرده‌ام";
        usernameGroup.style.display = "block";
        confirmGroup.style.display = "block";
        usernameInput.disabled = false;
        confirmInput.disabled = false;
        usernameInput.style.opacity = "1";
        document.querySelector("#usernameGroup label").innerHTML = "👤 نام کاربری";
    } else {
        actionBtn.innerText = "🔐 ورود";
        this.innerText = "ثبت نام جدید";
        usernameGroup.style.display = "none";
        confirmGroup.style.display = "none";
        usernameInput.disabled = true;
        confirmInput.disabled = true;
        usernameInput.style.opacity = "0.6";
    }
};

// ==================== سایر توابع ====================

function saveNewName() {
    let newName = document.getElementById("newNameInput").value.trim();
    if(newName !== "") {
        showLoader("به‌روزرسانی نام...");
        setTimeout(() => {
            currentUserName = newName;
            localStorage.setItem("mafiaPlayerName", currentUserName);
            if (currentUserPhone) {
                localStorage.setItem(`${currentUserPhone}_name`, currentUserName);
            }
            updateProfileUI();
            hideLoader();
            document.getElementById("nameEditModal").classList.remove("show");
            alert(`✅ اسم شما به "${currentUserName}" تغییر کرد`);
            startRing();
        }, 500);
    } else alert("❌ لطفاً یک نام معتبر وارد کنید");
}

function openNameEditModal() {
    document.getElementById("newNameInput").value = currentUserName;
    document.getElementById("nameEditModal").classList.add("show");
}
function closeNameEditModal() { document.getElementById("nameEditModal").classList.remove("show"); }

document.getElementById("playerNameDisplay").onclick = openNameEditModal;
document.getElementById("saveNameBtn").onclick = saveNewName;
document.getElementById("cancelNameBtn").onclick = closeNameEditModal;

document.getElementById("profilePanel").onclick = (e) => {
    if(e.target.classList.contains("profile-name")) return;
    if (!isLoggedIn) {
        document.getElementById("registerModal").classList.add("show");
    } else {
        document.getElementById("avatarGalleryFull").classList.add("show");
    }
};
document.getElementById("closeFullGallery").onclick = () => { document.getElementById("avatarGalleryFull").classList.remove("show"); };
document.getElementById("loadMoreAvatarsBtn").onclick = loadMoreAvatars;

// خروج از حساب
document.getElementById('logoutBtn').onclick = function() {
    if(confirm('آیا از خروج از حساب خود مطمئن هستید؟')) {
        isLoggedIn = false;
        localStorage.setItem("isLoggedIn", "false");
        currentUserName = "بازیکن";
        currentAvatarUrl = "https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg";
        updateProfileUI();
        document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('registerModal').classList.add('show');
        alert('✅ شما از حساب خود خارج شدید.');
    }
};

// تنظیمات اولیه
function openSettings() { document.getElementById("settingsModal").classList.remove("hidden"); }
function closeSettings() { document.getElementById("settingsModal").classList.add("hidden"); }
window.openSettings = openSettings;
window.closeSettings = closeSettings;
window.comingSoon = function(){ alert("🚧 این بخش به زودی فعال می‌شود"); };

if(!localStorage.getItem("mafiaPlayerName")) document.getElementById("nameModal").style.display = "flex";
else document.getElementById("nameModal").style.display = "none";

function saveName() { 
    let name = document.getElementById("nameInput").value.trim(); 
    if(name !== "") { 
        showLoader("ساخت پروفایل...");
        setTimeout(() => {
            localStorage.setItem("mafiaPlayerName", name); 
            currentUserName = name; 
            updateProfileUI(); 
            document.getElementById("nameModal").style.display = "none";
            hideLoader();
            startRing();
        }, 500);
    } 
}
window.saveName = saveName;

function updateOnlineStatus(){ 
    const overlay = document.getElementById("offlineOverlay"); 
    if(overlay) overlay.style.display = navigator.onLine ? "none" : "flex"; 
}    
window.addEventListener('online', updateOnlineStatus); 
window.addEventListener('offline', updateOnlineStatus); 
updateOnlineStatus();

// بارگذاری اولیه
async function initGallery() {
    const initialAvatars = await fetchInfiniteAvatars(12);
    allAvatars.push(...initialAvatars);
    renderAvatars(initialAvatars);
}

if (isLoggedIn && currentUserName) {
    updateProfileUI();
} else {
    document.getElementById('registerModal').classList.add('show');
}

updateProfileUI();
initGallery();
startRing();
</script>
