<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطای اتصال به سرور</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0d0b1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* پس‌زمینه ثابت و بدون حرکت */
        .background-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(220, 38, 38, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 40% 80%, rgba(234, 179, 8, 0.05) 0%, transparent 30%);
            z-index: 0;
        }

        /* کانتینر اصلی برای مرکز کردن دیالوگ */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* دیالوگ اصلی - ثابت و بدون حرکت */
        .error-dialog {
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 580px;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(239, 68, 68, 0.2) inset,
                0 0 30px rgba(239, 68, 68, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* افکت نور ثابت در گوشه‌ها */
        .dialog-glow {
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .dialog-glow.second {
            top: auto;
            right: auto;
            bottom: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
        }

        /* محتوای دیالوگ */
        .dialog-content {
            position: relative;
            z-index: 5;
        }

        /* آیکون خطا */
        .error-icon {
            width: 90px;
            height: 90px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 2px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }

        .error-icon svg {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: #ef4444;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* عنوان خطا */
        .error-title {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            color: transparent;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        /* کد خطا */
        .error-code {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .error-code span {
            font-size: 1.1rem;
            font-weight: 700;
            color: #6b7280;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.35rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            letter-spacing: 1px;
        }

        /* پیام اصلی دیالوگ */
        .dialog-message {
            text-align: center;
            margin: 1.8rem 0;
        }

        .main-message {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-message {
            font-size: 1.2rem;
            color: #9ca3af;
            font-weight: 400;
        }

        /* بخش منتظر بروزرسانی */
        .waiting-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 1.8rem;
            margin: 1.8rem 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .waiting-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(90deg, #ef4444, #f59e0b, #3b82f6, #ef4444);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .waiting-sub {
            font-size: 1.1rem;
            color: #9ca3af;
            font-weight: 400;
        }

        .waiting-sub strong {
            color: #ef4444;
            font-weight: 700;
        }

        /* دکمه‌های دیالوگ */
        .dialog-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 14px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: none;
            min-width: 140px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 10px 20px -8px rgba(220, 38, 38, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            /* بدون تغییر - ثابت */
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            /* بدون تغییر - ثابت */
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        /* جزئیات فنی */
        .technical-details {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .tech-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #6b7280;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .tech-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        .tech-dot.green {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .tech-dot.blue {
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
        }

        /* خطوط نورانی ثابت */
        .static-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
        }

        .static-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.2), transparent);
        }

        .static-line:nth-child(1) { top: 20%; }
        .static-line:nth-child(2) { top: 50%; }
        .static-line:nth-child(3) { top: 80%; }

        /* استایل برای دیالوگ خطا در اتصال */
        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: rgba(239, 68, 68, 0.05);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            margin: 1.5rem 0 0.5rem;
            border: 1px dashed rgba(239, 68, 68, 0.3);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 15px #ef4444;
        }

        .status-text {
            color: #ef4444;
            font-weight: 600;
            font-size: 1rem;
        }

        /* ریسپانسیو */
        @media (max-width: 480px) {
            .error-dialog {
                padding: 1.8rem;
            }
            
            .error-title {
                font-size: 1.8rem;
            }
            
            .main-message {
                font-size: 1.5rem;
            }
            
            .waiting-text {
                font-size: 1.3rem;
            }
            
            .dialog-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- پس‌زمینه ثابت -->
    <div class="background-fixed"></div>
    
    <!-- خطوط ثابت -->
    <div class="static-lines">
        <div class="static-line"></div>
        <div class="static-line"></div>
        <div class="static-line"></div>
    </div>

    <div class="container">
        <!-- دیالوگ خطا -->
        <div class="error-dialog">
            <!-- افکت‌های نوری ثابت -->
            <div class="dialog-glow"></div>
            <div class="dialog-glow second"></div>
            
            <div class="dialog-content">
                <!-- آیکون خطا -->
                <div class="error-icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <circle cx="12" cy="16" r="0.5" fill="#ef4444" stroke="none"/>
                    </svg>
                </div>
                
                <!-- عنوان -->
                <h1 class="error-title">خطا در اتصال به سرور</h1>
                
                <!-- کد خطا -->
                <div class="error-code">
                    <span>ERR_CONNECTION_REFUSED • کد 503</span>
                </div>
                
                <!-- وضعیت اتصال -->
                <div class="connection-status">
                    <div class="status-indicator"></div>
                    <div class="status-text">سرور پاسخ نمی‌دهد</div>
                </div>
                
                <!-- پیام اصلی -->
                <div class="dialog-message">
                    <div class="main-message">ارتباط با سرور برقرار نشد</div>
                    <div class="sub-message">سیستم در حال تلاش مجدد برای برقراری ارتباط است</div>
                </div>
                
                <!-- بخش منتظر بروزرسانی (نسخه اول) -->
                <div class="waiting-section">
                    <div class="waiting-text">لطفاً منتظر بروزرسانی باشند</div>
                    <div class="waiting-sub">تیم فنی در حال رفع مشکل است</div>
                </div>
                
                <!-- بخش منتظر بروزرسانی (نسخه دوم به درخواست شما) -->
                <div class="waiting-section" style="margin-top: -0.5rem; background: rgba(239, 68, 68, 0.03);">
                    <div class="waiting-text" style="font-size: 1.4rem;">منتظر بروزرسانی باشیم</div>
                    <div class="waiting-sub">زمان تخمینی: <strong>نامشخص</strong></div>
                </div>
                
                <!-- دکمه‌های عملیات -->
                <div class="dialog-actions">
                    <button class="btn btn-primary">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        تلاش مجدد
                    </button>
                    <button class="btn btn-secondary">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="12" x2="12" y2="16"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        گزارش مشکل
                    </button>
                </div>
                
                <!-- جزئیات فنی -->
                <div class="technical-details">
                    <div class="tech-item">
                        <div class="tech-dot"></div>
                        <span>وضعیت: قطع</span>
                    </div>
                    <div class="tech-item">
                        <div class="tech-dot green"></div>
                        <span>تلاش: ۳ مرتبه</span>
                    </div>
                    <div class="tech-item">
                        <div class="tech-dot blue"></div>
                        <span>زمان: ۱۴:۳۲</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
