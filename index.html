<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصال روبیکا | چت زنده با پشتیبانی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }
        
        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --secondary: #25D366;
            --accent: #FFD166;
            --light: #f8f9fa;
            --dark: #2D3748;
            --success: #00D26A;
            --danger: #FF3860;
            --warning: #FFDD57;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--dark);
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        
        .logo {
            width: 70px;
            height: 70px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 16px rgba(0, 136, 204, 0.3);
        }
        
        .logo i {
            font-size: 30px;
            color: white;
        }
        
        .header h1 {
            color: var(--dark);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 210, 106, 0.1);
            border-radius: 20px;
            margin-top: 10px;
            font-size: 13px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .chat-container {
            height: 350px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #e8e8e8;
        }
        
        .message {
            max-width: 90%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            position: relative;
        }
        
        .message-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-admin {
            align-self: flex-start;
            background: #e0f7fa;
            color: var(--dark);
            border-bottom-left-radius: 5px;
            border: 1px solid #b2ebf2;
        }
        
        .message-system {
            align-self: center;
            background: rgba(0, 136, 204, 0.1);
            color: var(--primary);
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            max-width: 95%;
            padding: 8px 12px;
        }
        
        .message-from {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
            opacity: 0.8;
        }
        
        .message-user .message-from {
            text-align: left;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .message-admin .message-from {
            text-align: right;
            color: #006064;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: left;
        }
        
        .message-user .message-time {
            text-align: right;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .connection-form {
            background: rgba(0, 136, 204, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group label i {
            color: var(--primary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.1);
        }
        
        .submit-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 136, 204, 0.4);
        }
        
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
        }
        
        .chat-send-btn {
            background: var(--gradient);
            color: white;
            border: none;
            width: 45px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-send-btn:hover {
            transform: scale(1.05);
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
            flex-direction: column;
            align-items: center;
        }
        
        .loading-spinner {
            border: 3px solid rgba(0, 136, 204, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }
        
        .status-message {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .success {
            background-color: rgba(0, 210, 106, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 210, 106, 0.3);
        }
        
        .error {
            background-color: rgba(255, 56, 96, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 56, 96, 0.3);
        }
        
        .info {
            background-color: rgba(0, 136, 204, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 136, 204, 0.3);
        }
        
        .admin-message {
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            
            .chat-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-comments"></i>
            </div>
            <h1>چت پشتیبانی روبیکا</h1>
            <p>تمامی پیام‌های کانال تلگرام به صورت زنده اینجا نمایش داده می‌شود</p>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>دریافت پیام‌های کانال تلگرام</span>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message message-system">
                💬 به چت پشتیبانی خوش آمدید! 
            </div>
            <div class="message message-system">
                تمام پیام‌هایی که در کانال تلگرام ارسال می‌کنید، اینجا نمایش داده می‌شود.
            </div>
        </div>
        
        <div class="connection-form">
            <div class="form-group">
                <label for="userPhone">
                    <i class="fas fa-phone"></i>
                    شماره روبیکا
                </label>
                <input type="tel" id="userPhone" class="form-input" placeholder="09xxxxxxxxx" required>
            </div>
            
            <div class="form-group">
                <label for="userName">
                    <i class="fas fa-user"></i>
                    نام شما
                </label>
                <input type="text" id="userName" class="form-input" placeholder="نام خود را وارد کنید" required>
            </div>
            
            <button class="submit-btn" id="joinChatBtn">
                <span>ورود به چت پشتیبانی</span>
                <i class="fas fa-sign-in-alt"></i>
            </button>
        </div>
        
        <div class="chat-input-area" style="display: none;" id="chatInputArea">
            <input type="text" class="chat-input" id="chatInput" placeholder="پیام خود را بنویسید...">
            <button class="chat-send-btn" id="chatSendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>در حال دریافت پیام‌های جدید...</p>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // عناصر DOM
            const chatContainer = document.getElementById('chatContainer');
            const userPhoneInput = document.getElementById('userPhone');
            const userNameInput = document.getElementById('userName');
            const joinChatBtn = document.getElementById('joinChatBtn');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const chatInputArea = document.getElementById('chatInputArea');
            const loading = document.getElementById('loading');
            const statusMessage = document.getElementById('statusMessage');
            
            // اطلاعات تلگرام
            const botToken = "8461072483:AAGSbxz09pfW0OdlGohgiV0weJxglgGmdDU";
            const channelId = "@rubika_support_channel"; // باید آیدی کانال واقعی شما باشد
            const groupId = "-1002740030739"; // یا آیدی عددی گروه
            
            // وضعیت
            let isJoined = false;
            let userName = '';
            let userPhone = '';
            let lastUpdateId = 0;
            let messageCheckInterval;
            let allMessages = new Set(); // برای جلوگیری از نمایش تکراری
            
            // نمایش وضعیت
            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `status-message ${type}`;
                statusMessage.style.display = 'block';
                
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 4000);
            }
            
            // اضافه کردن پیام به چت
            function addMessage(text, sender, senderName = '', isFromTelegram = false) {
                const messageId = `${Date.now()}_${Math.random()}`;
                
                if (allMessages.has(text)) return; // جلوگیری از تکراری
                allMessages.add(text);
                
                const messageDiv = document.createElement('div');
                
                if (sender === 'system') {
                    messageDiv.className = 'message message-system';
                    messageDiv.innerHTML = `<div>${text}</div>`;
                } else if (sender === 'user') {
                    messageDiv.className = 'message message-user';
                    messageDiv.innerHTML = `
                        <div class="message-from">${senderName || 'شما'}</div>
                        <div>${text}</div>
                        <div class="message-time">همین الان</div>
                    `;
                } else if (sender === 'admin') {
                    messageDiv.className = 'message message-admin';
                    const adminName = isFromTelegram ? '👨‍💼 پشتیبانی' : senderName;
                    messageDiv.innerHTML = `
                        <div class="message-from">${adminName}</div>
                        <div>${text}</div>
                        <div class="message-time">همین الان</div>
                    `;
                }
                
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            
            // ارسال پیام به تلگرام (کانال/گروه)
            async function sendToTelegram(message) {
                try {
                    // روش ۱: ارسال به کانال (اگر بات ادمین باشد)
                    const url1 = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${channelId}&text=${encodeURIComponent(message)}`;
                    
                    // روش ۲: ارسال به گروه
                    const url2 = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${groupId}&text=${encodeURIComponent(message)}`;
                    
                    // استفاده از CORS Proxy
                    const proxyUrl1 = `https://corsproxy.io/?${encodeURIComponent(url1)}`;
                    const proxyUrl2 = `https://corsproxy.io/?${encodeURIComponent(url2)}`;
                    
                    // تلاش برای ارسال به کانال
                    let response = await fetch(proxyUrl1);
                    let data = await response.json();
                    
                    // اگر کانال نشد، به گروه ارسال کن
                    if (!data.ok) {
                        response = await fetch(proxyUrl2);
                        data = await response.json();
                    }
                    
                    if (!data.ok) {
                        throw new Error('خطا در ارسال به تلگرام');
                    }
                    
                    return data;
                } catch (error) {
                    console.error('خطا در ارسال:', error);
                    
                    // حتی اگر ارسال به تلگرام شکست خورد، پیام را در چت نشان بده
                    addMessage(message, 'user', userName);
                    showStatus('پیام شما در چت نمایش داده شد (ارسال به تلگرام ممکن نشد)', 'info');
                    
                    return { ok: false };
                }
            }
            
            // دریافت پیام‌های جدید از تلگرام
            async function checkTelegramMessages() {
                if (!isJoined) return;
                
                try {
                    // گرفتن آخرین پیام‌های بات
                    const url = `https://api.telegram.org/bot${botToken}/getUpdates?offset=${lastUpdateId + 1}&limit=10`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    if (data.ok && data.result.length > 0) {
                        data.result.forEach(update => {
                            lastUpdateId = update.update_id;
                            
                            if (update.channel_post) {
                                // پیام کانال
                                const message = update.channel_post.text;
                                if (message && !message.startsWith('/')) {
                                    addMessage(message, 'admin', '', true);
                                }
                            } else if (update.message) {
                                // پیام خصوصی یا گروهی
                                const message = update.message.text;
                                const from = update.message.from;
                                const chat = update.message.chat;
                                
                                if (message && !message.startsWith('/')) {
                                    // اگر از گروه/کانال است
                                    if (chat.type === 'group' || chat.type === 'supergroup' || chat.type === 'channel') {
                                        const senderName = from ? `${from.first_name || ''} ${from.last_name || ''}`.trim() : 'پشتیبانی';
                                        addMessage(message, 'admin', senderName, true);
                                    }
                                }
                            }
                        });
                    }
                } catch (error) {
                    console.error('خطا در دریافت پیام‌ها:', error);
                }
            }
            
            // گرفتن آخرین پیام‌های کانال (مستقیم)
            async function getChannelMessages() {
                try {
                    // تلاش برای گرفتن پیام‌های کانال
                    const url = `https://api.telegram.org/bot${botToken}/getChatHistory?chat_id=${channelId}&limit=5`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        data.result.messages.forEach(msg => {
                            if (msg.text) {
                                addMessage(msg.text, 'admin', 'پشتیبانی', true);
                            }
                        });
                    }
                } catch (error) {
                    console.log('نمی‌توان پیام‌های کانال را گرفت، از روش getUpdates استفاده می‌کنیم...');
                }
            }
            
            // شروع چک کردن پیام‌ها
            function startMessageChecking() {
                // ابتدا پیام‌های قبلی کانال را بگیر
                getChannelMessages();
                
                // سپس هر 3 ثانیه پیام‌های جدید را چک کن
                messageCheckInterval = setInterval(checkTelegramMessages, 3000);
                
                // همچنین هر 30 ثانیه یکبار کانال را چک کن
                setInterval(getChannelMessages, 30000);
            }
            
            // عضویت در چت
            joinChatBtn.addEventListener('click', async function() {
                const phone = userPhoneInput.value.trim();
                const name = userNameInput.value.trim();
                
                if (!phone || phone.length < 10) {
                    showStatus('لطفاً شماره روبیکای معتبر وارد کنید.', 'error');
                    return;
                }
                
                if (!name) {
                    showStatus('لطفاً نام خود را وارد کنید.', 'error');
                    return;
                }
                
                userPhone = phone;
                userName = name;
                
                // نمایش لودینگ
                loading.style.display = 'flex';
                joinChatBtn.disabled = true;
                
                try {
                    // ارسال اطلاعات کاربر به تلگرام
                    const joinMessage = `👤 کاربر جدید به چت پیوست\n\n📛 نام: ${name}\n📞 شماره: ${phone}\n🕐 زمان: ${new Date().toLocaleString('fa-IR')}\n\n✅ کاربر می‌تواند پیام‌های کانال را ببیند و پاسخ دهد.`;
                    
                    await sendToTelegram(joinMessage);
                    
                    // موفقیت
                    addMessage(`✅ ${name} عزیز، به چت پشتیبانی خوش آمدید!`, 'system');
                    addMessage('شما اکنون به چت متصل هستید. تمام پیام‌های کانال تلگرام اینجا نمایش داده می‌شود.', 'system');
                    addMessage('برای تست، یک پیام در کانال تلگرام ارسال کنید تا اینجا نمایش داده شود.', 'system');
                    
                    // فعال کردن چت
                    isJoined = true;
                    chatInputArea.style.display = 'flex';
                    userPhoneInput.disabled = true;
                    userNameInput.disabled = true;
                    joinChatBtn.textContent = 'متصل شدید';
                    
                    // شروع چک کردن پیام‌ها
                    startMessageChecking();
                    
                    showStatus('با موفقیت به چت متصل شدید!', 'success');
                    
                } catch (error) {
                    console.error('خطا:', error);
                    showStatus('خطا در اتصال. لطفاً دوباره تلاش کنید.', 'error');
                } finally {
                    loading.style.display = 'none';
                    joinChatBtn.disabled = false;
                }
            });
            
            // ارسال پیام از کاربر
            chatSendBtn.addEventListener('click', async function() {
                const message = chatInput.value.trim();
                
                if (!message) return;
                
                // نمایش پیام کاربر در چت
                addMessage(message, 'user', userName);
                chatInput.value = '';
                
                // نمایش لودینگ
                loading.style.display = 'flex';
                
                try {
                    // ارسال پیام به تلگرام
                    const telegramMessage = `💬 پیام از کاربر:\n\n📛 نام: ${userName}\n📞 شماره: ${userPhone}\n📝 پیام: ${message}\n\n🕐 ${new Date().toLocaleString('fa-IR')}`;
                    
                    await sendToTelegram(telegramMessage);
                    
                    addMessage('پیام شما به پشتیبانی ارسال شد.', 'system');
                    
                } catch (error) {
                    console.error('خطا:', error);
                    addMessage('پیام شما در چت ذخیره شد.', 'system');
                } finally {
                    loading.style.display = 'none';
                }
            });
            
            // ارسال با Enter
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    chatSendBtn.click();
                }
            });
            
            // اضافه کردن چند پیام آزمایشی برای نمایش
            setTimeout(() => {
                addMessage('👋 سلام! من مدیر پشتیبانی هستم.', 'admin', 'مدیر');
                addMessage('لطفاً شماره روبیکای خود را وارد کنید تا بتوانید با ما چت کنید.', 'admin', 'پشتیبانی');
            }, 1000);
            
            // تست: اضافه کردن پیام‌های آزمایشی از تلگرام (شبیه‌سازی)
            setTimeout(() => {
                const testMessages = [
                    "✅ کانال پشتیبانی فعال است.",
                    "📞 برای اتصال حساب روبیکا، شماره خود را وارد کنید.",
                    "👨‍💻 تیم پشتیبانی آماده پاسخگویی است.",
                    "🔒 تمامی مکالمات ذخیره می‌شوند."
                ];
                
                testMessages.forEach((msg, index) => {
                    setTimeout(() => {
                        addMessage(msg, 'admin', 'سیستم', true);
                    }, index * 2000);
                });
            }, 3000);
        });
    </script>
