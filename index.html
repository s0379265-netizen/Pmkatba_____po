<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>برنامه اصلی من</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazir', Arial, sans-serif;
            overflow: hidden;
        }
        
        .my-header {
            background: #ff69b4;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .website-container {
            width: 100%;
            height: calc(100vh - 70px);
            position: relative;
            background: #f0f0f0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loading-text {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }

        .loading-text span {
            animation: blink 1.4s infinite;
            opacity: 0;
        }

        .loading-text span:nth-child(2) { animation-delay: 0.2s; }
        .loading-text span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .reload-btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .reload-btn:hover {
            background: #ff1493;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="my-header">
        🌟 برنامه فوق العاده من | نمایش دهنده خودکار سایت‌ها
    </div>
    
    <div class="website-container" id="websiteContainer">
        <div class="loading" id="loadingMsg">
            <div class="loading-text">
                در حال دریافت کدها<span>.</span><span>.</span><span>.</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const sourceUrl = 'https://raw.githubusercontent.com/s0379265-netizen/Pmkatba_____po/refs/heads/main/index.html';
            const container = document.getElementById('websiteContainer');
            
            fetch(sourceUrl)
                .then(response => {
                    if (!response.ok) throw new Error('نتونست بگیره');
                    return response.text();
                })
                .then(htmlCode => {
                    document.getElementById('loadingMsg').style.display = 'none';
                    
                    const siteFrame = document.createElement('iframe');
                    container.appendChild(siteFrame);
                    
                    siteFrame.contentDocument.open();
                    siteFrame.contentDocument.write(htmlCode);
                    siteFrame.contentDocument.close();
                })
                .catch(error => {
                    container.innerHTML = `
                        <div style="text-align:center; padding:50px;">
                            <div style="background: #ffebee; padding:30px; border-radius:15px;">
                                ❌ خطا: ${error.message}<br><br>
                                <button class="reload-btn" onclick="location.reload()">تلاش مجدد</button>
                            </div>
                        </div>
                    `;
                });
        })();
    </script>
</body>
</html>
