<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Call of Duty | دانلودر واقعی فایل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.imgurl.ir/uploads/d084228_IMG_20260424_093435_085.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .cod-card {
            position: relative;
            z-index: 2;
            max-width: 560px;
            width: 100%;
            background: rgba(8, 12, 25, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 20px 25px 30px;
            border: 1px solid rgba(255, 180, 40, 0.8);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-bottom: 30px;
        }

        .cod-logo {
            width: 70px;
            filter: drop-shadow(0 0 8px orange);
            margin-bottom: 5px;
        }

        h1 {
            color: #ffcc44;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff6600;
        }

        .badge {
            background: #cc5500;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffe6cc;
            margin: 8px 0;
        }

        .download-panel {
            background: linear-gradient(145deg, #ffdd66, #ffaa22);
            border-radius: 30px;
            padding: 18px;
            margin: 18px 0;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        .info-line {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #2a2410;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .progress-container {
            background: #2e2a1a;
            border-radius: 60px;
            height: 32px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #22bb33, #88ff66);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            font-weight: bold;
            color: #000;
            font-size: 0.75rem;
            transition: width 0.1s linear;
        }

        .speed-panel {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #2a2410;
            margin-top: 12px;
            background: rgba(0,0,0,0.1);
            padding: 8px 12px;
            border-radius: 40px;
        }

        .military-btn {
            background: linear-gradient(145deg, #cc6600, #883300);
            border: none;
            padding: 16px 0;
            width: 100%;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.05s linear;
            box-shadow: 0 7px 0 #542a00;
        }

        .military-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #542a00;
        }

        .military-btn:disabled {
            opacity: 0.65;
            transform: none;
            cursor: not-allowed;
        }

        .success-message {
            background: #00aa44;
            color: white;
            padding: 12px;
            border-radius: 60px;
            margin-top: 18px;
            font-weight: bold;
            display: none;
        }

        footer {
            font-size: 0.6rem;
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="cod-card">
    <img src="https://cdn-icons-png.flaticon.com/512/552/552222.png" class="cod-logo" alt="logo">
    <h1>💀 WARZONE</h1>
    <div class="badge">🔻 به‌روزرسانی عملیاتی</div>

    <div class="download-panel">
        <div class="info-line">
            <span>📦 حجم بسته:</span>
            <span id="fileSize">در حال محاسبه...</span>
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        <div class="speed-panel">
            <span>⚡ سرعت دانلود:</span>
            <span id="speedText">0 KB/s</span>
        </div>
        <div class="speed-panel">
            <span>⏱️ زمان باقی‌مانده:</span>
            <span id="timeText">--:--</span>
        </div>
    </div>

    <button class="military-btn" id="startBtn">🔻 شروع به‌روزرسانی</button>
    <div id="completeMsg" class="success-message">✅ دانلود کامل شد! فایل ذخیره شد.</div>
    <footer>🔒 دانلود مستقیم | فایل در حافظه دستگاه ذخیره می‌شود</footer>
</div>

<script>
    // ======================== لینک ویدیوی آپارات (دانلود مستقیم فایل) ========================
    const VIDEO_URL = "https://caspian20.cdn.asset.aparat.com/aparat-video/b4325084210ca72cc848b20bb0ba424262248455-240p.mp4?wmsAuthSign=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbiI6IjI3MjFmYTIyNjc2MGQ2OWYxNmFhNDU2NTc3YWI5MDhiIiwiZXhwIjoxNzc3MzAyOTEzLCJpc3MiOiJTYWJhIElkZWEgR1NJRyJ9.AJVUnDZ_sAxGCNrhZVxXZ9cUAvOb8jA8gf5zpFaCvsk";
    
    let isDownloading = false;
    let abortController = null;

    const startBtn = document.getElementById('startBtn');
    const progressFill = document.getElementById('progressFill');
    const speedSpan = document.getElementById('speedText');
    const timeSpan = document.getElementById('timeText');
    const fileSizeSpan = document.getElementById('fileSize');
    const completeMsg = document.getElementById('completeMsg');

    // دریافت حجم واقعی فایل
    async function fetchFileSize(url) {
        try {
            const response = await fetch(url, { method: 'HEAD' });
            const size = response.headers.get('content-length');
            if (size) {
                const mb = (size / 1024 / 1024).toFixed(2);
                fileSizeSpan.innerText = `${mb} MB`;
                return parseInt(size);
            }
        } catch(e) {}
        fileSizeSpan.innerText = "نامشخص";
        return null;
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "00:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // تابع دانلود فایل (بدون پخش، فقط ذخیره در دستگاه کاربر)
    async function downloadFile(url, filename) {
        const response = await fetch(url);
        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
    }

    // شروع دانلود با نمایش پیشرفت (بدون پخش ویدیو)
    async function startRealDownload() {
        if (isDownloading) return;
        isDownloading = true;
        startBtn.disabled = true;
        startBtn.innerText = "📡 در حال دانلود...";
        completeMsg.style.display = "none";

        const totalBytes = await fetchFileSize(VIDEO_URL);
        
        try {
            abortController = new AbortController();
            const response = await fetch(VIDEO_URL, { signal: abortController.signal });
            const reader = response.body.getReader();
            const contentLength = totalBytes || parseInt(response.headers.get('content-length')) || 0;
            
            let receivedLength = 0;
            let chunks = [];
            let startTime = performance.now();
            let lastLoaded = 0;
            let lastTime = startTime;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                chunks.push(value);
                receivedLength += value.length;
                
                if (contentLength > 0) {
                    const percent = (receivedLength / contentLength) * 100;
                    progressFill.style.width = `${percent}%`;
                    progressFill.innerText = `${Math.floor(percent)}%`;
                } else {
                    progressFill.style.width = `${Math.min((receivedLength / (1024 * 1024 * 5)) * 100, 95)}%`;
                }

                const now = performance.now();
                if (now - lastTime >= 500) {
                    const timeDiffSec = (now - lastTime) / 1000;
                    const bytesDiff = receivedLength - lastLoaded;
                    const speedBytesPerSec = bytesDiff / timeDiffSec;
                    const speedKBps = (speedBytesPerSec / 1024).toFixed(0);
                    speedSpan.innerText = `${speedKBps} KB/s`;

                    if (contentLength > 0 && speedBytesPerSec > 0) {
                        const remainingBytes = contentLength - receivedLength;
                        const secondsLeft = remainingBytes / speedBytesPerSec;
                        timeSpan.innerText = formatTime(secondsLeft);
                    }

                    lastLoaded = receivedLength;
                    lastTime = now;
                }
            }

            // ساخت فایل و دانلود مستقیم (بدون پخش)
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'CallOfDuty_Warzone_Video.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);

            // نمایش پیام موفقیت
            completeMsg.style.display = "block";
            progressFill.style.width = "100%";
            progressFill.innerText = "100%";
            speedSpan.innerText = "0 KB/s";
            timeSpan.innerText = "00:00";
            startBtn.innerText = "✔️ دانلود شد";
            startBtn.disabled = true;
            
        } catch (error) {
            console.error("خطا:", error);
            alert("❌ خطا در دانلود. دوباره تلاش کن.");
            resetDownload();
        } finally {
            isDownloading = false;
        }
    }

    function resetDownload() {
        isDownloading = false;
        startBtn.disabled = false;
        startBtn.innerText = "🔻 شروع به‌روزرسانی";
        progressFill.style.width = "0%";
        progressFill.innerText = "0%";
        speedSpan.innerText = "0 KB/s";
        timeSpan.innerText = "--:--";
        completeMsg.style.display = "none";
        if (abortController) abortController.abort();
    }

    startBtn.addEventListener('click', startRealDownload);
    fetchFileSize(VIDEO_URL);
</script>
</body>
</html>
