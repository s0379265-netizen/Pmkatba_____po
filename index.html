<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Connection Error</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}

body{
    height:100vh;
    background:radial-gradient(circle at 30% 30%, #1f2937, #0f172a 70%);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* ===== Overlay ===== */
.overlay{
    position:fixed;
    inset:0;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:fadeIn .5s ease;
}

/* ===== Dialog Card ===== */
.dialog{
    width:92%;
    max-width:460px;
    background:rgba(15,23,42,0.85);
    border-radius:28px;
    padding:40px 30px;
    text-align:center;
    box-shadow:
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    position:relative;
    overflow:hidden;
}

/* Glow border */
.dialog::before{
    content:'';
    position:absolute;
    inset:-2px;
    border-radius:30px;
    padding:2px;
    background:linear-gradient(45deg,#00f2fe,#4facfe,#00f2fe);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

/* Icon */
.icon{
    font-size:70px;
    margin-bottom:18px;
    animation:pulse 2s infinite;
}

/* Text */
h2{
    color:#ffffff;
    font-weight:700;
    font-size:22px;
    margin-bottom:12px;
}

p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.9;
    margin-bottom:25px;
}

/* Button */
button{
    padding:14px 35px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    color:#fff;
    transition:.3s;
    box-shadow:0 12px 35px rgba(0,242,254,0.5);
}
button:hover{
    transform:translateY(-3px) scale(1.05);
}

/* ===== Blue Screen ===== */
.blue-screen{
    position:fixed;
    inset:0;
    background:#0b3cff;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    flex-direction:column;
    padding:30px;
    opacity:0;
    transition:opacity .6s ease;
}

.blue-screen.active{
    opacity:1;
}

.blue-screen h1{
    font-size:24px;
    margin-bottom:15px;
}

.blue-screen p{
    font-size:15px;
    line-height:1.9;
    opacity:.9;
}

/* Animations */
@keyframes fadeIn{
    from{opacity:0;transform:scale(.9);}
    to{opacity:1;transform:scale(1);}
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="overlay" id="overlay">
    <div class="dialog">
        <div class="icon">🚫</div>
        <h2>ارتباط با سرور قطع شد</h2>
        <p>
            در حال حاضر امکان اتصال به سرور وجود ندارد.
            لطفاً اتصال اینترنت خود را بررسی کنید و مجدداً تلاش نمایید.
        </p>
        <button onclick="showBlue()">تلاش مجدد</button>
    </div>
</div>

<div class="blue-screen" id="blueScreen">
    <h1>ما نمی‌توانیم شما را متصل کنیم</h1>
    <p>
        لطفاً چند لحظه منتظر بمانید...
        سیستم در حال تلاش برای برقراری ارتباط مجدد با سرور است.
    </p>
</div>

<script>
function showBlue(){
    document.getElementById("overlay").style.display="none";
    const blue = document.getElementById("blueScreen");
    blue.classList.add("active");
}
</script>

</body>
</html>
