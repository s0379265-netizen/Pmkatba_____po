<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mafia Loader | نسخه نهایی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 20% 30%, #05080f, #000000);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }

    /* ========== پس‌زمینه سینمایی ========== */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: cinematicZoom 7s ease-out forwards;
      filter: brightness(1.08) contrast(1.06) saturate(1.1);
    }
    @keyframes cinematicZoom {
      0% { transform: scale(1.12); opacity: 0; filter: brightness(0.9); }
      15% { opacity: 1; filter: brightness(1.05); }
      100% { transform: scale(1); filter: brightness(1.08); opacity: 1; }
    }
    .background-layer.fade-out {
      animation: smoothFadeOut 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    @keyframes smoothFadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* ========== اسپینر لوکس ========== */
    .loader-overlay {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px;
      transition: opacity 0.4s ease;
    }
    .loader-overlay.hidden { opacity: 0; visibility: hidden; }
    .spinner-modern {
      position: relative;
      width: 44px;
      height: 44px;
    }
    .spinner-modern::before,
    .spinner-modern::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: spinPremium 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .spinner-modern::before {
      inset: 0;
      background: conic-gradient(from 0deg, #00ccff, #00f2fe, #4facfe, #7a2eff, #00ccff);
      mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2px));
    }
    .spinner-modern::after {
      inset: 8px;
      background: rgba(0, 188, 255, 0.25);
      filter: blur(8px);
      animation: spinPremium 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite reverse;
    }
    @keyframes spinPremium {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ========== نوار پیشرفت ۳۰۰% ========== */
    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background: linear-gradient(135deg, rgba(5, 10, 25, 0.92), rgba(2, 6, 18, 0.85));
      backdrop-filter: blur(20px);
      padding: 22px 28px 28px;
      border-top: 1px solid rgba(0, 210, 255, 0.5);
      box-shadow: 0 -20px 45px rgba(0, 0, 0, 0.5);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
      padding: 0 8px;
    }
    .progress-title {
      font-size: 0.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff, #88ccff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }
    .progress-percent {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00e0ff, #0077ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(0,160,255,0.3);
    }
    .progress-bar-wrapper { width: 100%; margin-bottom: 10px; }
    .progress-bar-bg { width: 100%; height: 7px; background: rgba(255, 255, 255, 0.08); border-radius: 20px; overflow: hidden; }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ccff, #3f8eff, #aa66ff);
      border-radius: 20px;
      transition: width 0.05s linear;
      box-shadow: 0 0 12px rgba(0, 180, 255, 0.7);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: waveEffect 1.6s ease-in-out infinite;
    }
    @keyframes waveEffect {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      padding: 0 8px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-family: monospace;
      color: rgba(100, 200, 255, 0.85);
    }
    .stat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00ccff;
      animation: glowDot 1.2s infinite alternate;
    }
    @keyframes glowDot {
      0% { opacity: 0.3; box-shadow: 0 0 0px #00ccff; }
      100% { opacity: 1; box-shadow: 0 0 6px #00ccff; }
    }

    .game-frame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1;
      background: #000; opacity: 0; transition: opacity 0.5s ease;
    }
    .game-frame.visible { opacity: 1; }

    /* ========== دیالوگ بارگذاری با پیش‌لود ========== */
    .loading-dialog {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); backdrop-filter: blur(22px);
      display: flex; align-items: center; justify-content: center; z-index: 30000;
    }
    .loading-dialog-content {
      background: #101018cc; border-radius: 58px; padding: 38px; text-align: center;
      border: 1px solid #00aaff66; width: 85%; max-width: 360px;
    }
    .loading-spinner {
      width: 56px; height: 56px; border: 3px solid rgba(0,170,255,0.2); border-top: 3px solid #00e0ff;
      border-radius: 50%; animation: spinLoad 0.9s linear infinite; margin: 0 auto 25px;
    }
    @keyframes spinLoad { 100% { transform: rotate(360deg); } }
    .loading-text {
      color: #44ddff;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: opacity 0.3s ease;
    }
    .loading-sub {
      color: #88aacc;
      font-size: 0.8rem;
      margin-top: 12px;
      opacity: 0.8;
    }
    .loading-progress-detail {
      margin-top: 18px;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
    }
    .loading-progress-detail-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ccff, #aa66ff);
      border-radius: 20px;
      transition: width 0.2s ease;
    }

    .blocked-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20000;
      background: radial-gradient(circle at center, #1a0a0a, #030005);
      display: flex; align-items: center; justify-content: center;
    }
    .blocked-content {
      background: rgba(0,0,0,0.7); backdrop-filter: blur(28px); border-radius: 56px; padding: 45px;
      border: 1px solid #ff5e5e; text-align: center;
    }
    .blocked-icon { font-size: 72px; margin-bottom: 20px; }
    .blocked-title { font-size: 32px; color: #ff5e5e; font-weight: 800; margin-bottom: 12px; }
    .blocked-text { color: #ffd0d0; font-size: 15px; margin-bottom: 8px; }
    .blocked-ip { background: #2a0505; border-radius: 60px; padding: 6px 20px; margin-top: 22px; display: inline-block; }
  </style>
</head>
<body>

<div class="background-layer" id="bgLayer">
  <img class="bg-image" src="https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg" alt="Background">
</div>
<div id="loaderOverlay" class="loader-overlay"><div class="spinner-modern"></div></div>
<div class="progress-container" id="progressContainer">
  <div class="progress-header">
    <span class="progress-title">ورود</span>
    <span class="progress-percent" id="progressPercent">0%</span>
  </div>
  <div class="progress-bar-wrapper">
    <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="progress-stats">
    <div class="stat-item"><div class="stat-dot"></div><span>سرور</span></div>
    <div class="stat-item"><div class="stat-dot"></div><span id="speedStat">آماده‌سازی</span></div>
    <div class="stat-item"><div class="stat-dot"></div><span id="timeStat">0s</span></div>
  </div>
</div>

<script>
  (function() {
    // ========== منابع ==========
    const GAME_URL = "https://raw.githubusercontent.com/m65394660-sudo/Mfg9/refs/heads/main/Mafia_dark_shaot.html";
    const BG_IMAGE_URL = "https://cdn.imgurl.ir/uploads/u49616_AI_Image_1780044840219.jpg";
    
    // ========== لیست منابع برای پیش‌لود کامل ==========
    const PRELOAD_RESOURCES = [
      BG_IMAGE_URL,
      "https://cdn.imgurl.ir/uploads/m786451_InShot__.png",
      "https://cdn.imgurl.ir/uploads/n146684_InShot__.png",
      "https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg",
      "https://cdn.imgurl.ir/uploads/u505475_InShot__.png",
      "https://cdn.imgurl.ir/uploads/y004260_InShot__.png",
      "https://cdn.imgurl.ir/uploads/b855600_InShot__.png",
      "https://cdn.imgurl.ir/uploads/58616_InShot__.png",
      "https://cdn.imgurl.ir/uploads/l33891_InShot__.png",
      "https://cdn.imgurl.ir/uploads/u84671_InShot__.png",
      "https://cdn.imgurl.ir/uploads/a754787_InShot__.png",
      "https://cdn.imgurl.ir/uploads/j104819_InShot__.png",
      "https://cdn.imgurl.ir/uploads/l4527_InShot__.png",
      "https://cdn.imgurl.ir/uploads/e07616_InShot__.png",
      "https://cdn.imgurl.ir/uploads/y07172_InShot__.png",
      "https://cdn.imgurl.ir/uploads/y3996_InShot__.png",
      "https://parsstock.ir/600/10068/1134063-%D9%BE%D8%B3-%D8%B2%D9%85%DB%8C%D9%86%D9%87-%D8%AF%DB%8C%D9%88%D8%A7%D8%B1-%D8%A2%D8%AC%D8%B1%DB%8C.jpg"
    ];
    
    let isGameLoaded = false;
    let blockedPermanent = false;
    let startTime = Date.now();
    let preloadCompleted = false;
    
    // المان‌ها
    const loaderDiv = document.getElementById('loaderOverlay');
    const progressFill = document.getElementById('progressFill');
    const progressPercentSpan = document.getElementById('progressPercent');
    const speedStatSpan = document.getElementById('speedStat');
    const timeStatSpan = document.getElementById('timeStat');
    const bgLayer = document.getElementById('bgLayer');
    const progressContainer = document.getElementById('progressContainer');
    
    let currentProg = 0, targetProg = 0, animInt = null;
    
    // ========== دیالوگ پیش‌لود ==========
    let loadingDialog = null;
    let loadingTextEl = null;
    let loadingSubEl = null;
    let loadingDetailFill = null;
    
    function showLoadingDialog(mainText, subText, detailPercent) {
      if (loadingDialog) {
        if (loadingTextEl) loadingTextEl.textContent = mainText;
        if (loadingSubEl) loadingSubEl.textContent = subText || '';
        if (loadingDetailFill) loadingDetailFill.style.width = (detailPercent || 0) + '%';
        return;
      }
      
      loadingDialog = document.createElement('div');
      loadingDialog.className = 'loading-dialog';
      loadingDialog.innerHTML = `
        <div class="loading-dialog-content">
          <div class="loading-spinner"></div>
          <div class="loading-text" id="loadingMainText">${mainText}</div>
          <div class="loading-sub" id="loadingSubText">${subText || ''}</div>
          <div class="loading-progress-detail">
            <div class="loading-progress-detail-fill" id="loadingDetailFill" style="width: ${detailPercent || 0}%;"></div>
          </div>
        </div>
      `;
      document.body.appendChild(loadingDialog);
      
      loadingTextEl = document.getElementById('loadingMainText');
      loadingSubEl = document.getElementById('loadingSubText');
      loadingDetailFill = document.getElementById('loadingDetailFill');
    }
    
    function updateLoadingDialog(mainText, subText, detailPercent) {
      if (!loadingDialog) return;
      if (loadingTextEl) loadingTextEl.textContent = mainText;
      if (loadingSubEl) loadingSubEl.textContent = subText || '';
      if (loadingDetailFill) loadingDetailFill.style.width = (detailPercent || 0) + '%';
    }
    
    function hideLoadingDialog() {
      if (loadingDialog) {
        loadingDialog.remove();
        loadingDialog = null;
        loadingTextEl = null;
        loadingSubEl = null;
        loadingDetailFill = null;
      }
    }
    
    // ========== پیشرفت نوار ==========
    function updateProgressBar(percent) {
      let displayVal = Math.min(300, Math.max(0, Math.floor(percent)));
      let widthPercent = (displayVal / 300) * 100;
      if(progressFill) progressFill.style.width = widthPercent + '%';
      if(progressPercentSpan) progressPercentSpan.innerText = displayVal + '%';
    }
    function animateProgress() {
      if(animInt) clearInterval(animInt);
      animInt = setInterval(() => {
        if(currentProg < targetProg && !blockedPermanent && preloadCompleted) {
          let diff = targetProg - currentProg;
          let step = diff > 70 ? Math.max(4, Math.floor(diff/14)) : Math.max(2, Math.floor(diff/7));
          currentProg = Math.min(currentProg + step, targetProg);
          updateProgressBar(currentProg);
        } else if(currentProg > targetProg) {
          currentProg = Math.max(currentProg - 2, targetProg);
          updateProgressBar(currentProg);
        } else if(animInt) {
          clearInterval(animInt); animInt = null;
        }
      }, 22);
    }
    function setProgress(percent) {
      if(blockedPermanent || !preloadCompleted) return;
      targetProg = Math.min(300, Math.max(0, percent));
      animateProgress();
      let elapsed = (Date.now() - startTime)/1000;
      if(timeStatSpan && !blockedPermanent) timeStatSpan.innerText = Math.floor(elapsed) + 's';
      if(percent < 35) speedStatSpan.innerText = 'دریافت منابع';
      else if(percent < 85) speedStatSpan.innerText = 'بارگذاری';
      else if(percent < 170) speedStatSpan.innerText = 'آماده‌سازی';
      else speedStatSpan.innerText = 'نهایی‌سازی';
    }
    
    // ========== مسدودیت IP (فقط لیست سیاه) ==========
    function showGenericBlock(ip) {
      blockedPermanent = true;
      const bg = document.getElementById('bgLayer');
      const prog = document.getElementById('progressContainer');
      const load = document.getElementById('loaderOverlay');
      if(bg) bg.style.display = 'none';
      if(prog) prog.style.display = 'none';
      if(load) load.style.display = 'none';
      if(loadingDialog) loadingDialog.remove();
      const blockDiv = document.createElement('div');
      blockDiv.className = 'blocked-screen';
      blockDiv.innerHTML = `
        <div class="blocked-content">
          <div class="blocked-icon">🚫</div>
          <div class="blocked-title">دسترسی مسدود شد</div>
          <div class="blocked-text">آی‌پی شما در لیست سیاه قرار دارد.</div>
          <div class="blocked-ip">${ip}</div>
        </div>
      `;
      document.body.appendChild(blockDiv);
    }
    
    // ========== دریافت آی‌پی ==========
    async function getUserIp() {
      try {
        const resp = await fetch('https://api.ipify.org?format=json');
        if(resp.ok) { const data = await resp.json(); return data.ip; }
      } catch(e) {}
      return 'unknown';
    }
    
    // ========== تست پینگ (بدون محدودیت) ==========
    async function testPing() {
      try {
        const start = Date.now();
        await fetch('https://www.google.com/favicon.ico', { method: 'HEAD', mode: 'no-cors', cache: 'no-store' });
        return Date.now() - start;
      } catch(e) {
        return 999;
      }
    }
    
    // ========== پیش‌لود کامل همه منابع ==========
    async function preloadAllResources() {
      showLoadingDialog('آماده‌سازی منابع', 'در حال بارگذاری تصاویر...', 0);
      
      let loadedCount = 0;
      const total = PRELOAD_RESOURCES.length;
      
      for (const url of PRELOAD_RESOURCES) {
        try {
          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve();
            img.onerror = () => resolve();
            img.src = url;
          });
          loadedCount++;
          const percent = Math.floor((loadedCount / total) * 100);
          updateLoadingDialog(
            'بارگذاری منابع',
            `${loadedCount} از ${total}`,
            percent
          );
        } catch(e) {
          console.warn('پیش‌لود ناموفق:', url);
        }
      }
      
      // پیش‌لود فایل اصلی بازی
      try {
        await fetch(GAME_URL, { mode: 'cors', cache: "force-cache" });
      } catch(e) {}
      
      updateLoadingDialog('همه منابع آماده است', 'در حال نهایی‌سازی...', 100);
      await new Promise(r => setTimeout(r, 400));
      hideLoadingDialog();
      preloadCompleted = true;
      
      // شروع بارگذاری بازی
      loadGameContent();
    }
    
    // ========== بارگذاری بازی ==========
    async function loadGameContent() {
      if(blockedPermanent || !preloadCompleted) return;
      
      try {
        setProgress(8);
        const ipNow = await getUserIp();
        const blockedIps = ["31.171.100.40"];
        if(blockedIps.includes(ipNow)) { 
          showGenericBlock(ipNow); 
          return; 
        }
        
        setProgress(22);
        
        // تست پینگ (بدون نمایش به کاربر، فقط برای اطلاع)
        const ping = await testPing();
        console.log('پینگ:', ping, 'ms');
        
        setProgress(40);
        const response = await fetch(GAME_URL, { 
          mode: 'cors', 
          cache: "force-cache" 
        }).catch(() => null);
        
        let gameHtml = '';
        if(response && response.ok) {
          gameHtml = await response.text();
          setProgress(135);
        } else {
          setProgress(95);
          gameHtml = `<html><body style="background:#0b0b18;"><div style="color:white;text-align:center;margin-top:45vh;">تلاش مجدد...</div><script>setTimeout(()=>location.reload(),2000);<\/script></body></html>`;
        }
        
        setProgress(200);
        
        const oldFrame = document.querySelector('.game-frame');
        if(oldFrame) oldFrame.remove();
        
        const iframe = document.createElement('iframe');
        iframe.className = 'game-frame';
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-top-navigation');
        iframe.setAttribute('allow', 'autoplay; fullscreen');
        iframe.srcdoc = gameHtml;
        
        iframe.onload = () => {
          setProgress(300);
          iframe.classList.add('visible');
          if(bgLayer) bgLayer.classList.add('fade-out');
          if(progressContainer) {
            progressContainer.style.transition = 'opacity 0.45s';
            progressContainer.style.opacity = '0';
            setTimeout(() => { if(progressContainer) progressContainer.style.display = 'none'; }, 460);
          }
          if(loaderDiv) loaderDiv.classList.add('hidden');
          isGameLoaded = true;
        };
        document.body.appendChild(iframe);
        
        setTimeout(() => {
          if(loaderDiv && !loaderDiv.classList.contains('hidden') && !blockedPermanent && preloadCompleted) {
            setProgress(300);
            iframe.classList.add('visible');
            if(bgLayer) bgLayer.classList.add('fade-out');
            if(progressContainer) {
              progressContainer.style.opacity = '0';
              setTimeout(() => { if(progressContainer) progressContainer.style.display = 'none'; }, 460);
            }
            loaderDiv.classList.add('hidden');
          }
        }, 2100);
      } catch(e) {
        if(!blockedPermanent && preloadCompleted) {
          const fallback = document.createElement('iframe');
          fallback.className = 'game-frame';
          fallback.src = GAME_URL;
          fallback.onload = () => {
            fallback.classList.add('visible');
            if(bgLayer) bgLayer.classList.add('fade-out');
            if(progressContainer) progressContainer.style.display = 'none';
            if(loaderDiv) loaderDiv.classList.add('hidden');
          };
          document.body.appendChild(fallback);
        }
      }
    }
    
    // ========== شروع برنامه ==========
    function startApp() {
      // ابتدا پیش‌لود کامل همه منابع
      preloadAllResources();
    }
    
    window.addEventListener('DOMContentLoaded', () => {
      requestAnimationFrame(() => {
        startApp();
      });
    });
  })();
</script>
</body>
</html>
