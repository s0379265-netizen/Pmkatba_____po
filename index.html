<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 224 - Server Disconnected</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #202124;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e8eaed;
            padding: 20px;
        }

        .error-page {
            text-align: center;
            max-width: 600px;
        }

        .dino-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.9;
            user-select: none;
        }

        .error-heading {
            font-size: 1.4rem;
            font-weight: 400;
            color: #e8eaed;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .error-heading strong {
            color: #f28b82;
            font-weight: 500;
        }

        .error-subtitle {
            font-size: 0.9rem;
            color: #9aa0a6;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .error-code-text {
            font-size: 0.8rem;
            color: #5f6368;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .error-code-text span {
            font-family: 'Courier New', monospace;
            color: #8ab4f8;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="dino-icon"></div>
        
        <p class="error-heading">
            <strong>Server disconnected</strong><br>
            The connection was closed by the developer
        </p>
        
        <p class="error-subtitle">
            This server has been terminated by its operator.<br>
            The service is no longer available on this address.
        </p>

        <p class="error-code-text">
            <span>ERR_CONNECTION_CLOSED</span> &nbsp;|&nbsp; Error 224
        </p>
    </div>
</body>
</html>
