<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطای سرور | منتظر بروزرسانی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0f0c1f, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* انیمیشن پس زمینه گرادیان */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 75, 75, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: gradientShift 10s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ذرات معلق */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* باکس اصلی با افکت شیشه‌ای */
        .error-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem 2rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 30px rgba(255, 75, 75, 0.3);
            animation: cardPulse 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes cardPulse {
            0%, 100% {
                box-shadow: 
                    0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                    0 0 30px rgba(255, 75, 75, 0.3);
            }
            50% {
                box-shadow: 
                    0 25px 60px -10px rgba(255, 75, 75, 0.5),
                    0 0 0 2px rgba(255, 255, 255, 0.2) inset,
                    0 0 50px rgba(255, 75, 75, 0.6);
            }
        }

        /* خطای 503 با افکت سه بعدی */
        .error-code {
            font-size: 12rem;
            font-weight: 900;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 4px rgba(255, 75, 75, 0.8);
            text-shadow: 
                0 0 20px rgba(255, 75, 75, 0.5),
                0 0 40px rgba(255, 75, 75, 0.3),
                0 0 80px rgba(255, 75, 75, 0.2);
            animation: glitch 3s infinite;
            position: relative;
            margin-bottom: 1rem;
            letter-spacing: 10px;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(10deg, 2deg) scale(1.02); opacity: 0.9; }
            97% { transform: skew(-10deg, -2deg) scale(0.98); opacity: 0.9; }
            98% { transform: skew(5deg, 1deg) scale(1.01); opacity: 0.95; }
        }

        .error-code::before,
        .error-code::after {
            content: '503';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.8;
        }

        .error-code::before {
            color: #ff4b4b;
            -webkit-text-stroke: 2px #ff4b4b;
            animation: glitchBefore 2s infinite;
            z-index: -1;
        }

        .error-code::after {
            color: #00ffff;
            -webkit-text-stroke: 2px #00ffff;
            animation: glitchAfter 2s infinite;
            z-index: -2;
        }

        @keyframes glitchBefore {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-5px, -2px); }
            60% { transform: translate(5px, 3px); }
            80% { transform: translate(3px, -2px); }
        }

        @keyframes glitchAfter {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(5px, -2px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-5px, -2px); }
            80% { transform: translate(-3px, 3px); }
        }

        /* عنوان خطا */
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin: 0.5rem 0 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background: linear-gradient(45deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); letter-spacing: 2px; }
            50% { filter: brightness(1.2); letter-spacing: 4px; }
        }

        /* پیام منتظر بروزرسانی */
        .waiting-message {
            font-size: 2rem;
            font-weight: 700;
            margin: 2rem 0;
            color: transparent;
            background: linear-gradient(90deg, #ff4b4b, #ffd700, #00ffff, #ff4b4b);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientFlow 3s linear infinite, textPulse 2s ease-in-out infinite;
            position: relative;
            display: inline-block;
            padding: 0.5rem 2rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* آیکون لودینگ */
        .loading-spinner {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .spinner-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4b4b, #ffd700);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .spinner-dot:nth-child(1) { animation-delay: -0.32s; }
        .spinner-dot:nth-child(2) { animation-delay: -0.16s; }
        .spinner-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* نوار پیشرفت */
        .progress-bar {
            width: 80%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 2rem auto;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #ff4b4b, #ffd700, #00ffff);
            border-radius: 10px;
            animation: progress 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        @keyframes progress {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(300%); }
        }

        /* متن اضافی با افکت */
        .additional-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .additional-text span {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; background: rgba(255, 75, 75, 0.2); }
        }

        /* خطوط نورانی در حال چرخش */
        .rotating-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 5;
        }

        .line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 75, 75, 0.3), transparent);
            transform-origin: center;
            animation: rotate 4s linear infinite;
        }

        .line:nth-child(2) {
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            animation-duration: 6s;
        }

        .line:nth-child(3) {
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            animation-duration: 8s;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ریسپانسیو */
        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
                -webkit-text-stroke: 3px rgba(255, 75, 75, 0.8);
            }
            
            .error-title {
                font-size: 1.8rem;
            }
            
            .waiting-message {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- ذرات معلق -->
    <div class="particles" id="particles"></div>

    <!-- خطوط نورانی در حال چرخش -->
    <div class="rotating-lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div class="container">
        <div class="error-card">
            <h1 class="error-code">503</h1>
            <h2 class="error-title">خطا در ارتباط با سرور</h2>
            
            <!-- پیام اصلی با افکت -->
            <div class="waiting-message">
                لطفاً منتظر بروزرسانی باشید
            </div>
            
            <!-- لودینگ اسپینر -->
            <div class="loading-spinner">
                <div class="spinner-dot"></div>
                <div class="spinner-dot"></div>
                <div class="spinner-dot"></div>
            </div>
            
            <!-- نوار پیشرفت -->
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <!-- متن اضافی -->
            <div class="additional-text">
                <span>⚡ تیم فنی در حال رفع مشکل</span>
                <span>🔄 تلاش برای برقراری مجدد</span>
                <span>⏳ زمان تخمینی: نامشخص</span>
            </div>
            
            <!-- نسخه دوم پیام (به درخواست شما) -->
            <div class="waiting-message" style="margin-top: 1rem; font-size: 1.8rem;">
                منتظر بروزرسانی باشیم
            </div>
        </div>
    </div>

    <script>
        // ایجاد ذرات معلق
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // موقعیت تصادفی
                const left = Math.random() * 100;
                const size = Math.random() * 6 + 2;
                const duration = Math.random() * 20 + 10;
                const delay = Math.random() * 10;
                
                particle.style.left = left + '%';
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animation = `float ${duration}s ${delay}s linear infinite`;
                particle.style.background = `rgba(255, ${Math.floor(Math.random() * 155 + 100)}, ${Math.floor(Math.random() * 100)}, ${Math.random() * 0.5 + 0.3})`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // ایجاد افکت ترمینال روی متن
        function addTerminalEffect() {
            const messages = document.querySelectorAll('.waiting-message');
            messages.forEach(msg => {
                msg.addEventListener('mouseover', () => {
                    msg.style.transform = 'scale(1.02)';
                    msg.style.transition = 'all 0.3s ease';
                });
                
                msg.addEventListener('mouseout', () => {
                    msg.style.transform = 'scale(1)';
                });
            });
        }

        // راه‌اندازی
        window.addEventListener('load', () => {
            createParticles();
            addTerminalEffect();
        });

        // اضافه کردن ذرات جدید هر چند ثانیه
        setInterval(() => {
            const particles = document.getElementById('particles');
            if (particles.children.length < 70) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animation = `float ${Math.random() * 20 + 10}s ${Math.random() * 10}s linear infinite`;
                particles.appendChild(particle);
                
                // حذف ذرات اضافی
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.remove();
                    }
                }, 30000);
            }
        }, 2000);
    </script>
</body>
</html>
