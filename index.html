<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>مافیامون | در حال بروزرسانی سرور</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
  }

  body {
    height: 100vh;
    background: url('https://uploadkon.ir/uploads/3dba27_26IMG-20260227-194042-969.jpg') no-repeat center center/cover;
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    overflow: hidden;
    filter: brightness(1.25) contrast(1.25) saturate(1.35);
  }

  body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.15), rgba(0,0,0,0.55));
    mix-blend-mode: overlay;
    z-index: 1;
  }

  .profile-box {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }

  .profile-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid gold;
    box-shadow: 0 12px 35px rgba(255,215,0,0.85);
  }

  .profile-name {
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 15px black;
  }

  .main-buttons {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding-bottom: 30px;
    z-index: 2;
  }

  .mafia-btn {
    width: 200px;
    padding: 22px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 14px 32px rgba(0,0,0,0.7);
  }

  .rank-btn {
    background: linear-gradient(145deg, #00e676, #009624);
    box-shadow: 0 14px 38px #00ff66;
  }

  .friend-btn {
    background: linear-gradient(145deg, #42a5f5, #0d47a1);
    box-shadow: 0 14px 38px #64b5f6;
  }

  .mafia-btn:hover {
    transform: scale(1.1);
  }

  /* دیالوگ سرور - حرفه‌ای */
  .server-dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .server-dialog {
    background: linear-gradient(145deg, rgba(20, 40, 60, 0.95), rgba(10, 25, 40, 0.98));
    backdrop-filter: blur(20px);
    border-radius: 60px;
    padding: 50px 40px;
    width: 90%;
    max-width: 550px;
    text-align: center;
    border: 2px solid rgba(255, 215, 0, 0.5);
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,215,0,0.2) inset;
    animation: scaleIn 0.3s ease;
  }

  @keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .server-icon {
    font-size: 80px;
    margin-bottom: 20px;
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .server-dialog h2 {
    color: #ffaa00;
    font-size: 2.2rem;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,170,0,0.5);
  }

  .server-dialog p {
    color: white;
    font-size: 1.2rem;
    line-height: 1.8;
    margin-bottom: 15px;
  }

  .server-dialog .error-code {
    background: rgba(0,0,0,0.5);
    padding: 12px;
    border-radius: 40px;
    margin: 20px 0;
    font-family: monospace;
    color: #ff8888;
    font-size: 1rem;
  }

  .server-dialog .date-time {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid rgba(255,215,0,0.3);
  }

  .close-dialog-btn {
    margin-top: 30px;
    padding: 14px 35px;
    background: linear-gradient(145deg, #ff9800, #f57c00);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  .close-dialog-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(145deg, #ffb74d, #ff9800);
    box-shadow: 0 15px 25px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="profile-box">
  <img src="https://uploadkon.ir/uploads/9cf827_26IMG-20260227-200022-144.jpg" class="profile-img">
  <div class="profile-name" id="playerName">بازیکن</div>
</div>

<div class="main-buttons">
  <button class="mafia-btn rank-btn">🎖 بازی امتیازی</button>
  <button class="mafia-btn friend-btn" id="openFriendLobby">👥 بازی دوستانه</button>
</div>

<!-- دیالوگ خطا و قطعی سرور -->
<div class="server-dialog-overlay" id="serverDialog">
  <div class="server-dialog">
    <div class="server-icon">🛜⚠️</div>
    <h2>خطا در اتصال به سرور</h2>
    <p>در حال انجام عملیات‌های فنی روی سرور هستیم.<br>لطفاً شکیبا باشید.</p>
    <p>🔧 تیم فنی در حال رفع مشکل است 🔧</p>
    <div class="error-code">
      کد خطا: SRV_503 | سرور موقتاً در دسترس نیست
    </div>
    <p>⏱️ سرور به زودی وصل خواهد شد.<br>از شکیبایی شما سپاسگزاریم.</p>
    <div class="date-time" id="dateTime"></div>
    <button class="close-dialog-btn" id="closeDialogBtn">باشه 🤝</button>
  </div>
</div>

<script>
  // نمایش تاریخ و زمان فعلی
  const dateTimeSpan = document.getElementById('dateTime');
  const now = new Date();
  const formattedDate = now.toLocaleDateString('fa-IR') + ' - ' + now.toLocaleTimeString('fa-IR');
  dateTimeSpan.innerText = '🕒 ' + formattedDate;

  // ذخیره اسم کاربر از localStorage (فقط نمایشی)
  let savedName = localStorage.getItem("mafiaPlayerName");
  if(savedName) {
    document.getElementById("playerName").innerText = savedName;
  }

  // دکمه بستن دیالوگ (فقط دیالوگ رو میبنده، بازی اجرا نمیشه)
  document.getElementById('closeDialogBtn').addEventListener('click', function() {
    document.getElementById('serverDialog').style.display = 'none';
  });

  // دکمه بازی دوستانه هم هیچ کاری انجام نمیده فقط دیالوگ رو نشون میده
  document.getElementById('openFriendLobby').addEventListener('click', function() {
    document.getElementById('serverDialog').style.display = 'flex';
  });

  // دکمه بازی امتیازی هم همون دیالوگ رو نشون میده
  document.querySelector('.rank-btn').addEventListener('click', function() {
    document.getElementById('serverDialog').style.display = 'flex';
  });

  // جلوگیری از هرگونه اجرای بازی یا لابی
  console.log('سرور در حال بروزرسانی - هیچ بازیای اجرا نمیشود');
</script>

</body>
</html>
