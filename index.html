<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بازی من - فروشگاه ویژه</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ========== همه استایل‌های قبلی بازی ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.imgurl.ir/uploads/z706998_IMG_20260603_070123_792.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'IRANSans', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* مودال جدید با پس‌زمینه تار */
        .blur-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            animation: fadeInModal 0.3s ease;
        }
        
        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-menu-container {
            background: rgba(30, 30, 47, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            border: 2px solid rgba(255, 215, 0, 0.7);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 350px;
        }
        
        .modal-menu-btn {
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s ease;
            background: transparent;
            border: none;
            padding: 0;
        }
        
        .modal-menu-btn:active {
            transform: scale(0.96);
        }
        
        .modal-menu-btn img {
            width: 100%;
            max-width: 280px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 5px 12px rgba(0,0,0,0.3));
            border-radius: 20px;
        }
        
        .close-modal-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            width: auto;
            min-width: 120px;
        }
        
        .close-modal-btn:active {
            transform: scale(0.95);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e1e2f;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            color: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-content h2 { margin-bottom: 1.5rem; font-size: 1.8rem; }
        .modal-content input { width: 100%; padding: 12px 15px; border-radius: 50px; border: none; outline: none; font-size: 1rem; text-align: center; margin-bottom: 1rem; font-family: inherit; }
        .modal-content button { background: #ff9800; color: #1e1e2f; border: none; padding: 10px 20px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            z-index: 200;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            direction: ltr;
        }

        .currency-item { display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.4); padding: 6px 18px; border-radius: 50px; backdrop-filter: blur(4px); }
        .currency-emoji { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .currency-value { font-size: 1.3rem; font-weight: bold; color: #ffd966; text-shadow: 0 1px 2px black; letter-spacing: 1px; }

        /* استایل پنل کاربری */
        .user-panel {
            position: fixed;
            top: 85px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 200;
            cursor: pointer;
            gap: 8px;
        }

        .instagram-story-ring-wrapper { 
            position: relative; 
            width: 92px; 
            height: 92px; 
            flex-shrink: 0; 
        }
        .instagram-story-ring { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            background: conic-gradient(from 0deg, #ffdc80, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #cc2366, #dc2743, #e6683c, #f09433, #ffdc80); 
            padding: 3px; 
            animation: rotateRing 3s linear infinite; 
            z-index: 1; 
            filter: brightness(1.2) saturate(1.4); 
        }
        .instagram-story-ring::before { 
            content: ''; 
            position: absolute; 
            inset: -4px; 
            border-radius: 50%; 
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.4), rgba(255, 200, 100, 0.6), rgba(255, 100, 100, 0.4), rgba(255, 255, 255, 0.3), transparent); 
            animation: rotateRing 2s linear infinite; 
            z-index: -1; 
            filter: blur(6px); 
        }
        @keyframes rotateRing { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .avatar-container { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            background: #1a1a2e; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2; 
            padding: 3px; 
        }
        .avatar { 
            width: 76px; 
            height: 76px; 
            border-radius: 50%; 
            object-fit: cover; 
            background-color: #2c2c3a; 
            display: block; 
            border: 2px solid rgba(255, 255, 255, 0.15); 
        }
        
        /* قاب نام کاربری */
        .username-frame {
            position: relative;
            width: 140px;
            cursor: pointer;
            margin-top: 5px;
        }
        .username-bg-img {
            width: 100%;
            display: block;
            border-radius: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .username-text-on-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            background-color: transparent;
            border-radius: 20px;
            text-align: center;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
            letter-spacing: normal;
            padding: 0 5px;
        }
        .username-text-on-image::-webkit-scrollbar {
            height: 2px;
        }

        .right-vertical-gallery {
            position: fixed;
            top: 54px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            z-index: 180;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            direction: ltr;
            background: transparent;
        }
        .right-vertical-gallery::-webkit-scrollbar { width: 0; background: transparent; }
        .right-vertical-gallery { scrollbar-width: none; }
        .gallery-img-btn { cursor: pointer; background: transparent; border: none; padding: 0; margin: 0; outline: none; display: block; line-height: 0; }
        .gallery-img-btn img { width: 130px; height: auto; max-height: 145px; object-fit: cover; display: block; pointer-events: none; border: none; }
        .gallery-img-btn:active { transform: scale(0.94); }

        /* نوار بالایی جدید - فقط یک دکمه مرکزی */
        .top-row {
            position: fixed;
            bottom: 170px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            direction: rtl;
        }
        
        .center-main-btn {
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
            transition: transform 0.2s ease;
        }
        
        .center-main-btn:active {
            transform: scale(0.95);
        }
        
        .center-main-btn img {
            max-width: 320px;
            max-height: 320px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
            pointer-events: none;
        }

        /* استایل برای سه عکس پایین - کادر زرد */
        .bottom-group {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 200;
            direction: rtl;
            background: linear-gradient(145deg, #ffd966, #ffb347);
            padding: 12px 0 15px 0;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            border-top: 3px solid rgba(255,215,0,0.8);
        }
        
        .bottom-images {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            background: transparent;
            backdrop-filter: none;
            border-radius: 0;
            padding: 0;
            border: none;
            box-shadow: none;
        }
        
        .bottom-btn {
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        
        .bottom-btn img {
            max-width: 140px;
            max-height: 140px;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            pointer-events: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            border-radius: 15px;
        }
        
        .bottom-btn:active {
            transform: scale(0.95);
        }

        /* فروشگاه و سایر صفحات */
        .shop-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://parsstock.ir/600/10068/1134063-%D9%BE%D8%B3-%D8%B2%D9%85%DB%8C%D9%86%D9%87-%D8%AF%DB%8C%D9%88%D8%A7%D8%B1-%D8%A2%D8%AC%D8%B1%DB%8C.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .shop-main-content { text-align: center; background: transparent; padding: 0; color: #fff; width: 100%; max-width: 520px; }
        .shop-header h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #ffd89b, #ffaa66, #ff8c42); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 8px rgba(0,0,0,0.5); letter-spacing: 2px; }
        .shop-header p { font-size: 0.85rem; background: rgba(0,0,0,0.55); display: inline-block; padding: 5px 18px; border-radius: 50px; backdrop-filter: blur(8px); margin-top: 8px; }
        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; padding: 0 20px; margin: 25px 0; }
        .mafia-pack-card { background: linear-gradient(145deg, rgba(25, 20, 15, 0.85), rgba(15, 12, 10, 0.9)); backdrop-filter: blur(12px); border-radius: 28px; padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.25s ease; border: 1px solid rgba(255, 170, 80, 0.7); box-shadow: 0 18px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,200,0.15), 0 0 0 2px rgba(255,140,0,0.2); transform: translateY(-2px); }
        .mafia-pack-card:active { transform: scale(0.96) translateY(2px); }
        .mafia-pack-card.disabled-pack { opacity: 0.5; filter: grayscale(0.3); cursor: not-allowed; pointer-events: none; border-color: #6a6a6a; transform: none; }
        .pack-icon { font-size: 3.6rem; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)) drop-shadow(0 0 5px rgba(255,180,0,0.4)); margin-bottom: 8px; transition: 0.2s; }
        .pack-coins { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, #ffdd99, #ffaa44, #ff8800); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,100,0,0.5); }
        .pack-coins span { font-size: 1rem; background: none; -webkit-text-fill-color: #ffaa55; }
        .pack-name { font-size: 0.9rem; font-weight: bold; color: #ffddbb; background: rgba(0, 0, 0, 0.55); display: inline-block; padding: 5px 16px; border-radius: 50px; margin-top: 6px; letter-spacing: 1px; backdrop-filter: blur(4px); }
        .pack-status { margin-top: 12px; font-size: 0.7rem; background: rgba(0,0,0,0.6); display: inline-block; padding: 3px 14px; border-radius: 30px; color: #ffcc88; font-weight: 500; }
        .shop-gift-btn { background: linear-gradient(135deg, #ffaa44, #ff6600); color: white; border: none; padding: 14px 25px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 15px auto 10px auto; width: 80%; max-width: 250px; display: block; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .shop-gift-btn:active { transform: scale(0.96); }
        .close-shop-btn { background: linear-gradient(145deg, #2a241e, #1a1612); color: #ffdd99; border: 1px solid rgba(255, 170, 80, 0.7); padding: 12px 32px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; font-family: inherit; box-shadow: 0 8px 20px rgba(0,0,0,0.4); width: 80%; max-width: 220px; backdrop-filter: blur(4px); }
        .close-shop-btn:active { transform: scale(0.96); background: #3a3228; }
        .hidden { display: none; }

        .profile-modal-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            animation: fadeInProfile 0.3s ease;
        }
        @keyframes fadeInProfile {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .profile-content-full {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid rgba(255, 170, 68, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 140, 0, 0.2);
            position: relative;
        }
        .profile-content-full::-webkit-scrollbar { width: 5px; }
        .profile-content-full::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .profile-content-full::-webkit-scrollbar-thumb { background: #ffaa44; border-radius: 10px; }
        .profile-header-full {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
        }
        .profile-avatar-large {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffaa44;
            box-shadow: 0 0 15px rgba(255, 170, 68, 0.5);
        }
        .level-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid #fff;
        }
        .profile-name-full { flex: 1; }
        .profile-name-full h2 { color: #ffaa66; font-size: 1.4rem; margin-bottom: 5px; }
        .user-id { color: #aaa; font-size: 0.7rem; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; display: inline-block; font-family: monospace; }
        .close-profile-full { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-profile-full:hover { background: rgba(255,255,255,0.2); }
        .exp-bar-container { margin-bottom: 20px; }
        .exp-bar-label { color: #ccc; font-size: 0.75rem; margin-bottom: 5px; }
        .exp-bar { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; overflow: hidden; }
        .exp-bar-fill { background: linear-gradient(90deg, #ffaa44, #ff6600); height: 100%; border-radius: 10px; transition: width 0.3s ease; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .stat-icon { font-size: 1.8rem; }
        .stat-info { flex: 1; }
        .stat-value { color: #ffaa66; font-size: 1.2rem; font-weight: bold; }
        .stat-label { color: #aaa; font-size: 0.7rem; }
        .profile-actions { display: flex; gap: 10px; margin-top: 10px; }
        .profile-action-btn { flex: 1; background: linear-gradient(135deg, #2a2a3e, #1a1a2e); border: 1px solid rgba(255,170,68,0.5); color: #ffaa66; padding: 10px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .profile-action-btn:active { transform: scale(0.96); }
        .edit-name-input { width: 100%; padding: 12px 15px; border-radius: 50px; border: 2px solid #ffaa44; outline: none; font-size: 1rem; text-align: center; background: #1a1a2e; color: white; font-family: inherit; }

        .gift-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1002; }

        .toast-msg { position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%); background: #1a120ccc; backdrop-filter: blur(20px); color: #ffdd99; padding: 12px 28px; border-radius: 60px; font-weight: bold; font-size: 1rem; z-index: 9999; border: 2px solid #ffaa44; white-space: nowrap; font-family: inherit; }

        .friends-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0057b3;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;

        }
        @keyframes fadeInFriends { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .search-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 15px 20px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

        }
        .search-card h3 { color: #003366; margin-bottom: 12px; font-size: 1.4rem; text-align: center; }
        .search-input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .search-input-group input { flex: 1; padding: 12px 18px; border-radius: 50px; border: 2px solid #0057b3; outline: none; font-size: 1rem; text-align: center; font-family: inherit; min-width: 180px; }

    <script>
        // ==================== توابع کمکی ====================
        function toPersianNumber(number) {
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return number.toString().replace(/\d/g, function(x) { return persianDigits[parseInt(x)]; });
        }

        // ==================== سیستم اصلی لابی ====================
        let lobbies = [];
        let currentUserId = '';
        let currentUsername = '';
        let currentCoins = 8300;
        let currentGems = 1250;
        
        let ablyClient = null;
        let lobbyChannel = null;
        
        // ==================== سیستم صوتی (بدون تاریخچه) ====================
        let voiceChannel = null;
        let mediaRecorder = null;
        let isVoiceRecording = false;
        let voiceAudioContext = null;
        let currentVoiceLobbyId = null;
        
        const avatarImg = document.getElementById('userAvatar');
        const gemsSpan = document.getElementById('gemsValue');
        const coinsSpan = document.getElementById('coinsValue');
        const usernameDisplaySpan = document.getElementById('usernameDisplay');
        
        function voiceAddLog(msg, isError = false) {
            const time = new Date().toLocaleTimeString('fa-IR');
            console.log(`${isError ? '❌' : '✅'} [${time}] ${msg}`);
        }
        
        // پخش صدا - هر صدا یک Audio جدا (قاطی نمی‌شه)
        async function voicePlayReceived(base64String, mimeType) {
            if (!base64String) return;
            
            try {
                if (!voiceAudioContext) {
                    voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    await voiceAudioContext.resume();
                }
                const binaryStr = atob(base64String);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                const audioBuffer = await voiceAudioContext.decodeAudioData(bytes.buffer);
                const source = voiceAudioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(voiceAudioContext.destination);
                source.start();
                voiceAddLog(`🔊 پخش صدا (${Math.round(audioBuffer.duration)} ثانیه)`);
            } catch(e) {
                try {
                    const binaryStr = atob(base64String);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                    const blob = new Blob([bytes], { type: mimeType || 'audio/webm' });
                    const audio = new Audio();
                    audio.src = URL.createObjectURL(blob);
                    audio.play();
                } catch(e2) {
                    voiceAddLog(`⚠️ خطا: ${e.message}`, true);
                }
            }
        }
        
        async function voiceStartRecording() {
            if (!voiceChannel) {
                voiceAddLog('❌ اتصال صوتی برقرار نیست!', true);
                return;
            }
            
            try {
                voiceAddLog('🎤 درخواست میکروفون...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                voiceAddLog('✅ میکروفون فعال شد');
                
                let mimeType = '';
                const formats = ['audio/webm', 'audio/mp4', 'audio/ogg'];
                for (let f of formats) {
                    if (MediaRecorder.isTypeSupported(f)) {
                        mimeType = f;
                        break;
                    }
                }
                if (!mimeType) mimeType = 'audio/webm';
                
                let chunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType, audioBitsPerSecond: 48000 });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) chunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const fullBlob = new Blob(chunks, { type: mimeType });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        if (base64 && voiceChannel) {
                            voiceChannel.publish('voice', {
                                data: base64,
                                type: mimeType,
                                sender: currentUsername,
                                time: Date.now()
                            }, (err) => {
                                if (err) voiceAddLog(`ارسال ناموفق: ${err.message}`, true);
                                else voiceAddLog(`📤 صدا ارسال شد`);
                            });
                        }
                    };
                    reader.readAsDataURL(fullBlob);
                    
                    stream.getTracks().forEach(t => t.stop());
                    chunks = [];
                    isVoiceRecording = false;
                    const micBtn = document.getElementById('voiceMicBtn');
                    if(micBtn) {
                        micBtn.classList.remove('mic-recording');
                        micBtn.innerHTML = '🎙️'; // متن خالی، فقط آیکون
                    }
                    voiceAddLog('⏹️ ضبط متوقف شد');
                };
                
                mediaRecorder.start();
                isVoiceRecording = true;
                const micBtn = document.getElementById('voiceMicBtn');
                if(micBtn) {
                    micBtn.classList.add('mic-recording');
                    micBtn.innerHTML = '🎤'; // متن خالی، فقط آیکون
                }
                voiceAddLog('🎙️ در حال ضبط... برای پایان دوباره کلیک کنید');
                
            } catch(err) {
                voiceAddLog(`❌ خطا: ${err.message}`, true);
            }
        }
        
        function voiceStopRecording() {
            if (mediaRecorder && isVoiceRecording) {
                mediaRecorder.stop();
            }
        }
        
        function voiceToggleRecording() {
            if (isVoiceRecording) {
                voiceStopRecording();
            } else {
                voiceStartRecording();
            }
        }
        
        function voiceInitForLobby(lobbyId) {
            if(currentVoiceLobbyId === lobbyId) return;
            currentVoiceLobbyId = lobbyId;
            
            if(voiceChannel) {
                try { voiceChannel.unsubscribe(); } catch(e) {}
            }
            
            const voiceChanName = `voice-lobby-${lobbyId}`;
            voiceChannel = ablyClient.channels.get(voiceChanName);
            
            voiceChannel.subscribe('voice', (message) => {
                const data = message.data;
                if(data && data.data && data.sender !== currentUsername) {
                    voicePlayReceived(data.data, data.type || 'audio/webm');
                }
            });
            
            voiceChannel.attach((err) => {
                if(err) voiceAddLog(`خطا در کانال صوتی: ${err.message}`, true);
                else voiceAddLog(`📡 کانال صوتی لابی آماده است`);
            });
        }
        
        function voiceCleanup() {
            if(mediaRecorder && isVoiceRecording) mediaRecorder.stop();
            if(voiceChannel) {
                try { voiceChannel.unsubscribe(); } catch(e) {}
            }
            voiceChannel = null;
            currentVoiceLobbyId = null;
            isVoiceRecording = false;
        }
        
        // ==================== بقیه توابع لابی ====================
        function initSyncChannel() {
            if(!currentUserId) return;
            if(ablyClient) { try { ablyClient.close(); } catch(e) {} }
            
            try {
                ablyClient = new Ably.Realtime({ 
                    key: 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo', 
                    clientId: currentUserId 
                });
                
                ablyClient.connection.on('connected', () => {
                    console.log('✅ اتصال به Ably برقرار شد');
                    lobbyChannel = ablyClient.channels.get('lobby-sync-global');
                    
                    lobbyChannel.subscribe('lobby-event', (message) => {
                        if(message.data && message.data.sender !== currentUserId) {
                            handleSyncMessage(message.data);
                        }
                    });
                    
                    lobbyChannel.publish('lobby-event', {
                        type: 'request-lobbies',
                        sender: currentUserId,
                        timestamp: Date.now()
                    });
                    
                    setInterval(() => {
                        if(lobbyChannel) {
                            lobbyChannel.publish('lobby-event', {
                                type: 'request-lobbies',
                                sender: currentUserId,
                                timestamp: Date.now()
                            });
                        }
                    }, 30000);
                });
                
            } catch(e) {
                console.error('Init error:', e);
            }
        }
        
        function handleSyncMessage(data) {
            switch(data.type) {
                case 'lobbies-list':
                    if(data.lobbies) {
                        lobbies = data.lobbies;
                        saveLobbiesToLocal();
                        if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
                        if(window.currentLobbyRoom && window.currentLobbyRoom.updateUI) window.currentLobbyRoom.updateUI();
                    }
                    break;
                case 'lobby-created':
                    if(!lobbies.some(l => l.id === data.lobby.id)) {
                        lobbies.push(data.lobby);
                        saveLobbiesToLocal();
                        showToast(`🆕 لابی جدید "${data.lobby.name}" توسط ${data.lobby.ownerName} ساخته شد`);
                        if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
                    }
                    break;
                case 'lobby-join':
                    const lobbyToJoin = lobbies.find(l => l.id === data.lobbyId);
                    if(lobbyToJoin && !lobbyToJoin.players.some(p => p.id === data.userId)) {
                        lobbyToJoin.players.push({ id: data.userId, name: data.userName, avatar: data.avatar });
                        saveLobbiesToLocal();
                        if(data.userId !== currentUserId) showToast(`👤 ${data.userName} وارد لابی ${lobbyToJoin.name} شد`);
                        if(window.currentLobbyRoom && window.currentLobbyRoom.lobbyId === data.lobbyId) window.currentLobbyRoom.updateUI();
                        if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
                    }
                    break;
                case 'lobby-leave':
                    const leaveLobby = lobbies.find(l => l.id === data.lobbyId);
                    if(leaveLobby) {
                        const idx = leaveLobby.players.findIndex(p => p.id === data.userId);
                        if(idx !== -1) leaveLobby.players.splice(idx, 1);
                        if(leaveLobby.players.length === 0) {
                            const lobbyIdx = lobbies.findIndex(l => l.id === data.lobbyId);
                            if(lobbyIdx !== -1) lobbies.splice(lobbyIdx, 1);
                        } else if(leaveLobby.ownerId === data.userId && leaveLobby.players.length > 0) {
                            leaveLobby.ownerId = leaveLobby.players[0].id;
                            leaveLobby.ownerName = leaveLobby.players[0].name;
                        }
                        saveLobbiesToLocal();
                        if(window.currentLobbyRoom && window.currentLobbyRoom.lobbyId === data.lobbyId) {
                            if(data.userId === currentUserId) {
                                if(window.currentLobbyRoom.page) window.currentLobbyRoom.page.remove();
                                showToast('شما از لابی خارج شدید');
                                voiceCleanup();
                            } else {
                                window.currentLobbyRoom.updateUI();
                            }
                        }
                        if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
                    }
                    break;
                case 'request-lobbies':
                    if(lobbyChannel) {
                        lobbyChannel.publish('lobby-event', {
                            type: 'lobbies-list',
                            lobbies: lobbies,
                            sender: currentUserId,
                            timestamp: Date.now()
                        });
                    }
                    break;
            }
        }
        
        function broadcastMessage(message) {
            if(lobbyChannel) {
                try { lobbyChannel.publish('lobby-event', message); } catch(e) {}
            }
            if(message.type === 'lobby-update' || message.type === 'lobbies-list') {
                localStorage.setItem('mafiaLobbiesFallback', JSON.stringify(message.lobbies || lobbies));
            }
        }
        
        function loadLobbiesFromLocal() {
            const saved = localStorage.getItem('mafiaLobbiesFallback');
            if(saved) {
                try { lobbies = JSON.parse(saved); } catch(e) { lobbies = []; }
            }
            if(!lobbies) lobbies = [];
            lobbies = lobbies.filter(l => l.players && l.players.length > 0);
            return lobbies;
        }
        
        function saveLobbiesToLocal() {
            localStorage.setItem('mafiaLobbiesFallback', JSON.stringify(lobbies));
            broadcastMessage({ type: 'lobby-update', lobbies: lobbies, sender: currentUserId, timestamp: Date.now() });
        }
        
        function createLobby(name) {
            if(!currentUserId || !currentUsername) return false;
            const newLobby = {
                id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
                name: name,
                ownerId: currentUserId,
                ownerName: currentUsername,
                players: [{ id: currentUserId, name: currentUsername, avatar: avatarImg.src }],
                createdAt: Date.now()
            };
            lobbies.push(newLobby);
            saveLobbiesToLocal();
            broadcastMessage({ type: 'lobby-created', lobby: newLobby, sender: currentUserId, timestamp: Date.now() });
            showToast(`✅ لابی "${name}" ساخته شد!`, 2000);
            return newLobby;
        }
        
        function joinLobby(lobbyId) {
            const lobby = lobbies.find(l => l.id === lobbyId);
            if(!lobby) { showToast('❌ لابی یافت نشد'); return null; }
            if(lobby.players.some(p => p.id === currentUserId)) return lobby;
            if(lobby.players.length >= 10) { showToast('❌ لابی پر است'); return null; }
            
            lobby.players.push({ id: currentUserId, name: currentUsername, avatar: avatarImg.src });
            saveLobbiesToLocal();
            broadcastMessage({ type: 'lobby-join', lobbyId: lobbyId, userId: currentUserId, userName: currentUsername, avatar: avatarImg.src, sender: currentUserId });
            showToast(`✅ به لابی ${lobby.name} پیوستید`, 1500);
            return lobby;
        }
        
        function leaveLobby(lobbyId) {
            const lobby = lobbies.find(l => l.id === lobbyId);
            if(lobby) {
                const idx = lobby.players.findIndex(p => p.id === currentUserId);
                if(idx !== -1) lobby.players.splice(idx, 1);
                if(lobby.players.length === 0) {
                    const lobbyIdx = lobbies.findIndex(l => l.id === lobbyId);
                    if(lobbyIdx !== -1) lobbies.splice(lobbyIdx, 1);
                } else if(lobby.ownerId === currentUserId && lobby.players.length > 0) {
                    lobby.ownerId = lobby.players[0].id;
                    lobby.ownerName = lobby.players[0].name;
                }
                saveLobbiesToLocal();
                broadcastMessage({ type: 'lobby-leave', lobbyId: lobbyId, userId: currentUserId, sender: currentUserId });
            }
            voiceCleanup();
            showToast('🚪 از لابی خارج شدید');
        }
        
        function showLobbyRoom(lobbyId) {
            let lobby = lobbies.find(l => l.id === lobbyId);
            if(!lobby) { showToast('لابی وجود ندارد'); return; }
            if(!lobby.players.some(p => p.id === currentUserId)) {
                lobby = joinLobby(lobbyId);
                if(!lobby) return;
            }
            
            if(window.currentLobbyRoom && window.currentLobbyRoom.page) {
                window.currentLobbyRoom.page.remove();
                voiceCleanup();
            }
            
            voiceInitForLobby(lobbyId);
            
            const roomPage = document.createElement('div');
            roomPage.style.position = 'fixed';
            roomPage.style.top = '0';
            roomPage.style.left = '0';
            roomPage.style.width = '100%';
            roomPage.style.height = '100%';
            roomPage.style.zIndex = '400';
            roomPage.style.background = 'radial-gradient(circle at top, rgba(0,220,255,.20), transparent 28%), radial-gradient(circle at bottom, rgba(0,100,255,.14), transparent 40%), linear-gradient(180deg, #123c72 0%, #0a2850 22%, #071c38 46%, #051427 70%, #020914 100%)';
            
            const seatPos = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8', 'p9', 'p10'];
            let isReady = false;
            
            function updateRoom() {
                const currentLobby = lobbies.find(l => l.id === lobbyId);
                if(!currentLobby) {
                    roomPage.remove();
                    voiceCleanup();
                    showToast('لابی بسته شد');
                    return;
                }
                
                let seatsHtml = '';
                for(let i=0; i<10; i++) {
                    const p = currentLobby.players[i];
                    if(p) {
                        seatsHtml += `<div class="player-seat ${seatPos[i]}"><img src="${p.avatar}" onerror="this.src='https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg'"><div class="player-name-label">${p.name}${p.id === currentLobby.ownerId ? ' 👑' : ''}</div></div>`;
                    } else {
                        seatsHtml += `<div class="player-seat empty-seat ${seatPos[i]}"><div class="empty-icon">+</div><div class="player-name-label">صندلی خالی</div></div>`;
                    }
                }
                
                roomPage.innerHTML = `
                    <div class="room-table">
                        <div class="lobby-top-bar">
                            <div class="lobby-info-center">
                                🎮 ${currentLobby.name} 🎮
                                <span class="player-count-badge">👥 ${currentLobby.players.length}/10</span>
                                <span class="lobby-creator-name">👑 سازنده: ${currentLobby.ownerName}</span>
                            </div>
                            <button class="exit-lobby-btn" id="exitLobbyBtn">←</button>
                        </div>
                        ${seatsHtml}
                        <div class="lobby-bottom-buttons">
                            <button class="lobby-action-btn ready-btn" id="readyActionBtn">آماده هستم</button>
                            <div class="action-group">
                                <div class="action-btn-wrapper">
                                    <button class="action-btn" id="likeBtn">
                                        <img src="https://cdn.imgurl.ir/uploads/z7857_BackgroundEraser__.png" alt="لایک">
                                    </button>
                                </div>
                                <div class="action-btn-wrapper">
                                    <button class="action-btn" id="dislikeBtn">
                                        <img src="https://cdn.imgurl.ir/uploads/q074900_BackgroundEraser__.png" alt="دیسلایک">
                                    </button>
                                </div>
                                <div class="action-btn-wrapper">
                                    <button class="mic-btn" id="voiceMicBtn">
                                        <img src="https://cdn.imgurl.ir/uploads/u151816_BackgroundEraser__.png" alt="میکروفون">
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                const readyBtn = document.getElementById('readyActionBtn');
                if(readyBtn) {
                    if(isReady) {
                        readyBtn.classList.add('ready-active');
                        readyBtn.classList.remove('ready-inactive');
                        readyBtn.innerText = '✅ آماده';
                    } else {
                        readyBtn.classList.remove('ready-active');
                        readyBtn.classList.add('ready-inactive');
                        readyBtn.innerText = '❌ آماده نیستم';
                    }
                    readyBtn.onclick = () => {
                        isReady = !isReady;
                        if(isReady) {
                            readyBtn.classList.add('ready-active');
                            readyBtn.classList.remove('ready-inactive');
                            readyBtn.innerText = '✅ آماده';
                            showToast('✅ شما آماده شدید');
                        } else {
                            readyBtn.classList.remove('ready-active');
                            readyBtn.classList.add('ready-inactive');
                            readyBtn.innerText = '❌ آماده نیستم';
                            showToast('❌ شما آماده نیستید');
                        }
                    };
                }
                
                // دکمه لایک
                const likeBtn = document.getElementById('likeBtn');
                if(likeBtn) {
                    likeBtn.onclick = (e) => {
                        e.stopPropagation();
                        showToast('👍 لایک کردید!');
                        // افکت انیمیشن
                        likeBtn.style.transform = 'scale(0.8)';
                        setTimeout(() => { likeBtn.style.transform = 'scale(1)'; }, 200);
                    };
                }
                
                // دکمه دیسلایک
                const dislikeBtn = document.getElementById('dislikeBtn');
                if(dislikeBtn) {
                    dislikeBtn.onclick = (e) => {
                        e.stopPropagation();
                        showToast('👎 دیسلایک کردید!');
                        dislikeBtn.style.transform = 'scale(0.8)';
                        setTimeout(() => { dislikeBtn.style.transform = 'scale(1)'; }, 200);
                    };
                }
                
                // دکمه میکروفون
                const micBtn = document.getElementById('voiceMicBtn');
                if(micBtn) {
                    if(isVoiceRecording) {
                        micBtn.classList.add('mic-recording');
                    } else {
                        micBtn.classList.remove('mic-recording');
                    }
                    micBtn.onclick = (e) => {
                        e.stopPropagation();
                        voiceToggleRecording();
                        // به‌روزرسانی وضعیت دکمه
                        setTimeout(() => {
                            if(isVoiceRecording) {
                                micBtn.classList.add('mic-recording');
                            } else {
                                micBtn.classList.remove('mic-recording');
                            }
                        }, 100);
                    };
                }
                
                const exitBtn = document.getElementById('exitLobbyBtn');
                if(exitBtn) exitBtn.onclick = () => {
                    voiceCleanup();
                    leaveLobby(lobbyId);
                    roomPage.remove();
                    setTimeout(() => showFriendsPage(), 100);
                };
            }
            
            updateRoom();
            document.body.appendChild(roomPage);
            window.currentLobbyRoom = { lobbyId: lobbyId, updateUI: updateRoom, page: roomPage };
            
            const interval = setInterval(() => {
                if(document.body.contains(roomPage)) {
                    const curr = lobbies.find(l => l.id === lobbyId);

            if(txt) txt.innerHTML = 'در حال بررسی اتصال...';
            setTimeout(() => {
                if(navigator.onLine) { if(txt) txt.innerHTML = 'اتصال برقرار شد'; setTimeout(() => { document.getElementById('mafiaDialog').style.display = 'none'; }, 1200); }
                else { if(txt) txt.innerHTML = 'اتصال برقرار نشد<br>لطفاً دوباره تلاش کنید'; }
            }, 1500);
        };
        setTimeout(() => { if(!navigator.onLine) document.getElementById('mafiaDialog').style.display = 'flex'; }, 500);
    </script>
</body>
</html>
