top:85px;
left:20px;

.instagram-story-ring-wrapper { 
position:relative; 
width:92px; 
height:92px; 
flex-shrink:0; 
}
.instagram-story-ring { 
position:absolute; 
top:0; 
left:0;

height:100%;

/* نوار بالایی جدید - فقط یک دکمه مرکزی */
.top-row {
position:fixed;
bottom:170px;
left:0;
right:0;

justify-content:center;
align-items:center;
z-index:200;

}

.center-main-btn {

background:transparent;
border:none;
padding:0;

.center-main-btn:active {

/* استایل برای سه عکس پایین - کادر زرد */
.bottom-group {

bottom:0;
left:0;
right:0;

.bottom-btn {

background:transparent;
border:none;
padding:0;
margin:0;

.bottom-btn img {

.shop-header h1 { font-size:2.4rem; font-weight:800; background:linear-gradient(135deg,#ffd89b,#ffaa66,#ff8c42); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 2px 8px rgba(0,0,0,0.5); letter-spacing:2px; }

.hidden { display:none; }

<script>
// ==================== توابع کمکی ====================
function toPersianNumber(number) {
const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
return number.toString().replace(/\d/g, function(x) { return persianDigits[parseInt(x)]; });
}

// ==================== سیستم اصلی لابی ====================
let lobbies = [];
let currentUserId = '';
let currentUsername = '';
let currentCoins = 8300;
let currentGems = 1250;

let ablyClient = null;
let lobbyChannel = null;

// ==================== سیستم صوتی (بدون تاریخچه) ====================
let voiceChannel = null;
let mediaRecorder = null;
let isVoiceRecording = false;
let voiceAudioContext = null;
let currentVoiceLobbyId = null;

const avatarImg = document.getElementById('userAvatar');
const gemsSpan = document.getElementById('gemsValue');
const coinsSpan = document.getElementById('coinsValue');
const usernameDisplaySpan = document.getElementById('usernameDisplay');

function voiceAddLog(msg, isError = false) {
const time = new Date().toLocaleTimeString('fa-IR');
console.log(`${isError ? '❌' : '✅'} [${time}] ${msg}`);
}

// پخش صدا - هر صدا یک Audio جدا (قاطی نمی‌شه)
async function voicePlayReceived(base64String, mimeType) {
if (!base64String) return;

try {
if (!voiceAudioContext) {
voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)();
await voiceAudioContext.resume();
}
const binaryStr = atob(base64String);
const bytes = new Uint8Array(binaryStr.length);
for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
const audioBuffer = await voiceAudioContext.decodeAudioData(bytes.buffer);
const source = voiceAudioContext.createBufferSource();
source.buffer = audioBuffer;
source.connect(voiceAudioContext.destination);
source.start();
voiceAddLog(`🔊 پخش صدا (${Math.round(audioBuffer.duration)} ثانیه)`);
} catch(e) {
try {
const binaryStr = atob(base64String);
const bytes = new Uint8Array(binaryStr.length);
for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
const blob = new Blob([bytes], { type: mimeType || 'audio/webm' });
const audio = new Audio();
audio.src = URL.createObjectURL(blob);
audio.play();
} catch(e2) {
voiceAddLog(`⚠️ خطا: ${e.message}`, true);
}
}
}

async function voiceStartRecording() {
if (!voiceChannel) {
voiceAddLog('❌ اتصال صوتی برقرار نیست!', true);
return;
}

try {
voiceAddLog('🎤 درخواست میکروفون...');
const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
voiceAddLog('✅ میکروفون فعال شد');

let mimeType = '';
const formats = ['audio/webm', 'audio/mp4', 'audio/ogg'];
for (let f of formats) {
if (MediaRecorder.isTypeSupported(f)) {
mimeType = f;
break;
}
}
if (!mimeType) mimeType = 'audio/webm';

let chunks = [];
mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType, audioBitsPerSecond: 48000 });

mediaRecorder.ondataavailable = (event) => {
if (event.data && event.data.size > 0) chunks.push(event.data);
};

mediaRecorder.onstop = async () => {
const fullBlob = new Blob(chunks, { type: mimeType });
const reader = new FileReader();
reader.onloadend = () => {
const base64 = reader.result.split(',')[1];
if (base64 && voiceChannel) {
voiceChannel.publish('voice', {
data: base64,
type: mimeType,
sender: currentUsername,
time: Date.now()
}, (err) => {
if (err) voiceAddLog(`ارسال ناموفق: ${err.message}`, true);
else voiceAddLog(`📤 صدا ارسال شد`);
});
}
};
reader.readAsDataURL(fullBlob);

stream.getTracks().forEach(t => t.stop());
chunks = [];
isVoiceRecording = false;
const micBtn = document.getElementById('lobbyVoiceMicBtn');
if(micBtn) {
micBtn.classList.remove('mic-recording');
}
voiceAddLog('⏹️ ضبط متوقف شد');
};

mediaRecorder.start();
isVoiceRecording = true;
const micBtn = document.getElementById('lobbyVoiceMicBtn');
if(micBtn) {
micBtn.classList.add('mic-recording');
}
voiceAddLog('🎙️ در حال ضبط... برای پایان دوباره کلیک کنید');

} catch(err) {
voiceAddLog(`❌ خطا: ${err.message}`, true);
}
}

function voiceStopRecording() {
if (mediaRecorder && isVoiceRecording) {
mediaRecorder.stop();
}
}

function voiceToggleRecording() {
if (isVoiceRecording) {
voiceStopRecording();
} else {
voiceStartRecording();
}
}

function voiceInitForLobby(lobbyId) {
if(currentVoiceLobbyId === lobbyId) return;
currentVoiceLobbyId = lobbyId;

if(voiceChannel) {
try { voiceChannel.unsubscribe(); } catch(e) {}
}

const voiceChanName = `voice-lobby-${lobbyId}`;
voiceChannel = ablyClient.channels.get(voiceChanName);

voiceChannel.subscribe('voice', (message) => {
const data = message.data;
if(data && data.data && data.sender !== currentUsername) {
voicePlayReceived(data.data, data.type || 'audio/webm');
}
});

voiceChannel.attach((err) => {
if(err) voiceAddLog(`خطا در کانال صوتی: ${err.message}`, true);
else voiceAddLog(`📡 کانال صوتی لابی آماده است`);
});
}

function voiceCleanup() {
if(mediaRecorder && isVoiceRecording) mediaRecorder.stop();
if(voiceChannel) {
try { voiceChannel.unsubscribe(); } catch(e) {}
}
voiceChannel = null;
currentVoiceLobbyId = null;
isVoiceRecording = false;
}

function handleSyncMessage(data) {
switch(data.type) {
case 'lobbies-list':
if(data.lobbies) {
lobbies = data.lobbies;
saveLobbiesToLocal();
if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
if(window.currentLobbyRoom && window.currentLobbyRoom.updateUI) window.currentLobbyRoom.updateUI();
}
break;
case 'lobby-created':
if(!lobbies.some(l => l.id === data.lobby.id)) {
lobbies.push(data.lobby);
saveLobbiesToLocal();
showToast(`🆕 لابی جدید "${data.lobby.name}" توسط ${data.lobby.ownerName} ساخته شد`);
if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
}
break;
case 'lobby-join':
const lobbyToJoin = lobbies.find(l => l.id === data.lobbyId);
if(lobbyToJoin && !lobbyToJoin.players.some(p => p.id === data.userId)) {
lobbyToJoin.players.push({ id: data.userId, name: data.userName, avatar: data.avatar });
saveLobbiesToLocal();
if(data.userId !== currentUserId) showToast(`👤 ${data.userName} وارد لابی ${lobbyToJoin.name} شد`);
if(window.currentLobbyRoom && window.currentLobbyRoom.lobbyId === data.lobbyId) window.currentLobbyRoom.updateUI();
if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
}
break;
case 'lobby-leave':
const leaveLobby = lobbies.find(l => l.id === data.lobbyId);
if(leaveLobby) {
const idx = leaveLobby.players.findIndex(p => p.id === data.userId);
if(idx !== -1) leaveLobby.players.splice(idx, 1);
if(leaveLobby.players.length === 0) {
const lobbyIdx = lobbies.findIndex(l => l.id === data.lobbyId);
if(lobbyIdx !== -1) lobbies.splice(lobbyIdx, 1);
} else if(leaveLobby.ownerId === data.userId && leaveLobby.players.length > 0) {
leaveLobby.ownerId = leaveLobby.players[0].id;
leaveLobby.ownerName = leaveLobby.players[0].name;
}
saveLobbiesToLocal();
if(window.currentLobbyRoom && window.currentLobbyRoom.lobbyId === data.lobbyId) {
if(data.userId === currentUserId) {
if(window.currentLobbyRoom.page) window.currentLobbyRoom.page.remove();
showToast('شما از لابی خارج شدید');
voiceCleanup();
} else {
window.currentLobbyRoom.updateUI();
}
}
if(window.currentLobbyPage && window.currentLobbyPage.refreshList) window.currentLobbyPage.refreshList();
}
break;
case 'request-lobbies':
if(lobbyChannel) {
lobbyChannel.publish('lobby-event', {
type: 'lobbies-list',
lobbies: lobbies,
sender: currentUserId,
timestamp: Date.now()
});
}
break;
}
}

function broadcastMessage(message) {
if(lobbyChannel) {
try { lobbyChannel.publish('lobby-event', message); } catch(e) {}
}
if(message.type === 'lobby-update' || message.type === 'lobbies-list') {
localStorage.setItem('mafiaLobbiesFallback', JSON.stringify(message.lobbies || lobbies));
}
}

function loadLobbiesFromLocal() {
const saved = localStorage.getItem('mafiaLobbiesFallback');
if(saved) {
try { lobbies = JSON.parse(saved); } catch(e) { lobbies = []; }
}
if(!lobbies) lobbies = [];
lobbies = lobbies.filter(l => l.players && l.players.length > 0);
return lobbies;
}

function saveLobbiesToLocal() {
localStorage.setItem('mafiaLobbiesFallback', JSON.stringify(lobbies));
broadcastMessage({ type: 'lobby-update', lobbies: lobbies, sender: currentUserId, timestamp: Date.now() });
}

function createLobby(name) {
if(!currentUserId || !currentUsername) return false;
const newLobby = {
id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
name: name,
ownerId: currentUserId,
ownerName: currentUsername,
players: [{ id: currentUserId, name: currentUsername, avatar: avatarImg.src }],
createdAt: Date.now()
};
lobbies.push(newLobby);
saveLobbiesToLocal();
broadcastMessage({ type: 'lobby-created', lobby: newLobby, sender: currentUserId, timestamp: Date.now() });
showToast(`✅ لابی "${name}" ساخته شد!`, 2000);
return newLobby;
}

function joinLobby(lobbyId) {
const lobby = lobbies.find(l => l.id === lobbyId);
if(!lobby) { showToast('❌ لابی یافت نشد'); return null; }
if(lobby.players.some(p => p.id === currentUserId)) return lobby;
if(lobby.players.length >= 10) { showToast('❌ لابی پر است'); return null; }

lobby.players.push({ id: currentUserId, name: currentUsername, avatar: avatarImg.src });
saveLobbiesToLocal();
broadcastMessage({ type: 'lobby-join', lobbyId: lobbyId, userId: currentUserId, userName: currentUsername, avatar: avatarImg.src, sender: currentUserId });
showToast(`✅ به لابی ${lobby.name} پیوستید`, 1500);
return lobby;
}

function leaveLobby(lobbyId) {
const lobby = lobbies.find(l => l.id === lobbyId);
if(lobby) {
const idx = lobby.players.findIndex(p => p.id === currentUserId);
if(idx !== -1) lobby.players.splice(idx, 1);
if(lobby.players.length === 0) {
const lobbyIdx = lobbies.findIndex(l => l.id === lobbyId);
if(lobbyIdx !== -1) lobbies.splice(lobbyIdx, 1);
} else if(lobby.ownerId === currentUserId && lobby.players.length > 0) {
lobby.ownerId = lobby.players[0].id;
lobby.ownerName = lobby.players[0].name;
}
saveLobbiesToLocal();
broadcastMessage({ type: 'lobby-leave', lobbyId: lobbyId, userId: currentUserId, sender: currentUserId });
}
voiceCleanup();
showToast('🚪 از لابی خارج شدید');
}

// ==================== بخش اصلی ====================
const modal = document.getElementById('usernameModal');
const usernameInput = document.getElementById('usernameInput');
const saveBtn = document.getElementById('saveNameBtn');

const centerMainBtn = document.getElementById('centerMainBtn');
const bottomRight = document.getElementById('bottomRightImg');
const bottomCenter = document.getElementById('bottomCenterImg');
const shopButton = document.getElementById('bottomLeftImg');
const galleryBtns = document.querySelectorAll('.gallery-img-btn');
const profileBtn = document.getElementById('profileBtn');

const DAILY_PACKS = [{ id:0, coins:250, gems:50, name:"نقره‌ای", emoji:"🥈" },{ id:1, coins:500, gems:100, name:"طلایی", emoji:"🌟" },{ id:2, coins:100, gems:200, name:"الماسی", emoji:"💎" },{ id:3, coins:150, gems:75, name:"رویایی", emoji:"✨" }];

function updateCoins() { if(coinsSpan) coinsSpan.innerText = toPersianNumber(currentCoins); }
function updateGems() { if(gemsSpan) gemsSpan.innerText = toPersianNumber(currentGems); }

function loadCurrencies() { 
let gems = localStorage.getItem('userGems'); 
let coins = localStorage.getItem('userCoins'); 
if(gems === null) gems = 1250; else gems = parseInt(gems);
if(coins === null) coins = 8300; else coins = parseInt(coins);
localStorage.setItem('userGems', gems); 
localStorage.setItem('userCoins', coins); 
currentGems = gems; 
currentCoins = coins; 
updateGems(); 
updateCoins(); 
}

function addCoins(amount) { 
let val = currentCoins; 
val += amount; 
localStorage.setItem('userCoins', val); 
currentCoins = val; 
updateCoins(); 
return val; 
}

function addGems(amount) { 
let val = currentGems; 
val += amount; 
localStorage.setItem('userGems', val); 
currentGems = val; 
updateGems(); 
return val; 
}

function removeCoins(amount) { 
let val = currentCoins; 
if(val >= amount) { 
val -= amount; 
localStorage.setItem('userCoins', val); 
currentCoins = val; 
updateCoins(); 
return true; 
} 
return false; 
}

function getPackStatus() { let last = localStorage.getItem('dailyPackClaims'); if(!last) return {}; try { return JSON.parse(last); } catch(e) { return {}; } }
function updatePackStatus(id) { let s = getPackStatus(); const today = new Date().toLocaleDateString('en-CA'); s[id] = today; localStorage.setItem('dailyPackClaims', JSON.stringify(s)); }
function canClaimPack(id) { let s = getPackStatus(); const today = new Date().toLocaleDateString('en-CA'); return !s[id] || s[id] !== today; }

function showToast(msg, dur = 2500) { 
const t = document.createElement('div'); 
t.className = 'toast-msg'; 
t.innerText = msg; 
document.body.appendChild(t); 
setTimeout(() => { if(t && t.remove) t.remove(); }, dur); 
}

function showProfile() {
if(!currentUserId) { showToast('ابتدا نام کاربری را انتخاب کنید'); return; }
let stats = localStorage.getItem('userStats');
if(!stats) {
stats = { competitiveWins:0, friendlyWins:0, playTime:0, spectatorCount:0, mafiaWins:0, citizenWins:0, exp:0 };
localStorage.setItem('userStats', JSON.stringify(stats));
} else { stats = JSON.parse(stats); }

function calculateLevel(exp) {
let level = 1, required = 100, totalExp = exp;
while(totalExp >= required && level < 100) { totalExp -= required; level++; required = Math.floor(required * 1.2); }
return { level: level, currentExp: totalExp, requiredExp: required };
}
const levelInfo = calculateLevel(stats.exp || 0);
const level = levelInfo.level, currentExp = levelInfo.currentExp, requiredExp = levelInfo.requiredExp;
const expPercent = (currentExp / requiredExp) * 100;
const hoursPlayed = Math.floor(stats.playTime / 3600);
const minutesPlayed = Math.floor((stats.playTime % 3600) / 60);

const d = document.createElement('div');
d.className = 'profile-modal-full';
d.innerHTML = `
<div class="profile-content-full">
<div class="profile-header-full">
<div class="profile-avatar-large">
<img src="${avatarImg ? avatarImg.src : 'https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg'}" alt="Avatar" onerror="this.src='https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg'">
<div class="level-badge">سطح ${level}</div>
</div>
<div class="profile-name-full">
<h2>${currentUsername}</h2>
<div class="user-id">🆔 ${currentUserId}</div>
</div>
<button class="close-profile-full" id="closeProfileBtn">✕</button>
</div>
<div class="exp-bar-container">
<div class="exp-bar-label">تجربه تا سطح بعد: ${currentExp}/${requiredExp}</div>
<div class="exp-bar"><div class="exp-bar-fill" style="width: ${expPercent}%;"></div></div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-info"><div class="stat-value">${toPersianNumber(stats.competitiveWins)}</div><div class="stat-label">برد امتیازی</div></div></div>
<div class="stat-card"><div class="stat-icon">🎮</div><div class="stat-info"><div class="stat-value">${toPersianNumber(stats.friendlyWins)}</div><div class="stat-label">برد دوستانه</div></div></div>
<div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-info"><div class="stat-value">${toPersianNumber(level)}</div><div class="stat-label">سطح کاربر</div></div></div>
<div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-info"><div class="stat-value">${toPersianNumber(hoursPlayed)}:${toPersianNumber(minutesPlayed)}</div><div class="stat-label">ساعت بازی</div></div></div>
<div class="stat-card"><div class="stat-icon">👁️</div><div class="stat-info"><div class="stat-value">${toPersianNumber(stats.spectatorCount)}</div><div class="stat-label">تعداد نظاره‌گر</div></div></div>
<div class="stat-card"><div class="stat-icon">🦹</div><div class="stat-info"><div class="stat-value">${toPersianNumber(stats.mafiaWins)}</div><div class="stat-label">برد مافیا</div></div></div>
<div class="stat-card"><div class="stat-icon">👮</div><div class="stat-info"><div class="stat-value">${toPersianNumber(stats.citizenWins)}</div><div class="stat-label">برد شهروند</div></div></div>
</div>
<div class="profile-actions">
<button class="profile-action-btn" id="copyIdBtn">📋 کپی کد کاربری</button>
<button class="profile-action-btn" id="editNameBtn">✏️ تغییر نام</button>
</div>
</div>
`;
document.body.appendChild(d);

const copyBtn = document.getElementById('copyIdBtn');
if(copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText(currentUserId); showToast('📋 کد کاربری کپی شد!'); };

const editBtn = document.getElementById('editNameBtn');
if(editBtn) editBtn.onclick = () => {
d.remove();
const modalDiv = document.createElement('div');
modalDiv.className = 'profile-modal-full';
modalDiv.innerHTML = `<div class="profile-content-full" style="max-width:350px;"><h2 style="color:#ffaa66; margin-bottom:20px; text-align:center;">تغییر نام کاربری</h2><input type="text" id="newNameInput" class="edit-name-input" placeholder="نام جدید..." maxlength="8" value="${currentUsername}"><div class="profile-actions" style="margin-top:20px;"><button class="profile-action-btn" id="confirmNameBtn">✅ تایید</button><button class="profile-action-btn" id="cancelNameBtn">❌ انصراف</button></div></div>`;
document.body.appendChild(modalDiv);
const confirmBtn = document.getElementById('confirmNameBtn');
if(confirmBtn) confirmBtn.onclick = () => {
let newName = document.getElementById('newNameInput').value.trim();
if(newName) {
if(newName.length > 8) newName = newName.slice(0,8);
currentUsername = newName;
localStorage.setItem('gameUsername', currentUsername);
if(usernameDisplaySpan) usernameDisplaySpan.innerText = currentUsername;
showToast(`✅ نام به ${currentUsername} تغییر کرد`);
modalDiv.remove();
showProfile();
} else showToast('❌ نام نمی‌تواند خالی باشد');
};
const cancelBtn = document.getElementById('cancelNameBtn');
if(cancelBtn) cancelBtn.onclick = () => modalDiv.remove();
};

const closeProfBtn = document.getElementById('closeProfileBtn');
if(closeProfBtn) closeProfBtn.onclick = () => d.remove();
}

let ablyGift = null, giftChannel = null;
function connectGift() {
if(typeof Ably === 'undefined' || !currentUserId) return;
try {
ablyGift = new Ably.Realtime({ key: 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo', clientId: currentUserId });
ablyGift.connection.on('connected', () => {
giftChannel = ablyGift.channels.get('gift-channel');
giftChannel.subscribe('gift', (msg) => {
if(msg.data && msg.data.to === currentUserId) {
addCoins(msg.data.amount);
showToast(`🎁 ${msg.data.from} به شما ${toPersianNumber(msg.data.amount)} سکه هدیه داد!`);
}
});
});
} catch(e) { console.error(e); }
}

function showGift() {
if(!currentUserId) { showToast('ابتدا نام خود را انتخاب کنید'); return; }
if(currentCoins < 50) { showToast(`❌ حداقل ۵۰ سکه نیاز است!`); return; }
const d = document.createElement('div'); d.className = 'gift-modal';
d.innerHTML = `<div class="gift-content"><h2>🎁 هدیه سکه</h2><input type="text" id="targetCode" placeholder="کد کاربری دوست..."><select id="amountSelect"><option value="50">۵۰</option><option value="100">۱۰۰</option><option value="200">۲۰۰</option><option value="500">۵۰۰</option><option value="1000">۱۰۰۰</option></select><div class="gift-buttons"><button class="send-gift-btn" id="sendBtn">🎁 ارسال</button><button class="cancel-gift-btn" id="cancelBtn">❌ انصراف</button></div></div>`;
document.body.appendChild(d);
const sendBtn = document.getElementById('sendBtn');
if(sendBtn) sendBtn.onclick = () => {
const target = document.getElementById('targetCode').value.trim();
const amount = parseInt(document.getElementById('amountSelect').value);
if(!target) { showToast('کد را وارد کنید'); return; }
if(target === currentUserId) { showToast('نمی‌توانید به خودتان هدیه دهید'); return; }
if(currentCoins < amount) { showToast('سکه کافی ندارید'); return; }
if(giftChannel) { removeCoins(amount); giftChannel.publish('gift', { to: target, from: currentUsername, amount: amount }); showToast(`✅ ${toPersianNumber(amount)} سکه ارسال شد!`); d.remove(); }
else { showToast('❌ خطا در اتصال'); }
};
const cancelGift = document.getElementById('cancelBtn');
if(cancelGift) cancelGift.onclick = () => d.remove();
}

function showShop() {
const existing = document.querySelector('.shop-page'); if(existing) existing.remove();
const page = document.createElement('div'); page.className = 'shop-page';
page.innerHTML = `<div class="shop-main-content"><div class="shop-header"><h1>🏪 بازار سیاه</h1><p>✨ بسته روزانه ✨</p></div><div class="packs-grid" id="packsGrid"></div><button class="shop-gift-btn" id="giftBtn">🎁 هدیه سکه</button><button class="close-shop-btn">🔙 خروج</button></div>`;
document.body.appendChild(page);
function render() { 
const grid = document.getElementById('packsGrid'); 
if(!grid) return; 
grid.innerHTML = ''; 
DAILY_PACKS.forEach(p => { 
const avail = canClaimPack(p.id); 
const card = document.createElement('div'); 
card.className = `mafia-pack-card ${!avail ? 'disabled-pack' : ''}`; 
card.innerHTML = `<div class="pack-icon">${p.emoji}</div><div class="pack-coins">+${toPersianNumber(p.coins)} <span>سکه</span> &nbsp; +${toPersianNumber(p.gems)} <span style="color:#ff88ff;">💎الماس</span></div><div class="pack-name">${p.name}</div><div class="pack-status">${avail ? '🔥 دریافت' : '✅ انجام شد'}</div>`; 
if(avail) { 
card.onclick = () => { 
addCoins(p.coins); 
addGems(p.gems); 
updatePackStatus(p.id); 
showToast(`🎁 +${toPersianNumber(p.coins)} سکه و +${toPersianNumber(p.gems)} الماس`); 
render(); 
}; 
} 
grid.appendChild(card); 
}); 
}
render();
const giftBtn = document.getElementById('giftBtn');
if(giftBtn) giftBtn.onclick = () => showGift();
const closeShop = page.querySelector('.close-shop-btn');
if(closeShop) closeShop.onclick = () => page.remove();
}

function loadUser() {
const savedName = localStorage.getItem('gameUsername');
const savedId = localStorage.getItem('userId');
if(savedName && savedName.trim() !== "") {
currentUsername = savedName.length > 8 ? savedName.slice(0,8) : savedName;
if(usernameDisplaySpan) usernameDisplaySpan.innerText = currentUsername;
if(modal) modal.style.display = 'none';
if(savedId) currentUserId = savedId;
else { currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); localStorage.setItem('userId', currentUserId); }
connectGift();
initSyncChannel();
loadLobbiesFromLocal();
} else { if(modal) modal.style.display = 'flex'; if(usernameInput) usernameInput.focus(); }
}

function saveUser() {
if(!usernameInput) return;
let name = usernameInput.value.trim();
if(!name) { alert("لطفاً نام خود را وارد کنید!"); return; }
if(name.length > 8) name = name.slice(0,8);
currentUsername = name;
currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
localStorage.setItem('gameUsername', currentUsername);
localStorage.setItem('userId', currentUserId);
if(usernameDisplaySpan) usernameDisplaySpan.innerText = currentUsername;
if(modal) modal.style.display = 'none';
connectGift();
initSyncChannel();
loadLobbiesFromLocal();
showToast(`✅ خوش آمدی ${currentUsername}!`);
}

if(saveBtn) saveBtn.onclick = saveUser;
if(usernameInput) usernameInput.onkeypress = (e) => { if(e.key === 'Enter') saveUser(); };

if(centerMainBtn) centerMainBtn.onclick = (e) => { e.stopPropagation(); showBlurModal(); };
if(shopButton) shopButton.onclick = (e) => { e.stopPropagation(); showShop(); };
if(profileBtn) profileBtn.onclick = (e) => { e.stopPropagation(); showProfile(); };
if(bottomRight) bottomRight.onclick = (e) => { e.stopPropagation(); showTeamPage(); };

const silent = () => {};
if(bottomCenter) bottomCenter.onclick = silent;
galleryBtns.forEach(btn => { if(btn) btn.onclick = silent; });

if(usernameDisplaySpan) usernameDisplaySpan.ondblclick = () => { if(modal) modal.style.display = 'flex'; if(usernameInput) usernameInput.value = localStorage.getItem('gameUsername') || ''; if(usernameInput) usernameInput.focus(); };
if(document.getElementById('userAvatar')) document.getElementById('userAvatar').onerror = () => { document.getElementById('userAvatar').src = "https://via.placeholder.com/80?text=Avatar"; };

loadUser();
loadCurrencies();
window.onload = () => { if(localStorage.getItem('gameUsername') && modal) modal.style.display = 'none'; const g = document.getElementById('rightGallery'); if(g) { g.style.background = 'transparent'; g.style.backdropFilter = 'none'; g.style.border = 'none'; } };

window.retryConnection = function() {
const txt = document.querySelector('#mafiaDialog .dialog-text');
if(txt) txt.innerHTML = 'در حال بررسی اتصال...';
setTimeout(() => {
if(navigator.onLine) { if(txt) txt.innerHTML = 'اتصال برقرار شد'; setTimeout(() => { const dlg = document.getElementById('mafiaDialog'); if(dlg) dlg.style.display = 'none'; }, 1200); }
else { if(txt) txt.innerHTML = 'اتصال برقرار نشد<br>لطفاً دوباره تلاش کنید'; }
}, 1500);
};
setTimeout(() => { if(!navigator.onLine) { const dlg = document.getElementById('mafiaDialog'); if(dlg) dlg.style.display = 'flex'; } }, 500);
</script>
