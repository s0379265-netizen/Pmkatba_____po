<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mafia Loader | سرورهای داخلی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0c12;
      font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
    }

    /* لودر ساده و جذاب */
    .loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0a0f1a 0%, #0c0f18 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.4s ease;
    }

    .loader-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      text-align: center;
      background: rgba(10, 20, 35, 0.7);
      padding: 2rem 2.5rem;
      border-radius: 32px;
      border: 1px solid rgba(0, 160, 255, 0.3);
      backdrop-filter: blur(8px);
    }

    /* اسپینر ساده */
    .spinner-simple {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px auto;
      border: 3px solid rgba(0, 160, 255, 0.2);
      border-top: 3px solid #00a0ff;
      border-right: 3px solid #00a0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text-main {
      font-size: 1.3rem;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 1px;
    }

    .loading-sub {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #00a0ff;
      font-weight: 400;
      opacity: 0.9;
    }

    .game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 1;
      background: #000;
    }
  </style>
</head>
<body>

  <!-- لودر ساده با همون متنی که خواستی -->
  <div id="loaderOverlay" class="loader-overlay">
    <div class="loader-box">
      <div class="spinner-simple"></div>
      <div class="loading-text-main">در حال اتصال به سرورهای داخلی برنامه است</div>
      <div class="loading-sub">لطفاً چند لحظه صبر کنید...</div>
    </div>
  </div>

  <script>
    (function() {
      const TARGET_URL = "https://raw.githubusercontent.com/m65394660-sudo/Mfg9/refs/heads/main/Mafia_dark_shaot.html";
      const loader = document.getElementById('loaderOverlay');

      async function loadGame() {
        try {
          // دریافت کد از پشت صحنه
          const response = await fetch(TARGET_URL, {
            cache: "force-cache",
            priority: "high"
          });

          if (!response.ok) throw new Error("خطا در دریافت");

          const htmlCode = await response.text();

          // حذف iframe قبلی اگه باشه
          const oldFrame = document.querySelector('.game-frame');
          if (oldFrame) oldFrame.remove();

          // ساخت iframe جدید برای اجرای تمام صفحه بدون لگ
          const iframe = document.createElement('iframe');
          iframe.className = 'game-frame';
          iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals');
          iframe.srcdoc = htmlCode;
          
          document.body.appendChild(iframe);

          // محو کردن لودر بعد از اینکه iframe آماده شد
          setTimeout(() => {
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(() => {
                if (loader && loader.parentNode) loader.remove();
              }, 500);
            }
          }, 800);

        } catch (error) {
          console.error("Loader error:", error);
          // اگه خطا خورد، پیام رو تغییر بده
          const textElem = document.querySelector('.loading-text-main');
          if (textElem) textElem.innerText = "خطا در اتصال، تلاش مجدد...";
          setTimeout(() => location.reload(), 2000);
        }
      }

      // شروع بارگذاری بعد از آماده شدن صفحه
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(loadGame, 100);
      });
    })();
  </script>
</body>
</html>
