<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بازی من - فروشگاه ویژه</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ===== همه استایل‌های اصلی شما - بدون هیچ تغییری ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.imgurl.ir/uploads/f27572_IMG_20260513_141855_181.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'IRANSans', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e1e2f;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            color: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-content h2 { margin-bottom: 1.5rem; font-size: 1.8rem; }
        .modal-content input { width: 100%; padding: 12px 15px; border-radius: 50px; border: none; outline: none; font-size: 1rem; text-align: center; margin-bottom: 1rem; font-family: inherit; }
        .modal-content button { background: #ff9800; color: #1e1e2f; border: none; padding: 10px 20px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            z-index: 200;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            direction: ltr;
        }

        .currency-item { display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.4); padding: 6px 18px; border-radius: 50px; backdrop-filter: blur(4px); }
        .currency-emoji { font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .currency-value { font-size: 1.3rem; font-weight: bold; color: #ffd966; text-shadow: 0 1px 2px black; letter-spacing: 1px; }

        .user-panel {
            position: fixed;
            top: 85px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 200;
            direction: ltr;
            cursor: pointer;
        }

        .instagram-story-ring-wrapper { position: relative; width: 92px; height: 92px; flex-shrink: 0; }
        .instagram-story-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, #ffdc80, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #cc2366, #dc2743, #e6683c, #f09433, #ffdc80); padding: 3px; animation: rotateRing 3s linear infinite; z-index: 1; filter: brightness(1.2) saturate(1.4); }
        .instagram-story-ring::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.4), rgba(255, 200, 100, 0.6), rgba(255, 100, 100, 0.4), rgba(255, 255, 255, 0.3), transparent); animation: rotateRing 2s linear infinite; z-index: -1; filter: blur(6px); }
        @keyframes rotateRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .avatar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 82px; height: 82px; border-radius: 50%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; z-index: 2; padding: 3px; }
        .avatar { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; background-color: #2c2c3a; display: block; border: 2px solid rgba(255, 255, 255, 0.15); }
        .username-bar { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); padding: 0.9rem 1.8rem 0.9rem 2.2rem; border-radius: 0 50px 50px 0; color: white; font-size: 1.3rem; font-weight: bold; letter-spacing: 0.5px; border: 1px solid rgba(255, 255, 255, 0.25); border-left: none; margin-left: -14px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4); white-space: nowrap; max-width: 250px; overflow-x: auto; scrollbar-width: thin; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5); }

        .right-vertical-gallery {
            position: fixed;
            top: 54px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            z-index: 180;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            direction: ltr;
            background: transparent;
            backdrop-filter: none;
            border: none;
            box-shadow: none;
            padding: 0;
        }
        .right-vertical-gallery::-webkit-scrollbar { width: 0; background: transparent; }
        .right-vertical-gallery { scrollbar-width: none; }
        .gallery-img-btn { cursor: pointer; transition: transform 0.2s ease; background: transparent; border: none; padding: 0; margin: 0; outline: none; display: block; line-height: 0; box-shadow: none; border-radius: 0; }
        .gallery-img-btn img { width: 130px; height: auto; max-height: 145px; object-fit: cover; display: block; pointer-events: none; border: none; outline: none; box-shadow: none; background: transparent; border-radius: 0; }
        .gallery-img-btn:active { transform: scale(0.94); }

        .top-row { position: fixed; bottom: 170px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 60px; z-index: 200; direction: rtl; }
        .top-btn { cursor: pointer; transition: transform 0.2s ease; background: transparent; border: none; padding: 0; margin: 0; outline: none; }
        .top-btn img { max-width: 320px; max-height: 320px; width: auto; height: auto; object-fit: contain; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6)); pointer-events: none; }
        .top-btn:active { transform: scale(0.94); }

        .bottom-group { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; z-index: 200; direction: rtl; }
        .bottom-images { display: flex; justify-content: center; align-items: flex-end; gap: 0; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); border-radius: 30px; padding: 8px 12px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .bottom-btn { cursor: pointer; transition: transform 0.2s ease; background: transparent; border: none; padding: 0; margin: 0; outline: none; display: inline-block; }
        .bottom-btn img { max-width: 170px; max-height: 170px; object-fit: contain; display: block; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .bottom-btn:active { transform: scale(0.95); }

        .shop-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://parsstock.ir/600/10068/1134063-%D9%BE%D8%B3-%D8%B2%D9%85%DB%8C%D9%86%D9%87-%D8%AF%DB%8C%D9%88%D8%A7%D8%B1-%D8%A2%D8%AC%D8%B1%DB%8C.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInShop 0.4s ease;
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7);
        }
        
        @keyframes fadeInShop { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .shop-main-content { text-align: center; background: transparent; padding: 0; color: #fff; width: 100%; max-width: 520px; }
        .shop-header h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #ffd89b, #ffaa66, #ff8c42); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 8px rgba(0,0,0,0.5); letter-spacing: 2px; }
        .shop-header p { font-size: 0.85rem; background: rgba(0,0,0,0.55); display: inline-block; padding: 5px 18px; border-radius: 50px; backdrop-filter: blur(8px); margin-top: 8px; }
        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; padding: 0 20px; margin: 25px 0; }
        .mafia-pack-card { background: linear-gradient(145deg, rgba(25, 20, 15, 0.85), rgba(15, 12, 10, 0.9)); backdrop-filter: blur(12px); border-radius: 28px; padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.25s ease; border: 1px solid rgba(255, 170, 80, 0.7); box-shadow: 0 18px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,200,0.15), 0 0 0 2px rgba(255,140,0,0.2); transform: translateY(-2px); }
        .mafia-pack-card:active { transform: scale(0.96) translateY(2px); }
        .mafia-pack-card.disabled-pack { opacity: 0.5; filter: grayscale(0.3); cursor: not-allowed; pointer-events: none; border-color: #6a6a6a; transform: none; }
        .pack-icon { font-size: 3.6rem; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)) drop-shadow(0 0 5px rgba(255,180,0,0.4)); margin-bottom: 8px; transition: 0.2s; }
        .pack-coins { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, #ffdd99, #ffaa44, #ff8800); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,100,0,0.5); }
        .pack-coins span { font-size: 1rem; background: none; -webkit-text-fill-color: #ffaa55; }
        .pack-name { font-size: 0.9rem; font-weight: bold; color: #ffddbb; background: rgba(0, 0, 0, 0.55); display: inline-block; padding: 5px 16px; border-radius: 50px; margin-top: 6px; letter-spacing: 1px; backdrop-filter: blur(4px); }
        .pack-status { margin-top: 12px; font-size: 0.7rem; background: rgba(0,0,0,0.6); display: inline-block; padding: 3px 14px; border-radius: 30px; color: #ffcc88; font-weight: 500; }
        .shop-gift-btn { background: linear-gradient(135deg, #ffaa44, #ff6600); color: white; border: none; padding: 14px 25px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 15px auto 10px auto; width: 80%; max-width: 250px; display: block; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .shop-gift-btn:active { transform: scale(0.96); }
        .close-shop-btn { background: linear-gradient(145deg, #2a241e, #1a1612); color: #ffdd99; border: 1px solid rgba(255, 170, 80, 0.7); padding: 12px 32px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; font-family: inherit; box-shadow: 0 8px 20px rgba(0,0,0,0.4); width: 80%; max-width: 220px; backdrop-filter: blur(4px); }
        .close-shop-btn:active { transform: scale(0.96); background: #3a3228; }
        .hidden { display: none; }
        .profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1001; }
        .profile-content { background: linear-gradient(145deg, #1e2a3a, #0f172a); padding: 2rem; border-radius: 2rem; text-align: center; color: white; width: 90%; max-width: 380px; border: 2px solid #ffaa44; box-shadow: 0 0 40px rgba(255,170,0,0.3); }
        .profile-content h2 { margin-bottom: 1rem; color: #ffaa66; }
        .profile-code { background: #00000088; padding: 12px; border-radius: 50px; font-family: monospace; font-size: 0.9rem; word-break: break-all; margin: 15px 0; border: 1px solid #ffaa66; direction: ltr; }
        .profile-copy-btn { background: linear-gradient(135deg, #ffaa44, #ff6600); border: none; color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .close-profile-btn { background: #2d3e5a; border: none; color: #ccc; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-top: 15px; }
        .gift-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1002; }
        .gift-content { background: linear-gradient(145deg, #1e2a3a, #0f172a); padding: 2rem; border-radius: 2rem; text-align: center; color: white; width: 90%; max-width: 400px; border: 2px solid #ffaa44; box-shadow: 0 0 40px rgba(255,170,0,0.3); }
        .gift-content h2 { margin-bottom: 1.5rem; color: #ffaa66; }
        .gift-content input { width: 100%; padding: 12px 15px; border-radius: 50px; border: none; outline: none; font-size: 1rem; text-align: center; margin-bottom: 1rem; font-family: monospace; font-size: 1rem; direction: ltr; }
        .gift-content select { width: 100%; padding: 12px 15px; border-radius: 50px; border: none; outline: none; font-size: 1rem; margin-bottom: 1rem; background: #2d3e5a; color: white; font-weight: bold; text-align: center; }
        .gift-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .send-gift-btn { background: linear-gradient(135deg, #ffaa44, #ff6600); border: none; color: white; flex: 1; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .cancel-gift-btn { background: #2d3e5a; border: none; color: #ccc; flex: 1; padding: 12px; border-radius: 50px; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%); background: #1a120ccc; backdrop-filter: blur(20px); color: #ffdd99; padding: 12px 28px; border-radius: 60px; font-weight: bold; font-size: 1rem; z-index: 9999; border: 2px solid #ffaa44; white-space: nowrap; font-family: inherit; }
        
        /* ===== صفحه لاوی‌ها (لیست آنلاین) ===== */
        .friends-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0057b3;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            animation: fadeInFriends 0.4s ease;
            padding: 80px 20px 20px 20px;
            overflow-y: auto;
        }
        
        .search-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 15px 20px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            direction: rtl;
        }
        
        .search-card h3 { color: #003366; margin-bottom: 12px; font-size: 1.4rem; text-align: center; }
        .search-input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .search-input-group input { flex: 1; padding: 12px 18px; border-radius: 50px; border: 2px solid #0057b3; outline: none; font-size: 1rem; text-align: center; font-family: inherit; min-width: 180px; }
        .search-input-group button { background: linear-gradient(135deg, #003d7a, #002a55); color: white; border: none; padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-input-group button:active { transform: scale(0.96); }
        .search-result { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #003366; font-weight: bold; background: #e6f0ff; padding: 10px; border-radius: 30px; }
        
        .create-lobby-btn {
            background: linear-gradient(135deg, #ff8800, #ff5500);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto;
            width: 80%;
            max-width: 300px;
            display: block;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        .create-lobby-btn:active { transform: scale(0.96); }
        
        .close-friends-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            backdrop-filter: blur(8px);
        }
        .close-friends-btn:active { transform: scale(0.96); }
        
        @keyframes fadeInFriends { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* لیست لاوی‌های آنلاین */
        .lobbies-list {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }
        .lobby-item {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .lobby-info h4 { color: #fff; font-size: 1.2rem; margin-bottom: 5px; }
        .lobby-info p { color: #ddd; font-size: 0.8rem; }
        .lobby-join-btn {
            background: linear-gradient(135deg, #00cc66, #009944);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .lobby-join-btn:active { transform: scale(0.95); }
        
        /* ===== استایل روم لاوی (مافیایی) ===== */
        .room-table { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .player-seat { width: 96px; height: 96px; position: absolute; border-radius: 50%; background: radial-gradient(circle at top, rgba(0,235,255,.96), rgba(0,90,200,1)); border: 3px solid rgba(0,225,255,.95); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 28px rgba(0,200,255,.55), 0 0 65px rgba(0,120,255,.25), inset 0 0 26px rgba(255,255,255,.18); transition: .25s; }
        .player-seat:hover { transform: scale(1.07); box-shadow: 0 0 45px rgba(0,225,255,.95), 0 0 90px rgba(0,120,255,.45); }
        .player-seat::before { content: ""; position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(0,220,255,.15); animation: pulse 2.8s infinite; }
        @keyframes pulse { 0% { transform: scale(.94); opacity: .5; } 70% { transform: scale(1.08); opacity: .08; } 100% { transform: scale(1.15); opacity: 0; } }
        .empty-seat { background: radial-gradient(circle at top, rgba(40,65,105,.96), rgba(8,18,38,1)); border: 2px solid rgba(140,200,255,.20); box-shadow: inset 0 0 20px rgba(255,255,255,.03), 0 0 22px rgba(0,0,0,.45); }
        .empty-seat::before { border: 2px solid rgba(255,255,255,.05); }
        .player-seat img { width: 74px; height: 74px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.96); box-shadow: 0 0 18px rgba(255,255,255,.16); }
        .empty-icon { font-size: 38px; color: rgba(255,255,255,.24); }
        .player-name-label { position: absolute; bottom: -35px; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; white-space: nowrap; }
        
        /* دکمه میکروفون روی صندلی */
        .mic-button {
            position: absolute;
            bottom: -12px;
            right: -12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a3a5a, #1a2a4a);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: 0.2s;
            font-size: 16px;
        }
        .mic-button.active {
            background: linear-gradient(145deg, #00cc88, #009966);
            border-color: #fff;
            box-shadow: 0 0 12px rgba(0,255,136,0.5);
        }
        .mic-button.recording {
            animation: pulseMic 1s infinite;
        }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
        }
        
        .room-center { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .room-bottom-bar { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 14px; z-index: 50; }
        .exit-room-btn, .room-ready-btn { border: none; border-radius: 20px; padding: 18px 34px; font-size: 17px; font-weight: bold; color: white; cursor: pointer; transition: .22s; }
        .exit-room-btn { background: linear-gradient(180deg, #00d5ff, #006eff); box-shadow: 0 0 38px rgba(0,180,255,.55), inset 0 0 18px rgba(255,255,255,.14); }
        .room-ready-btn { min-width: 170px; background: linear-gradient(180deg, #343f57, #1b2438); box-shadow: 0 0 24px rgba(0,0,0,.35), inset 0 0 12px rgba(255,255,255,.05); }
        .room-ready-btn.active { background: linear-gradient(180deg, #00f0a8, #00a86d); box-shadow: 0 0 38px rgba(0,255,170,.55), inset 0 0 18px rgba(255,255,255,.12); }
        .p1{ left:20px; top:5%; } .p2{ left:20px; top:21%; } .p3{ left:20px; top:37%; } .p4{ left:20px; top:53%; } .p5{ left:20px; top:69%; }
        .p6{ right:20px; top:5%; } .p7{ right:20px; top:21%; } .p8{ right:20px; top:37%; } .p9{ right:20px; top:53%; } .p10{ right:20px; top:69%; }
        @media(max-width:700px){
            .player-seat{ width:78px; height:78px; } .player-seat::before{ width:98px; height:98px; }
            .player-seat img{ width:58px; height:58px; } .empty-icon{ font-size:30px; }
            .room-bottom-bar{ width:95%; gap:10px; }
            .exit-room-btn, .room-ready-btn{ flex:1; padding:15px 10px; font-size:15px; }
            .mic-button { width: 26px; height: 26px; font-size: 12px; bottom: -8px; right: -8px; }
            .p1{ left:8px; top:8%; } .p2{ left:8px; top:23%; } .p3{ left:8px; top:38%; }
            .p4{ left:8px; top:53%; } .p5{ left:8px; top:68%; } .p6{ right:8px; top:8%; }
            .p7{ right:8px; top:23%; } .p8{ right:8px; top:38%; } .p9{ right:8px; top:53%; } .p10{ right:8px; top:68%; }
        }
        
        .create-lobby-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);

            background: linear-gradient(145deg, #1e2a3a, #0f172a);

        .create-lobby-content h2 { margin-bottom: 1.5rem; color: #ffaa66; }
        .create-lobby-content input { width: 100%; padding: 12px 15px; border-radius: 50px; border: none; outline: none; font-size: 1rem; text-align: center; margin-bottom: 1rem; font-family: inherit; }
        .create-lobby-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .confirm-create-btn { background: linear-gradient(135deg, #ffaa44, #ff6600); border: none; color: white; flex: 1; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .cancel-create-btn { background: #2d3e5a; border: none; color: #ccc; flex: 1; padding: 12px; border-radius: 50px; cursor: pointer; }
        
        #mafiaDialog {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }
        .dialog-box {
            width: 420px;
            background: linear-gradient(180deg,#01255e 0%,#00173b 100%);
            border-radius: 24px;
            border: 2px solid rgba(0,140,255,0.9);
            box-shadow: 0 0 40px rgba(0,120,255,0.55), inset 0 0 18px rgba(0,180,255,0.15), 0 10px 35px rgba(0,0,0,0.75);
            overflow: hidden;
            animation: dialogShow .35s ease;
        }
        .dialog-header { height: 72px; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg,#0a4eb5,#003b8f); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .dialog-header h2 { color: white; font-size: 22px; font-weight: bold; text-shadow: 0 0 12px rgba(255,255,255,0.25), 0 0 20px rgba(0,170,255,0.55); }
        .dialog-body { padding: 28px; text-align: center; }
        .dialog-text { color: white; font-size: 18px; line-height: 1.9; font-weight: bold; }
        .status-line { margin-top: 18px; height: 10px; width: 100%; border-radius: 20px; background: rgba(255,255,255,0.08); overflow: hidden; position: relative; }
        .status-line::before { content: ''; position: absolute; top: 0; right: -40%; width: 40%; height: 100%; border-radius: 20px; background: linear-gradient(90deg,transparent,#3bc1ff,transparent); animation: liveMove 1.8s linear infinite; }
        .dialog-footer { padding: 0 28px 28px; }
        .retry-btn { width: 100%; height: 56px; border: none; border-radius: 18px; background: linear-gradient(180deg,#1592ff,#0060ff); color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: .2s; box-shadow: 0 0 20px rgba(0,140,255,0.45), inset 0 -4px 8px rgba(0,0,0,0.25); }
        .retry-btn:hover { transform: scale(1.02); }
        @keyframes liveMove { 0% { right: -40%; } 100% { right: 120%; } }
        @keyframes dialogShow { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }
        
        /* نشانگر صحبت کردن */
        .speaking {
            animation: speakGlow 0.5s ease-in-out infinite alternate;
        }
        @keyframes speakGlow {
            from { box-shadow: 0 0 5px rgba(0,255,0,0.5); border-color: #00ff88; }
            to { box-shadow: 0 0 20px rgba(0,255,0,0.9); border-color: #00ff88; }
        }
        
        @media (max-width: 600px) { .packs-grid { gap: 16px; padding: 0 15px; } .pack-icon { font-size: 2.8rem; } .pack-coins { font-size: 1.4rem; } .pack-name { font-size: 0.8rem; } .shop-header h1 { font-size: 1.9rem; } .close-shop-btn { font-size: 1rem; padding: 10px 24px; } .profile-content { padding: 1.5rem; } .profile-code { font-size: 0.7rem; } .toast-msg { font-size: 0.8rem; white-space: normal; text-align: center; width: 80%; } }
        @media (max-width: 450px) { .packs-grid { gap: 12px; } .mafia-pack-card { padding: 15px 8px; } .pack-icon { font-size: 2.4rem; } .pack-coins { font-size: 1.2rem; } }
        @media (max-width: 900px) { .top-btn img { max-width: 240px; max-height: 240px; } .top-row { gap: 40px; bottom: 150px; } .currency-value { font-size: 1rem; } .instagram-story-ring-wrapper { width: 84px; height: 84px; } .avatar-container { width: 74px; height: 74px; } .avatar { width: 68px; height: 68px; } .gallery-img-btn img { width: 110px; max-height: 125px; } }
        @media (max-width: 700px) { .instagram-story-ring-wrapper { width: 78px; height: 78px; } .avatar-container { width: 68px; height: 68px; } .avatar { width: 62px; height: 62px; } .username-bar { font-size: 1rem; padding: 0.6rem 1.4rem 0.6rem 1.8rem; max-width: 180px; } .top-btn img { max-width: 190px; max-height: 190px; } .bottom-btn img { max-width: 130px; max-height: 130px; } .top-row { gap: 30px; bottom: 130px; } .gallery-img-btn img { width: 95px; max-height: 105px; } }
        @media (max-width: 550px) { .top-btn img { max-width: 150px; max-height: 150px; } .bottom-btn img { max-width: 105px; max-height: 105px; } .top-row { gap: 20px; bottom: 110px; } .gallery-img-btn img { width: 80px; max-height: 90px; } }
    </style>
</head>
<body>

    <div id="usernameModal" class="modal">
        <div class="modal-content">
            <h2>🎮 انتخاب نام کاربری 🎮</h2>
            <input type="text" id="usernameInput" placeholder="نام خود را وارد کنید..." maxlength="20" autocomplete="off">
            <button id="saveNameBtn">ورود به بازی</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="currency-item"><span class="currency-emoji">💎</span><span class="currency-value" id="gemsValue">0</span></div>
        <div class="currency-item"><span class="currency-emoji">🪙</span><span class="currency-value" id="coinsValue">0</span></div>
    </div>

    <div class="user-panel" id="profileBtn">
        <div class="instagram-story-ring-wrapper"><div class="instagram-story-ring"></div><div class="avatar-container"><img class="avatar" id="userAvatar" src="https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg" alt="Avatar"></div></div>
        <div class="username-bar" id="usernameDisplay">---</div>
    </div>

    <div class="right-vertical-gallery" id="rightGallery">
        <div class="gallery-img-btn" data-img="1"><img src="https://cdn.imgurl.ir/uploads/y004260_InShot__.png" alt="تصویر 1"></div>
        <div class="gallery-img-btn" data-img="2"><img src="https://cdn.imgurl.ir/uploads/b855600_InShot__.png" alt="تصویر 2"></div>
        <div class="gallery-img-btn" data-img="3"><img src="https://cdn.imgurl.ir/uploads/58616_InShot__.png" alt="تصویر 3"></div>
        <div class="gallery-img-btn" data-img="4"><img src="https://cdn.imgurl.ir/uploads/m347400_InShot__.png" alt="تصویر 4"></div>
        <div class="gallery-img-btn" data-img="5"><img src="https://cdn.imgurl.ir/uploads/l33891_InShot__.png" alt="تصویر 5"></div>
    </div>

    <div class="top-row">
        <div class="top-btn" id="topRightBtn"><img src="https://cdn.imgurl.ir/uploads/t03630_InShot__.png" alt="عکس بالایی راست"></div>
        <div class="top-btn" id="topLeftBtn"><img src="https://cdn.imgurl.ir/uploads/u338374_InShot__.png" alt="عکس بالایی چپ"></div>
    </div>

    <div class="bottom-group">
        <div class="bottom-images">
            <div class="bottom-btn" id="bottomRightImg"><img src="https://cdn.imgurl.ir/uploads/o580196_IMG_20260511_184033_171.jpg" alt="پایین راست"></div>
            <div class="bottom-btn" id="bottomCenterImg"><img src="https://cdn.imgurl.ir/uploads/b267514_IMG_20260511_184145_633.jpg" alt="پایین وسط"></div>
            <div class="bottom-btn" id="bottomLeftImg"><img src="https://cdn.imgurl.ir/uploads/d8154_IMG_20260511_184138_470.jpg" alt="پایین چپ"></div>
        </div>
    </div>

    <div id="mafiaDialog">
        <div class="dialog-box">
            <div class="dialog-header"><h2>ارتباط با سرور</h2></div>
            <div class="dialog-body"><div class="dialog-text">لطفاً منتظر بمونین...<br>در حال بررسی اتصال اینترنت</div><div class="status-line"></div></div>
            <div class="dialog-footer"><button class="retry-btn" onclick="retryConnection()">تلاش مجدد</button></div>
        </div>
    </div>

    <script>
        function toPersianNumber(number) {
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return number.toString().replace(/\d/g, function(x) { return persianDigits[parseInt(x)]; });
        }

        // ===== سیستم صوتی آنلاین =====
        let localStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let voiceChannel = null;
        let ablyVoice = null;
        
        function initVoiceChannel(lobbyId) {
            if(!ablyVoice) {
                ablyVoice = new Ably.Realtime({ key: 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo', clientId: currentUserId });
                ablyVoice.connection.on('connected', () => {
                    voiceChannel = ablyVoice.channels.get('voice-' + lobbyId);
                    voiceChannel.subscribe('voice-data', (message) => {
                        if(message.data && message.data.senderId !== currentUserId) {
                            const audio = new Audio(message.data.audioData);
                            audio.play().catch(e => console.log('Audio error:', e));
                        }
                    });
                });
            }
        }
        
        async function startRecording(lobbyId) {
            if(isRecording) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(localStream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if(event.data.size > 0) {
                        audioChunks.push(event.data);
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            if(voiceChannel && voiceChannel.connection && voiceChannel.connection.state === 'connected') {
                                voiceChannel.publish('voice-data', {
                                    senderId: currentUserId,
                                    audioData: reader.result
                                });
                            }
                        };
                        reader.readAsDataURL(blob);
                        audioChunks = [];
                    }
                };
                
                mediaRecorder.start(200);
                isRecording = true;
                showToast('🎙️ میکروفون روشن شد...', 1000);
            } catch(e) {
                showToast('❌ دسترسی به میکروفون امکانپذیر نیست!', 2000);
            }
        }
        
        function stopRecording() {
            if(mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                if(localStream) localStream.getTracks().forEach(track => track.stop());
                showToast('🔇 میکروفون خاموش شد', 1000);
            }
        }

        // ===== سیستم لاوی آنلاین با Ably =====
        let lobbies = [];
        let ablyLobby = null;
        let lobbyChannel = null;
        
        // بارگذاری لاوی‌ها از localStorage
        function loadLobbies() {
            const saved = localStorage.getItem('mafiaLobbies');
            if(saved) {
                lobbies = JSON.parse(saved);
            } else {
                lobbies = [];
            }
            // بروزرسانی لیست
            if(window.currentLobbyPage && window.currentLobbyPage.refreshList) {
                window.currentLobbyPage.refreshList();
            }
        }
        
        // ذخیره لاوی‌ها در localStorage و ارسال به Ably
        function saveLobbies() {
            localStorage.setItem('mafiaLobbies', JSON.stringify(lobbies));
            if(lobbyChannel && lobbyChannel.connection && lobbyChannel.connection.state === 'connected') {
                lobbyChannel.publish('lobbies-sync', { lobbies: lobbies });
            }
        }
        
        // اتصال به Ably برای همگام‌سازی لاوی‌ها
        function connectLobbySync() {
            if(typeof Ably === 'undefined' || !currentUserId) return;
            try {
                ablyLobby = new Ably.Realtime({ key: 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo', clientId: currentUserId });
                ablyLobby.connection.on('connected', () => {
                    lobbyChannel = ablyLobby.channels.get('lobby-sync');
                    lobbyChannel.subscribe('lobbies-sync', (message) => {
                        if(message.data && message.data.lobbies) {
                            lobbies = message.data.lobbies;
                            localStorage.setItem('mafiaLobbies', JSON.stringify(lobbies));
                            if(window.currentLobbyPage && window.currentLobbyPage.refreshList) {
                                window.currentLobbyPage.refreshList();
                            }
                            if(window.currentLobbyRoom && window.currentLobbyRoom.updateUI) {
                                window.currentLobbyRoom.updateUI();
                            }
                        }
                    });
                    // بعد از اتصال، لاوی‌های خود را همگام کن
                    lobbyChannel.publish('lobbies-sync', { lobbies: lobbies });
                });
            } catch(e) { console.error('Sync error:', e); }
        }
        
        // ایجاد لاوی جدید
        function createLobby(name) {
            if(!currentUserId || !currentUsername) return false;
            const newLobby = {
                id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 4),
                name: name,
                ownerId: currentUserId,
                ownerName: currentUsername,
                players: [{ id: currentUserId, name: currentUsername, avatar: avatarImg.src }],
                createdAt: Date.now()
            };
            lobbies.push(newLobby);
            saveLobbies();
            showToast(`✅ لاوی "${name}" ساخته شد!`, 2000);
            return newLobby;
        }
        
        // پیوستن به لاوی
        function joinLobby(lobbyId) {
            const lobby = lobbies.find(l => l.id === lobbyId);
            if(!lobby) { showToast('❌ لاوی یافت نشد!'); return null; }
            if(lobby.players.some(p => p.id === currentUserId)) { showToast('❌ شما قبلاً در این لاوی هستید!'); return null; }
            if(lobby.players.length >= 10) { showToast('❌ لاوی پر است!'); return null; }
            
            lobby.players.push({ id: currentUserId, name: currentUsername, avatar: avatarImg.src });
            saveLobbies();
            showToast(`✅ شما به لاوی "${lobby.name}" پیوستید!`, 2000);
            return lobby;
        }
        
        // خروج از لاوی
        function leaveLobby(lobbyId) {
            if(voiceChannel) stopRecording();
            const lobby = lobbies.find(l => l.id === lobbyId);
            if(lobby) {
                const index = lobby.players.findIndex(p => p.id === currentUserId);
                if(index !== -1) lobby.players.splice(index, 1);
                if(lobby.players.length === 0) {
                    const lobbyIndex = lobbies.findIndex(l => l.id === lobbyId);
                    if(lobbyIndex !== -1) lobbies.splice(lobbyIndex, 1);
                } else if(lobby.ownerId === currentUserId && lobby.players.length > 0) {
                    lobby.ownerId = lobby.players[0].id;
                    lobby.ownerName = lobby.players[0].name;
                }
                saveLobbies();
            }
            showToast('🚪 شما لاوی را ترک کردید');
        }
        
        // نمایش صفحه لاوی (اتاق)
        function showLobbyRoom(lobbyId) {
            const lobby = lobbies.find(l => l.id === lobbyId);
            if(!lobby) { showToast('لاوی وجود ندارد'); return; }
            if(!lobby.players.some(p => p.id === currentUserId)) { showToast('شما عضو این لاوی نیستید'); return; }
            
            initVoiceChannel(lobbyId);
            
            const existingRoom = document.querySelector('.room-table');
            if(existingRoom && existingRoom.parentNode) existingRoom.remove();
            
            const roomPage = document.createElement('div');
            roomPage.style.position = 'fixed';
            roomPage.style.top = '0';
            roomPage.style.left = '0';
            roomPage.style.width = '100%';
            roomPage.style.height = '100%';
            roomPage.style.zIndex = '400';
            roomPage.style.background = 'radial-gradient(circle at top, rgba(0,220,255,.20), transparent 28%), radial-gradient(circle at bottom, rgba(0,100,255,.14), transparent 40%), linear-gradient(180deg, #123c72 0%, #0a2850 22%, #071c38 46%, #051427 70%, #020914 100%)';
            
            const seatPositions = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8', 'p9', 'p10'];
            let micActive = false;
            
            function updateRoom() {
                const currentLobby = lobbies.find(l => l.id === lobbyId);
                if(!currentLobby) {
                    if(roomPage && roomPage.parentNode) roomPage.remove();
                    showToast('لاوی بسته شده است');
                    return;
                }
                if(!currentLobby.players.some(p => p.id === currentUserId)) {
                    if(roomPage && roomPage.parentNode) roomPage.remove();
                    showToast('شما از لاوی خارج شده‌اید');
                    return;
                }
                
                let seatsHtml = '';
                for(let i = 0; i < 10; i++) {
                    const player = currentLobby.players[i];
                    if(player) {
                        seatsHtml += `<div class="player-seat ${seatPositions[i]}"><img src="${player.avatar}" onerror="this.src='https://cdn.imgurl.ir/uploads/z053125_SelfComic_Ninja1775502890071.jpg'"><div class="player-name-label">${player.name}</div>${player.id === currentUserId ? `<div class="mic-button ${micActive ? 'active recording' : ''}" id="micBtn">${micActive ? '🎤' : '🎙️'}</div>` : ''}</div>`;
                    } else {
                        seatsHtml += `<div class="player-seat empty-seat ${seatPositions[i]}"><div class="empty-icon">+</div><div class="player-name-label">صندلی خالی</div></div>`;
                    }
                }
                
                roomPage.innerHTML = `<div class="room-table">${seatsHtml}<div class="room-center"><div style="background:rgba(0,0,0,0.6);border-radius:50px;padding:15px 30px;color:white;font-weight:bold;text-align:center;">🎮 ${currentLobby.name} 🎮<br><span style="font-size:12px;">👥 ${currentLobby.players.length}/10 نفر</span></div></div><div class="room-bottom-bar"><button class="room-ready-btn" id="readyBtn">آماده نیستم</button><button class="exit-room-btn" id="exitBtn">🔙 خروج</button></div></div>`;
                
                const micBtn = document.getElementById('micBtn');
                if(micBtn) {
                    micBtn.onclick = () => {
                        if(micActive) {
                            stopRecording();
                            micActive = false;
                            micBtn.classList.remove('active', 'recording');
                            micBtn.innerHTML = '🎙️';
                        } else {
                            startRecording(lobbyId);
                            micActive = true;
                            micBtn.classList.add('active', 'recording');
                            micBtn.innerHTML = '🎤';
                        }
                    };
                }
                
                const readyBtn = document.getElementById('readyBtn');
                if(readyBtn) {
                    let ready = false;
                    readyBtn.onclick = () => {
                        ready = !ready;
                        if(ready) { readyBtn.classList.add('active'); readyBtn.innerText = 'آماده هستم'; showToast('✅ شما آماده شدید!', 1000); }
                        else { readyBtn.classList.remove('active'); readyBtn.innerText = 'آماده نیستم'; }
                    };
                }
                
                const exitBtn = document.getElementById('exitBtn');
                if(exitBtn) exitBtn.onclick = () => {
                    if(micActive) stopRecording();
                    leaveLobby(lobbyId);
                    if(roomPage && roomPage.parentNode) roomPage.remove();
                    setTimeout(() => showFriendsPage(), 100);
                };
            }
            
            updateRoom();
            document.body.appendChild(roomPage);
            
            window.currentLobbyRoom = { updateUI: updateRoom };
            const interval = setInterval(() => {
                if(document.body.contains(roomPage)) {
                    const currentLobby = lobbies.find(l => l.id === lobbyId);
                    if(currentLobby && currentLobby.players.some(p => p.id === currentUserId)) {
                        updateRoom();
                    } else {
                        clearInterval(interval);
                        if(document.body.contains(roomPage)) roomPage.remove();
                    }
                } else { clearInterval(interval); }
            }, 2000);
        }
        
        // صفحه اصلی لیست لاوی‌ها
        function showFriendsPage() {
            if(!currentUserId) { showToast('❌ ابتدا نام کاربری خود را انتخاب کنید'); return; }
            
            const existingPage = document.querySelector('.friends-page');
            if(existingPage) existingPage.remove();
            
            const page = document.createElement('div');
            page.className = 'friends-page';
            page.innerHTML = `
                <div class="search-card"><h3>🔍 جستجوی دوستان</h3><div class="search-input-group"><input type="text" id="searchInput" placeholder="کد کاربری دوست خود را وارد کنید..."><button id="searchBtn">جستجو</button></div><div id="searchResult" class="search-result"></div></div>
                <button class="create-lobby-btn" id="createBtn">➕ ایجاد لاوی آنلاین</button>
                <div class="lobbies-list" id="lobbiesList"></div>
                <button class="close-friends-btn">🔙 بازگشت</button>
            `;
            document.body.appendChild(page);
            
            function refreshList() {
                const container = document.getElementById('lobbiesList');
                if(!container) return;
                if(lobbies.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:white;padding:20px;">🎮 هیچ لاوی فعالی وجود ندارد</div>';
                    return;
                }
                container.innerHTML = lobbies.map(lobby => `
                    <div class="lobby-item">
                        <div class="lobby-info">
                            <h4>🎭 ${lobby.name}</h4>
                            <p>👑 ${lobby.ownerName} | 👥 ${lobby.players.length}/10 نفر</p>
                        </div>
                        ${!lobby.players.some(p => p.id === currentUserId) ? 
                            `<button class="lobby-join-btn" onclick="window.joinLobbyHandler('${lobby.id}')">➕ ورود</button>` :
                            `<button class="lobby-join-btn" style="background:#44aa44;" onclick="window.enterLobbyHandler('${lobby.id}')">🎮 ورود</button>`
                        }
                    </div>
                `).join('');
            }
            
            window.joinLobbyHandler = (id) => {
                const lobby = joinLobby(id);
                if(lobby) { refreshList(); showLobbyRoom(id); page.remove(); }
            };
            window.enterLobbyHandler = (id) => { showLobbyRoom(id); page.remove(); };
            
            document.getElementById('searchBtn').onclick = () => {
                const code = document.getElementById('searchInput').value.trim();
                const resultDiv = document.getElementById('searchResult');
                if(!code) { resultDiv.innerHTML = '⚠️ کد را وارد کنید'; return; }
                if(code === currentUserId) { resultDiv.innerHTML = '🎭 این کد شماست!'; return; }
                resultDiv.innerHTML = `✅ کاربر با کد ${code} پیدا شد! برای ارسال هدیه به فروشگاه بروید.`;
            };
            
            document.getElementById('createBtn').onclick = () => {
                const modalDiv = document.createElement('div');
                modalDiv.className = 'create-lobby-modal';
                modalDiv.innerHTML = `<div class="create-lobby-content"><h2>🎮 لاوی جدید</h2><input type="text" id="lobbyName" placeholder="اسم لاوی..."><div class="create-lobby-buttons"><button class="confirm-create-btn" id="confirmCreate">✨ ایجاد</button><button class="cancel-create-btn" id="cancelCreate">❌ انصراف</button></div></div>`;
                document.body.appendChild(modalDiv);
                document.getElementById('confirmCreate').onclick = () => {
                    const name = document.getElementById('lobbyName').value.trim();
                    if(!name) { showToast('❌ اسم لاوی را وارد کنید'); return; }
                    const newLobby = createLobby(name);
                    if(newLobby) { modalDiv.remove(); page.remove(); showLobbyRoom(newLobby.id); }
                };
                document.getElementById('cancelCreate').onclick = () => modalDiv.remove();
            };
            
            page.querySelector('.close-friends-btn').onclick = () => page.remove();
            
            window.currentLobbyPage = { refreshList: refreshList };
            refreshList();
        }
        
        // ===== بخش اصلی کد =====
        const modal = document.getElementById('usernameModal');
        const usernameInput = document.getElementById('usernameInput');
        const saveBtn = document.getElementById('saveNameBtn');
        const usernameDisplaySpan = document.getElementById('usernameDisplay');
        const avatarImg = document.getElementById('userAvatar');
        const gemsSpan = document.getElementById('gemsValue');
        const coinsSpan = document.getElementById('coinsValue');
        const topRight = document.getElementById('topRightBtn');
        const topLeft = document.getElementById('topLeftBtn');
        const bottomRight = document.getElementById('bottomRightImg');
        const bottomCenter = document.getElementById('bottomCenterImg');
        const shopButton = document.getElementById('bottomLeftImg');
        const galleryBtns = document.querySelectorAll('.gallery-img-btn');
        const profileBtn = document.getElementById('profileBtn');
        
        const ABLY_KEY = 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo';
        let ably = null, channel = null;
        let currentUserId = '', currentCoins = 0, currentUsername = '';
        
        const DAILY_PACKS = [{ id: 0, coins: 250, name: "نقره‌ای", emoji: "🥈" },{ id: 1, coins: 500, name: "طلایی", emoji: "🌟" },{ id: 2, coins: 100, name: "الماسی", emoji: "💎" },{ id: 3, coins: 150, name: "رویایی", emoji: "✨" }];
        
        function updateCoins() { coinsSpan.innerText = toPersianNumber(currentCoins); }
        function loadCurrencies() { let gems = localStorage.getItem('userGems') || 1250; let coins = localStorage.getItem('userCoins') || 8300; localStorage.setItem('userGems', gems); localStorage.setItem('userCoins', coins); gemsSpan.innerText = toPersianNumber(Number(gems)); currentCoins = Number(coins); updateCoins(); }
        function addCoins(amount) { let val = parseInt(localStorage.getItem('userCoins')) || 0; val += amount; localStorage.setItem('userCoins', val); currentCoins = val; updateCoins(); return val; }
        function removeCoins(amount) { let val = parseInt(localStorage.getItem('userCoins')) || 0; if(val >= amount) { val -= amount; localStorage.setItem('userCoins', val); currentCoins = val; updateCoins(); return true; } return false; }
        function getPackStatus() { let last = localStorage.getItem('dailyPackClaims'); if(!last) return {}; try { return JSON.parse(last); } catch(e) { return {}; } }
        function updatePackStatus(id) { let s = getPackStatus(); const today = new Date().toLocaleDateString('en-CA'); s[id] = today; localStorage.setItem('dailyPackClaims', JSON.stringify(s)); }
        function canClaimPack(id) { let s = getPackStatus(); const today = new Date().toLocaleDateString('en-CA'); return !s[id] || s[id] !== today; }
        function showToast(msg, dur = 2000) { const t = document.createElement('div'); t.className = 'toast-msg'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), dur); }
        
        function showProfile() {
            if(!currentUserId) { showToast('❌ ابتدا نام کاربری را انتخاب کنید'); return; }
            const d = document.createElement('div'); d.className = 'profile-modal';
            d.innerHTML = `<div class="profile-content"><h2>👤 پروفایل</h2><h3 style="color:#ffaa66;">${currentUsername}</h3><div class="profile-code">${currentUserId}</div><button class="profile-copy-btn" id="copyBtn">📋 کپی</button><button class="close-profile-btn" id="closeBtn">🔙 بستن</button></div>`;
            document.body.appendChild(d);
            document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(currentUserId); showToast('📋 کپی شد!'); };
            document.getElementById('closeBtn').onclick = () => d.remove();
        }
        
        function connectGift() { if(typeof Ably === 'undefined' || !currentUserId) return; try { ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUserId }); ably.connection.on('connected', () => { channel = ably.channels.get('gift-channel'); channel.subscribe('gift', (msg) => { if(msg.data && msg.data.to === currentUserId) { addCoins(msg.data.amount); showToast(`🎁 ${msg.data.from} به شما ${toPersianNumber(msg.data.amount)} سکه هدیه داد!`); } }); }); } catch(e) { console.error(e); } }
        
        function showGift() {
            if(!currentUserId) { showToast('❌ ابتدا نام خود را انتخاب کنید'); return; }
            if(currentCoins < 50) { showToast(`❌ حداقل ۵۰ سکه نیاز است!`); return; }
            const d = document.createElement('div'); d.className = 'gift-modal';
            d.innerHTML = `<div class="gift-content"><h2>🎁 هدیه سکه</h2><input type="text" id="targetCode" placeholder="کد کاربری دوست..."><select id="amountSelect"><option value="50">۵۰</option><option value="100">۱۰۰</option><option value="200">۲۰۰</option><option value="500">۵۰۰</option><option value="1000">۱۰۰۰</option></select><div class="gift-buttons"><button class="send-gift-btn" id="sendBtn">🎁 ارسال</button><button class="cancel-gift-btn" id="cancelBtn">❌ انصراف</button></div></div>`;
            document.body.appendChild(d);
            document.getElementById('sendBtn').onclick = () => {
                const target = document.getElementById('targetCode').value.trim();
                const amount = parseInt(document.getElementById('amountSelect').value);
                if(!target) { showToast('کد را وارد کنید'); return; }
                if(target === currentUserId) { showToast('نمی‌توانید به خودتان هدیه دهید'); return; }
                if(currentCoins < amount) { showToast('سکه کافی ندارید'); return; }
                if(channel) { removeCoins(amount); channel.publish('gift', { to: target, from: currentUsername, amount: amount }); showToast(`✅ ${toPersianNumber(amount)} سکه ارسال شد!`); d.remove(); }
                else { showToast('❌ خطا در اتصال'); }
            };
            document.getElementById('cancelBtn').onclick = () => d.remove();
        }
        
        function showShop() {
            const existing = document.querySelector('.shop-page'); if(existing) existing.remove();
            const page = document.createElement('div'); page.className = 'shop-page';
            page.innerHTML = `<div class="shop-main-content"><div class="shop-header"><h1>🏪 بازار سیاه</h1><p>✨ بسته روزانه ✨</p></div><div class="packs-grid" id="packsGrid"></div><button class="shop-gift-btn" id="giftBtn">🎁 هدیه سکه</button><button class="close-shop-btn">🔙 خروج</button></div>`;
            document.body.appendChild(page);
            function render() { const grid = document.getElementById('packsGrid'); if(!grid) return; grid.innerHTML = ''; DAILY_PACKS.forEach(p => { const avail = canClaimPack(p.id); const card = document.createElement('div'); card.className = `mafia-pack-card ${!avail ? 'disabled-pack' : ''}`; card.innerHTML = `<div class="pack-icon">${p.emoji}</div><div class="pack-coins">+${toPersianNumber(p.coins)} <span>سکه</span></div><div class="pack-name">${p.name}</div><div class="pack-status">${avail ? '🔥 دریافت' : '✅ انجام شد'}</div>`; if(avail) { card.onclick = () => { addCoins(p.coins); updatePackStatus(p.id); showToast(`🎁 +${toPersianNumber(p.coins)} سکه`); render(); }; } grid.appendChild(card); }); }
            render();
            document.getElementById('giftBtn').onclick = () => showGift();
            page.querySelector('.close-shop-btn').onclick = () => page.remove();
        }
        
        function loadUser() {
            const savedName = localStorage.getItem('gameUsername');
            const savedId = localStorage.getItem('userId');
            if(savedName && savedName.trim() !== "") {
                currentUsername = savedName;
                usernameDisplaySpan.innerText = currentUsername;
                modal.style.display = 'none';
                if(savedId) currentUserId = savedId;
                else { currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); localStorage.setItem('userId', currentUserId); }
                connectGift();
                connectLobbySync();
                loadLobbies();
            } else { modal.style.display = 'flex'; usernameInput.focus(); }
        }
        
        function saveUser() {
            let name = usernameInput.value.trim();
            if(!name) { alert("لطفاً نام خود را وارد کنید!"); return; }
            if(name.length > 20) name = name.slice(0,20);
            currentUsername = name;
            currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
            localStorage.setItem('gameUsername', currentUsername);
            localStorage.setItem('userId', currentUserId);
            usernameDisplaySpan.innerText = currentUsername;
            modal.style.display = 'none';
            connectGift();
            connectLobbySync();
            loadLobbies();
            showToast(`✅ خوش آمدی ${currentUsername}!`);
        }
        
        saveBtn.onclick = saveUser;
        usernameInput.onkeypress = (e) => { if(e.key === 'Enter') saveUser(); };
        if(shopButton) shopButton.onclick = (e) => { e.stopPropagation(); showShop(); };
        if(profileBtn) profileBtn.onclick = (e) => { e.stopPropagation(); showProfile(); };
        if(topRight) topRight.onclick = (e) => { e.stopPropagation(); showFriendsPage(); };
        
        const silent = () => {};
        if(topLeft) topLeft.onclick = silent;
        if(bottomRight) bottomRight.onclick = silent;
        if(bottomCenter) bottomCenter.onclick = silent;
        galleryBtns.forEach(btn => btn.onclick = silent);
        
        usernameDisplaySpan.ondblclick = () => { modal.style.display = 'flex'; usernameInput.value = localStorage.getItem('gameUsername') || ''; usernameInput.focus(); };
        avatarImg.onerror = () => { avatarImg.src = "https://via.placeholder.com/80?text=Avatar"; };
        
        loadUser();
        loadCurrencies();
        window.onload = () => { if(localStorage.getItem('gameUsername')) modal.style.display = 'none'; const g = document.getElementById('rightGallery'); if(g) { g.style.background = 'transparent'; g.style.backdropFilter = 'none'; g.style.border = 'none'; } };
        
        window.retryConnection = function() {
            const txt = document.querySelector('#mafiaDialog .dialog-text');
            if(txt) txt.innerHTML = 'در حال بررسی اتصال...';
            setTimeout(() => {
                if(navigator.onLine) { if(txt) txt.innerHTML = 'اتصال برقرار شد'; setTimeout(() => { document.getElementById('mafiaDialog').style.display = 'none'; }, 1200); }
                else { if(txt) txt.innerHTML = 'اتصال برقرار نشد<br>لطفاً دوباره تلاش کنید'; }
            }, 1500);
        };
        setTimeout(() => { if(!navigator.onLine) document.getElementById('mafiaDialog').style.display = 'flex'; }, 500);
    </script>
</body>
</html>
