<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Error</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
height:100vh;
background:radial-gradient(circle at 20% 20%,#1e3a8a,#0f172a 70%);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* Animated Background Glow */
body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#3b82f6 0%,transparent 70%);
animation:moveGlow 8s infinite alternate ease-in-out;
filter:blur(120px);
opacity:.5;
}

@keyframes moveGlow{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

/* Overlay */
.overlay{
position:fixed;
inset:0;
backdrop-filter:blur(25px);
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:center;
animation:fadeIn .6s ease;
}

/* Card */
.card{
width:95%;
max-width:480px;
padding:45px 35px;
border-radius:30px;
background:rgba(255,255,255,0.08);
box-shadow:
0 40px 120px rgba(0,0,0,.8),
inset 0 0 0 1px rgba(255,255,255,.08);
text-align:center;
color:#fff;
position:relative;
overflow:hidden;
}

/* Neon Border */
.card::before{
content:'';
position:absolute;
inset:-2px;
border-radius:32px;
background:linear-gradient(45deg,#00f2fe,#4facfe,#00f2fe);
z-index:-1;
filter:blur(15px);
opacity:.7;
}

/* Icon */
.icon{
font-size:80px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

h1{
font-size:24px;
font-weight:800;
margin-bottom:15px;
}

p{
font-size:15px;
opacity:.85;
line-height:1.9;
margin-bottom:30px;
}

/* Loader */
.loader{
width:60px;
height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #00f2fe;
margin:0 auto 30px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Button */
button{
padding:15px 40px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(45deg,#3b82f6,#00f2fe);
color:#fff;
transition:.3s;
box-shadow:0 15px 40px rgba(0,242,254,.6);
}

button:hover{
transform:translateY(-4px) scale(1.05);
}

/* Blue Screen */
.blue-screen{
position:fixed;
inset:0;
background:#0b3cff;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
opacity:0;
pointer-events:none;
transition:opacity .6s ease;
}

.blue-screen.active{
opacity:1;
pointer-events:auto;
}

.blue-screen h2{
font-size:26px;
margin-bottom:15px;
}

.blue-screen p{
font-size:16px;
opacity:.9;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

</style>
</head>
<body>

<div class="overlay" id="overlay">
<div class="card">
<div class="icon">⚠️</div>
<h1>ارتباط با سرور قطع شد</h1>
<p>
در حال حاضر امکان اتصال به سرور وجود ندارد.
لطفاً اتصال اینترنت خود را بررسی نمایید.
</p>
<div class="loader"></div>
<button onclick="showBlue()">تلاش مجدد</button>
</div>
</div>

<div class="blue-screen" id="blue">
<h2>ما نمی‌توانیم شما را متصل کنیم</h2>
<p>لطفاً چند لحظه منتظر بمانید...</p>
</div>

<script>
function showBlue(){
document.getElementById("overlay").style.display="none";
document.getElementById("blue").classList.add("active");
}
</script>

</body>
</html>
