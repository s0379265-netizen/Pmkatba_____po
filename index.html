<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Error Dialog</title>
<style>
body{
    margin:0;
    font-family:tahoma, sans-serif;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
}
.dialog{
    background:#1e293b;
    width:90%;
    max-width:400px;
    border-radius:16px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    animation:fadeIn 0.4s ease;
}
.icon{
    font-size:55px;
    margin-bottom:10px;
}
h2{
    color:#fff;
    margin:10px 0;
}
p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.6;
}
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:not-allowed;
    background:linear-gradient(45deg,#ef4444,#dc2626);
    color:#fff;
    opacity:0.85;
}
@keyframes fadeIn{
    from{opacity:0;transform:scale(0.9);}
    to{opacity:1;transform:scale(1);}
}
</style>
</head>
<body>

<div class="overlay">
    <div class="dialog">
        <div class="icon">⚠️</div>
        <h2>خطا در ارتباط با سرور</h2>
        <p>
            در حال حاضر امکان اتصال به سرور وجود ندارد.
            لطفاً اتصال اینترنت خود را بررسی نمایید.
        </p>
        <button disabled>تلاش مجدد</button>
    </div>
</div>

<script>
document.querySelector("button").addEventListener("click",function(e){
    e.preventDefault();
});
</script>

</body>
</html>
