<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دیالوگ سه بعدی | تیم توسعه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Vazirmatn', sans-serif;
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        /* پس‌زمینه سیاه با ذرات سه بعدی */
        .particles-3d {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle-3d {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffd700, #ff8800);
            border-radius: 50%;
            opacity: 0;
            animation: particleRise 5s ease-in-out infinite;
            box-shadow: 0 0 12px #ffd700;
        }

        @keyframes particleRise {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            30% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-20vh) translateX(20px) scale(1.8);
                opacity: 0;
            }
        }

        /* کانتینر دیالوگ وسط صفحه - بدون قابلیت حرکت */
        .dialog-container {
            position: relative;
            z-index: 20;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        /* دیالوگ سه بعدی فوق العاده خفن - بدون hover حرکت */
        .dialog-ultra-3d {
            width: 340px;
            max-width: 88vw;
            background: linear-gradient(145deg, rgba(8,12,25,0.98), rgba(3,5,12,0.98));
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 35px 30px;
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(30px) rotateX(6deg) rotateY(2deg);
            box-shadow: 
                0 40px 70px rgba(0,0,0,0.8),
                0 0 0 2px rgba(255,215,0,0.4),
                0 0 0 5px rgba(0,0,0,0.3),
                0 0 50px rgba(255,215,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: ultraFloat 4s ease-in-out infinite;
            transition: none;
            cursor: default;
            pointer-events: auto;
        }

        /* حذف هرگونه حرکت با هاور */
        .dialog-ultra-3d:hover {
            transform: translateZ(30px) rotateX(6deg) rotateY(2deg);
            box-shadow: 
                0 40px 70px rgba(0,0,0,0.8),
                0 0 0 2px rgba(255,215,0,0.5),
                0 0 60px rgba(255,215,0,0.4);
        }

        @keyframes ultraFloat {
            0% { transform: translateZ(30px) rotateX(6deg) rotateY(2deg) translateY(0px); }
            50% { transform: translateZ(40px) rotateX(6deg) rotateY(2deg) translateY(-8px); }
            100% { transform: translateZ(30px) rotateX(6deg) rotateY(2deg) translateY(0px); }
        }

        /* هاله نورانی سه بعدی پشت دیالوگ */
        .glow-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 140%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,215,0,0.2), rgba(255,215,0,0.05), transparent 80%);
            border-radius: 50%;
            z-index: -1;
            animation: auraPulse 3.5s ease-in-out infinite;
            filter: blur(20px);
        }

        @keyframes auraPulse {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
        }

        /* لایه بازتاب (reflection) */
        .reflection {
            position: absolute;
            bottom: -20px;
            left: 10%;
            width: 80%;
            height: 30px;
            background: radial-gradient(ellipse, rgba(255,215,0,0.2), transparent);
            filter: blur(10px);
            border-radius: 50%;
            z-index: -1;
        }

        /* آیکون سه بعدی چرخان بدون حرکت ماوس */
        .icon-3d-rotate {
            font-size: 60px;
            display: inline-block;
            animation: icon3DRotate 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ffd700);
            margin-bottom: 15px;
        }

        @keyframes icon3DRotate {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            25% { transform: rotateY(90deg) rotateX(5deg) scale(1.05); }
            50% { transform: rotateY(180deg) rotateX(0deg) scale(1.1); }
            75% { transform: rotateY(270deg) rotateX(-5deg) scale(1.05); }
            100% { transform: rotateY(360deg) rotateX(0deg) scale(1); }
        }

        /* عنوان سه بعدی */
        .title-3d-ultra {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffaa33, #ff8800, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 18px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
            transform: translateZ(15px);
        }

        /* متن */
        .message-3d {
            color: #ccddee;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 20px;
            transform: translateZ(10px);
        }

        .highlight-gold {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 8px #ffd700;
        }

        /* بدج‌های سه بعدی */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 18px 0;
        }

        .badge-3d {
            background: linear-gradient(145deg, rgba(255,215,0,0.15), rgba(255,150,0,0.05));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 40px;
            padding: 6px 15px;
            font-size: 12px;
            color: #ffeecc;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transform: translateZ(8px);
            backdrop-filter: blur(4px);
        }

        /* دکمه سه بعدی با افکت بدون حرکت */
        .btn-3d-solid {
            background: linear-gradient(145deg, #ffd700, #ff9900);
            border: none;
            padding: 14px 35px;
            margin-top: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #1a1a2e;
            box-shadow: 0 6px 0 #b87700, 0 0 20px rgba(255,215,0,0.6);
            transform: translateY(-3px);
            transition: all 0.1s ease;
            position: relative;
        }

        .btn-3d-solid:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b87700;
        }

        /* دکمه بستن سه بعدی */
        .close-btn-ultra {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255,80,80,0.2);
            border: 1px solid rgba(255,100,100,0.6);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #ff9999;
            font-size: 18px;
            backdrop-filter: blur(4px);
        }

        .close-btn-ultra:hover {
            background: rgba(255,60,60,0.6);
            transform: scale(1.08);
            color: white;
            box-shadow: 0 0 12px rgba(255,0,0,0.6);
        }

        /* قفل حرکت ماوس روی کل صفحه */
        body {
            cursor: default;
        }

        @media (max-width: 550px) {
            .dialog-ultra-3d {
                width: 300px;
                padding: 25px 20px;
            }
            .title-3d-ultra {
                font-size: 20px;
            }
            .badge-3d {
                font-size: 10px;
                padding: 4px 12px;
            }
            .btn-3d-solid {
                padding: 12px 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="particles-3d" id="particlesContainer"></div>

<div class="dialog-container">
    <div class="glow-aura"></div>
    <div class="dialog-ultra-3d" id="dialog3d">
        <div class="close-btn-ultra" id="closeBtn3d">✖</div>
        <div class="reflection"></div>
        <div class="icon-3d-rotate">🌀</div>
        <div class="title-3d-ultra">تیم توسعه دهنده</div>
        <div class="message-3d">
            <span class="highlight-gold">🔧 تیم توسعه در حال بروزرسانی است 🔧</span><br>
            لطفاً شکیبا باشید و منتظر بمانید...
        </div>
        <div class="badge-container">
            <span class="badge-3d">🎮 مافیا ۳ بعدی</span>
            <span class="badge-3d">🎙️ چت صوتی</span>
            <span class="badge-3d">🏆 لیگ حرفه‌ای</span>
            <span class="badge-3d">⚡ رقابت زنده</span>
        </div>
        <button class="btn-3d-solid" id="retryBtn3d">🔄 تلاش مجدد</button>
    </div>
</div>

<script>
    // ذرات سه بعدی طلایی
    function createParticles3d() {
        const container = document.getElementById('particlesContainer');
        const particleCount = 100;
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle-3d';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 6 + 's';
            p.style.animationDuration = 4 + Math.random() * 5 + 's';
            p.style.width = 2 + Math.random() * 5 + 'px';
            p.style.height = p.style.width;
            p.style.opacity = 0.3 + Math.random() * 0.6;
            container.appendChild(p);
        }
    }

    let dialogVisible = true;
    const dialog = document.getElementById('dialog3d');

    function showDialog() {
        dialog.style.display = 'block';
        dialog.style.animation = 'none';
        dialog.offsetHeight;
        dialog.style.animation = 'ultraFloat 4s ease-in-out infinite';
        dialogVisible = true;
    }

    function closeDialog() {
        dialog.style.display = 'none';
        dialogVisible = false;
    }

    function retry() {
        const btn = document.getElementById('retryBtn3d');
        btn.disabled = true;
        btn.textContent = '⏳ در حال بررسی...';
        
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '🔄 تلاش مجدد';
            if (!dialogVisible) {
                showDialog();
            }
        }, 700);
    }

    document.getElementById('closeBtn3d').onclick = closeDialog;
    document.getElementById('retryBtn3d').onclick = () => {
        closeDialog();
        retry();
    };

    createParticles3d();
    showDialog();

    // قفل کامل حرکت دیالوگ با ماوس
    document.querySelectorAll('.dialog-ultra-3d, .dialog-ultra-3d *').forEach(el => {
        el.style.pointerEvents = 'auto';
    });
</script>
</body>
</html>
