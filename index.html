<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Error</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@500;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
overflow:hidden;
animation:bgShift 12s infinite alternate ease-in-out;
}

/* Smooth Blue Gradient Animation */
@keyframes bgShift{
0%{
background:linear-gradient(135deg,#0f2027,#203a43);
}
25%{
background:linear-gradient(135deg,#1e3c72,#2a5298);
}
50%{
background:linear-gradient(135deg,#0f2027,#1e3a8a);
}
75%{
background:linear-gradient(135deg,#1e3c72,#0f2027);
}
100%{
background:linear-gradient(135deg,#0f2027,#2a5298);
}
}

/* Glow Text */
.container{
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
box-shadow:0 30px 100px rgba(0,0,0,.6);
}

h1{
font-size:26px;
font-weight:800;
letter-spacing:1px;
margin-bottom:15px;
text-shadow:0 0 15px rgba(255,255,255,.6);
}

p{
font-size:16px;
opacity:.9;
}

.clock{
margin-top:25px;
font-size:40px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

</style>
</head>
<body>

<div class="container">
<h1>⚠ خطا در ارتباط با سرور</h1>
<p>لطفاً ساعتی دیگر دوباره تلاش کنید</p>
<div class="clock">🕒</div>
</div>

</body>
</html>
