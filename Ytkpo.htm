<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایش کلید و کتابخانه | Ably Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e, #0a1025);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .card {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 35px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.1);
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #00ffcc, #ff00cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .key-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #00ffcc;
        }
        .key-label {
            color: #00ffcc;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .key-value {
            background: #0a0f1e;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            color: #00ffcc;
        }
        .library-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #ff00cc;
        }
        .library-name {
            color: #ff00cc;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .library-url {
            background: #0a0f1e;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            color: #ffaa44;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
        }
        .status-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .status-text {
            font-size: 16px;
            font-weight: bold;
        }
        .status-success {
            color: #00ffcc;
        }
        .status-error {
            color: #ff4444;
        }
        .btn {
            background: linear-gradient(135deg, #00ffcc, #00997a);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: #0a0f1e;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔐 Ably Service</h1>
        <div class="sub">نمایش کلید و کتابخانه اتصال به سرور</div>

        <!-- بخش نمایش کلید -->
        <div class="key-box">
            <div class="key-label">🔑 کلید Ably شما</div>
            <div class="key-value" id="ablyKey">NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo</div>
            <button class="btn" id="copyKeyBtn" style="margin-top: 12px; padding: 8px;">📋 کپی کلید</button>
        </div>

        <!-- بخش نمایش کتابخانه -->
        <div class="library-box">
            <div class="library-name">📚 کتابخانه Ably</div>
            <div class="library-url">https://unpkg.com/ably@1.2.0/browser/static/ably.min.js</div>
            <div style="font-size: 11px; color: #aaa; margin-top: 8px;">✅ نسخه 1.2.0 | پایدار و به‌روز</div>
        </div>

        <!-- وضعیت اتصال -->
        <div class="status-box" id="statusBox">
            <div class="status-icon" id="statusIcon">⏳</div>
            <div class="status-text" id="statusText">در حال بررسی...</div>
        </div>

        <div class="footer">
            🔒 کلید و کتابخانه برای اتصال به سرور Ably
        </div>
    </div>
</div>

<script src="https://unpkg.com/ably@1.2.0/browser/static/ably.min.js"></script>
<script>
    // ========== کلید Ably ==========
    const ABLY_KEY = 'NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo';
    
    // ========== کپی کلید ==========
    document.getElementById("copyKeyBtn").onclick = () => {
        const keyText = document.getElementById("ablyKey").innerText;
        navigator.clipboard.writeText(keyText);
        alert("✅ کلید کپی شد!");
    };
    
    // ========== تست اتصال به Ably ==========
    async function testAblyConnection() {
        const statusIcon = document.getElementById("statusIcon");
        const statusText = document.getElementById("statusText");
        
        statusIcon.innerHTML = "🔄";
        statusText.innerHTML = "در حال اتصال به سرور Ably...";
        
        try {
            const ably = new Ably.Realtime(ABLY_KEY);
            
            ably.connection.on("connected", () => {
                statusIcon.innerHTML = "✅";
                statusText.innerHTML = "🟢 متصل به سرور Ably";
                statusText.className = "status-text status-success";
            });
            
            ably.connection.on("failed", () => {
                statusIcon.innerHTML = "❌";
                statusText.innerHTML = "🔴 اتصال ناموفق";
                statusText.className = "status-text status-error";
            });
            
            ably.connection.on("disconnected", () => {
                statusIcon.innerHTML = "⚠️";
                statusText.innerHTML = "🟡 قطع شد";
                statusText.className = "status-text status-error";
            });
            
            // timeout 5 ثانیه
            setTimeout(() => {
                if (ably.connection.state !== "connected") {
                    statusIcon.innerHTML = "❌";
                    statusText.innerHTML = "🔴 زمان اتصال منقضی شد";
                    statusText.className = "status-text status-error";
                }
            }, 5000);
            
        } catch(error) {
            statusIcon.innerHTML = "❌";
            statusText.innerHTML = "🔴 خطا در بارگذاری کتابخانه";
            statusText.className = "status-text status-error";
            console.error("Ably Error:", error);
        }
    }
    
    // اجرای تست اتصال
    testAblyConnection();
</script>
</body>
</html>
