<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mafia Dark Shot - Token Extractor</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        .loader {
            text-align: center;
            padding: 50px;
            color: #00ffcc;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="loader" class="loader">
    🔐 در حال استخراج توکن از سرور...
</div>
<div id="status" class="status"></div>

<script>
    // ========== توکن سرور شما ==========
    const SERVER_TOKEN = "NNYzzQ.dkJmdA:WRlNRokYR2oFpiCaxxDIRWStSc45mSSITckfVtwGBEo";
    
    // ========== تابع رمزگشایی متن رمزگذاری شده ==========
    function decodeFromServer(encodedText) {
        try {
            // اگر متن با "8426" شروع شد، رمزگذاری عددی است
            if(encodedText.startsWith("8426")) {
                let parts = encodedText.split('.');
                parts = parts.slice(1);
                if(parts.length > 1) parts.pop(); // حذف چک‌سام
                
                let result = "";
                for(let i = 0; i < parts.length; i++) {
                    let code = parseInt(parts[i]);
                    let originalCode = (code - 123) / 7;
                    result += String.fromCharCode(originalCode);
                }
                return result;
            }
            // اگر Base64 بود
            else if(encodedText.match(/^[A-Za-z0-9+/=]+$/)) {
                return decodeURIComponent(escape(atob(encodedText)));
            }
            return encodedText;
        } catch(e) {
            console.error("رمزگشایی خطا:", e);
            return null;
        }
    }
    
    // ========== تابع درخواست به سرور ==========
    async function requestToServer(requestData) {
        // در اینجا شما باید آدرس سرور واقعی خود را بگذارید
        const YOUR_SERVER_URL = "https://your-server.com/api/mafia/request";
        
        try {
            const response = await fetch(YOUR_SERVER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Requested-With": "MafiaDarkShotApp"
                },
                body: JSON.stringify({
                    token: SERVER_TOKEN,
                    request: requestData,
                    timestamp: Date.now(),
                    appVersion: "1.0"
                })
            });
            
            if(!response.ok) {
                throw new Error("خطا در ارتباط با سرور");
            }
            
            const data = await response.json();
            return data;
        } catch(error) {
            console.error("درخواست خطا:", error);
            return null;
        }
    }
    
    // ========== تابع اصلی: دریافت و رمزگشایی توکن ==========
    async function fetchAndDecryptToken() {
        const statusDiv = document.getElementById("status");
        const loaderDiv = document.getElementById("loader");
        
        statusDiv.innerHTML = "📡 در حال ارسال درخواست به سرور...";
        
        // مرحله 1: درخواست به سرور
        const response = await requestToServer("get_game_token");
        
        if(!response || !response.encryptedToken) {
            statusDiv.innerHTML = "❌ خطا: پاسخ معتبری از سرور دریافت نشد";
            loaderDiv.innerHTML = "❌ اتصال به سرور ناموفق";
            return null;
        }
        
        statusDiv.innerHTML = "🔓 در حال رمزگشایی توکن دریافتی...";
        
        // مرحله 2: رمزگشایی توکن دریافتی
        const decryptedToken = decodeFromServer(response.encryptedToken);
        
        if(!decryptedToken) {
            statusDiv.innerHTML = "❌ خطا: رمزگشایی توکن ناموفق";
            loaderDiv.innerHTML = "❌ رمزگشایی ناموفق";
            return null;
        }
        
        statusDiv.innerHTML = "✅ توکن با موفقیت استخراج و رمزگشایی شد";
        
        // مرحله 3: ذخیره توکن
        localStorage.setItem("mafia_game_token", decryptedToken);
        
        return decryptedToken;
    }
    
    // ========== بررسی اینکه آیا توکن از قبل وجود دارد ==========
    function hasValidToken() {
        const token = localStorage.getItem("mafia_game_token");
        const expiry = localStorage.getItem("mafia_token_expiry");
        
        if(!token) return false;
        if(expiry && Date.now() > parseInt(expiry)) return false;
        
        return true;
    }
    
    // ========== بارگذاری بازی اصلی ==========
    async function loadGame() {
        let token = localStorage.getItem("mafia_game_token");
        
        if(!token) {
            token = await fetchAndDecryptToken();
        }
        
        if(!token) {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h1 style="color:#ff4444;">❌ خطای احراز هویت</h1>
                    <p>امکان اتصال به سرور وجود ندارد</p>
                    <button onclick="location.reload()">تلاش مجدد</button>
                </div>
            `;
            return;
        }
        
        // نمایش بازی اصلی
        document.body.innerHTML = `
            <div style="text-align:center; padding:30px;">
                <h1 style="color:#00ffcc;">🎭 مافیا دارک شات</h1>
                <p>✅ احراز هویت موفق</p>
                <p>🔐 توکن بازی: ${token.substring(0, 30)}...</p>
                <div style="margin-top:30px;">
                    <button onclick="startMafiaGame()" style="background:#00ffcc; border:none; padding:12px 24px; border-radius:30px;">شروع بازی</button>
                </div>
            </div>
        `;
    }
    
    // تابع شروع بازی
    window.startMafiaGame = function() {
        alert("🎮 بازی مافیا دارک شات شروع شد!\nتوکن شما معتبر است.");
        // اینجا کد اصلی بازی قرار می‌گیرد
    };
    
    // اجرا
    loadGame();
</script>
</body>
</html>
