<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mafia Vision - Premium</title>
    <style>
        /* استایل‌های پیشرفته */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* انیمیشن‌ها */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(255,0,0,0.5); }
            100% { box-shadow: 0 0 20px rgba(255,0,0,0.8); }
        }
        
        /* اسکرولبار یوتیوبی */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

<!-- کد اسکرچر پرو پیشرفته -->
<script>
(function() {
    'use strict';
    
    // ========== 1. تغییرات پس‌زمینه و رنگ ==========
    document.body.style.backgroundColor = '#0f0f0f';
    document.body.style.color = '#ffffff';
    document.body.style.fontFamily = "'Roboto', 'YouTube Sans', system-ui, sans-serif";
    
    // ========== 2. هدر یوتیوبی + اینستاگرامی ==========
    var header = document.createElement('div');
    header.id = 'mafiaHeader';
    header.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <div style="display:flex;align-items:center;gap:15px;">
                <div style="background:#ff0000;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                    <span style="color:#fff;font-size:20px;">🎬</span>
                </div>
                <span style="font-size:20px;font-weight:bold;background:linear-gradient(45deg,#ff0000,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">MAFIA VISION</span>
                <span style="background:#ff0000;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;">PREMIUM</span>
            </div>
            <div style="display:flex;gap:20px;">
                <span style="cursor:pointer;">🏠 خانه</span>
                <span style="cursor:pointer;">🔥 اکسپلور</span>
                <span style="cursor:pointer;">📺 کوتاه</span>
                <span style="cursor:pointer;">🎵 موزیک</span>
                <span style="cursor:pointer;">👤 پروفایل</span>
            </div>
            <div style="display:flex;gap:15px;">
                <div style="background:#1a1a1a;padding:8px 15px;border-radius:25px;">🔍 جستجو</div>
                <div style="background:#ff0000;padding:8px 15px;border-radius:25px;cursor:pointer;">➕ آپلود</div>
            </div>
        </div>
    `;
    header.style.cssText = 'position:sticky;top:0;background:#0f0f0f;padding:15px 20px;border-bottom:1px solid #272727;z-index:10000;backdrop-filter:blur(10px);';
    document.body.insertBefore(header, document.body.firstChild);
    
    // ========== 3. بخش استوری (مثل اینستاگرام) ==========
    var stories = document.createElement('div');
    stories.id = 'mafiaStories';
    stories.innerHTML = `
        <div style="display:flex;gap:20px;overflow-x:auto;padding:15px 20px;background:#1a1a1a;border-bottom:1px solid #272727;">
            <div style="text-align:center;min-width:70px;"><div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(45deg,#ff0000,#ff6600);padding:2px;"><div style="width:100%;height:100%;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;">📸</div></div><div style="font-size:12px;margin-top:5px;">شما</div></div>
            <div style="text-align:center;min-width:70px;"><div style="width:60px;height:60px;border-radius:50%;background:#272727;display:flex;align-items:center;justify-content:center;">🎬</div><div style="font-size:12px;margin-top:5px;">Mafia</div></div>
            <div style="text-align:center;min-width:70px;"><div style="width:60px;height:60px;border-radius:50%;background:#272727;display:flex;align-items:center;justify-content:center;">🎵</div><div style="font-size:12px;margin-top:5px;">Music</div></div>
            <div style="text-align:center;min-width:70px;"><div style="width:60px;height:60px;border-radius:50%;background:#272727;display:flex;align-items:center;justify-content:center;">🎮</div><div style="font-size:12px;margin-top:5px;">Gaming</div></div>
            <div style="text-align:center;min-width:70px;"><div style="width:60px;height:60px;border-radius:50%;background:#272727;display:flex;align-items:center;justify-content:center;">⚽</div><div style="font-size:12px;margin-top:5px;">Sports</div></div>
        </div>
    `;
    document.body.insertBefore(stories, header.nextSibling);
    
    // ========== 4. تب‌های ناوبری ==========
    var tabs = document.createElement('div');
    tabs.innerHTML = `
        <div style="display:flex;justify-content:space-around;padding:12px 0;border-bottom:2px solid #272727;">
            <div style="text-align:center;cursor:pointer;color:#ff0000;border-bottom:2px solid #ff0000;padding-bottom:8px;">📺 برای شما</div>
            <div style="text-align:center;cursor:pointer;color:#888;">🔥 دنبال می‌کنید</div>
            <div style="text-align:center;cursor:pointer;color:#888;">⚡ پربازدیدها</div>
            <div style="text-align:center;cursor:pointer;color:#888;">🎬 جدیدترین</div>
        </div>
    `;
    document.body.insertBefore(tabs, stories.nextSibling);
    
    // ========== 5. فوتر اینستاگرامی + یوتیوبی ==========
    var footer = document.createElement('div');
    footer.id = 'mafiaFooter';
    footer.innerHTML = `
        <div style="display:flex;justify-content:space-around;padding:12px 0;background:#0f0f0f;border-top:1px solid #272727;position:fixed;bottom:0;left:0;right:0;z-index:9999;">
            <div style="text-align:center;cursor:pointer;color:#ff0000;">🏠</div>
            <div style="text-align:center;cursor:pointer;color:#888;">🔍</div>
            <div style="text-align:center;cursor:pointer;color:#888;">➕</div>
            <div style="text-align:center;cursor:pointer;color:#888;">🎬</div>
            <div style="text-align:center;cursor:pointer;color:#888;">👤</div>
        </div>
    `;
    document.body.appendChild(footer);
    document.body.style.paddingBottom = '70px';
    
    // ========== 6. تغییر استایل ویدیوها ==========
    var style = document.createElement('style');
    style.innerHTML = `
        video, .video-player, .video-js {
            border-radius: 15px !important;
            border: 2px solid #ff0000 !important;
            box-shadow: 0 0 15px rgba(255,0,0,0.3) !important;
        }
        button, .btn, .button {
            background: linear-gradient(45deg, #ff0000, #ff6600) !important;
            border: none !important;
            border-radius: 25px !important;
            color: white !important;
            padding: 8px 20px !important;
            cursor: pointer !important;
            transition: transform 0.2s !important;
        }
        button:hover, .btn:hover {
            transform: scale(1.05) !important;
        }
        input, textarea {
            background: #1a1a1a !important;
            border: 1px solid #272727 !important;
            border-radius: 25px !important;
            color: white !important;
            padding: 10px 15px !important;
        }
        a {
            color: #ff0000 !important;
            text-decoration: none !important;
        }
        .card, .video-card, .item {
            background: #1a1a1a !important;
            border-radius: 15px !important;
            margin-bottom: 15px !important;
            overflow: hidden !important;
            transition: transform 0.2s !important;
        }
        .card:hover, .video-card:hover {
            transform: translateY(-5px) !important;
        }
    `;
    document.head.appendChild(style);
    
    // ========== 7. اعمال تغییرات روی ویدیوهای موجود ==========
    setTimeout(function() {
        var videos = document.querySelectorAll('video');
        for(var i = 0; i < videos.length; i++) {
            videos[i].style.borderRadius = '15px';
            videos[i].style.border = '2px solid #ff0000';
        }
    }, 1000);
    
    console.log('🎬 MAFIA VISION ACTIVATED - Premium Mode');
})();
</script>

<!-- دستور مسدودیت (برای فعال کردن، خط زیر را از حالت کامنت خارج کن) -->
<!--  -->

</body>
</html>
